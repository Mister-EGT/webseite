<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OPSUCHT Markt &amp; Auktions Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /*
   * FIX #1: All CSS custom properties use correct double-dash (--) syntax.
   *         All font-family strings use straight ASCII quotes only.
   *         Zero typographic/smart quotes in this file.
   */
  :root {
    --bg-base: #0a0b0f;
    --bg-panel: #111318;
    --bg-card: #161820;
    --bg-card-hover: #1c1f29;
    --bg-elevated: #1e2130;
    --border: #252836;
    --border-subtle: #1a1d28;
    --gold: #e8a230;
    --gold-dim: #c47f18;
    --amber: #f59e0b;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #60a5fa;
    --text-primary: #f0f2f8;
    --text-secondary: #8b90a8;
    --text-muted: #545870;
    --radius: 10px;
    --radius-lg: 14px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }
  #root { min-height: 100vh; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-base); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  @keyframes shimmer {
    0%   { background-position: -400px 0; }
    100% { background-position:  400px 0; }
  }
  .skeleton {
    background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-elevated) 50%, var(--bg-card) 75%);
    background-size: 800px 100%;
    animation: shimmer 1.5s infinite;
    border-radius: var(--radius);
  }

  /* Toast (FIX #11) */
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0);   }
  }
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-size: 13px; padding: 10px 18px;
    border-radius: var(--radius);
    z-index: 9999; box-shadow: var(--shadow);
    animation: toastIn 0.2s ease;
    pointer-events: none;
  }
  .toast-success { border-color: rgba(34,197,94,0.4);  color: var(--green); }
  .toast-error   { border-color: rgba(239,68,68,0.4);  color: var(--red);   }

  /* Utilities */
  .gold      { color: var(--gold); }
  .green     { color: var(--green); }
  .red       { color: var(--red); }
  .muted     { color: var(--text-muted); }
  .secondary { color: var(--text-secondary); }
  .mono      { font-family: 'DM Mono', monospace; }
  .syne      { font-family: 'Syne', sans-serif; }

  button { cursor: pointer; border: none; background: none; font-family: inherit; }
  button:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  button:disabled { cursor: not-allowed; }

  input, select {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text-primary);
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  input::placeholder { color: var(--text-muted); }
  input:focus, select:focus { border-color: var(--gold-dim); }
  select option { background: var(--bg-card); }

  .badge {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.03em; white-space: nowrap;
  }
  .badge-gold  { background: rgba(232,162,48,0.12); color: var(--gold);  border: 1px solid rgba(232,162,48,0.25); }
  .badge-green { background: rgba(34,197,94,0.1);   color: var(--green); border: 1px solid rgba(34,197,94,0.2);  }
  .badge-blue  { background: rgba(96,165,250,0.1);  color: var(--blue);  border: 1px solid rgba(96,165,250,0.2); }
  .badge-muted { background: rgba(84,88,112,0.15);  color: var(--text-secondary); border: 1px solid var(--border-subtle); }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    transition: border-color 0.2s, background 0.2s;
  }
  .card:hover { border-color: rgba(232,162,48,0.2); background: var(--bg-card-hover); }
  .card-clickable { cursor: pointer; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .modal {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    width: 100%; max-width: 720px;
    max-height: 90vh; overflow-y: auto;
    box-shadow: var(--shadow);
  }
  @media (max-width: 640px) {
    .modal { border-radius: 16px 16px 0 0; position: fixed; bottom: 0; max-height: 92vh; }
    .modal-overlay { align-items: flex-end; padding: 0; }
  }

  /* Tabs */
  .tab-bar {
    display: flex; background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius); padding: 4px; gap: 2px;
  }
  .tab-btn {
    flex: 1; padding: 8px 16px; border-radius: 7px;
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 600;
    color: var(--text-secondary); transition: all 0.2s;
  }
  .tab-btn.active { background: var(--gold); color: #0a0b0f; }
  .tab-btn:not(.active):hover { color: var(--text-primary); background: var(--bg-elevated); }

  .gold-line {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }

  /* Code */
  .code-box {
    background: #0d0f16; border: 1px solid var(--border-subtle);
    border-radius: var(--radius); padding: 12px;
    font-family: 'DM Mono', monospace; font-size: 12px;
    color: #a8b4d8; overflow: auto; white-space: pre;
    max-height: 400px; line-height: 1.7;
  }

  /* Stat */
  .stat-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 16px 20px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .stat-value {
    font-family: 'Syne', sans-serif; font-size: 26px;
    font-weight: 700; color: var(--gold); line-height: 1;
  }
  .stat-label {
    font-size: 12px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em;
  }

  /* Partial-error banner (FIX #6) */
  .warn-banner {
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.25);
    border-radius: var(--radius);
    padding: 10px 14px; font-size: 13px; color: var(--amber);
    display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap;
  }

  /* Grids */
  .grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
  .items-grid    { display: grid; grid-template-columns: repeat(auto-fill,minmax(220px,1fr)); gap: 12px; }
  .auctions-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 14px; }
  @media (max-width: 900px) { .grid-4 { grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 640px) {
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    .items-grid, .auctions-grid { grid-template-columns: 1fr; }
  }

  /* Table */
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th {
    text-align: left; padding: 10px 14px;
    font-family: 'Syne', sans-serif;
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.07em;
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  .data-table td {
    padding: 10px 14px; border-bottom: 1px solid var(--border-subtle);
    font-size: 13px; color: var(--text-secondary);
  }
  .data-table tr:hover td { background: var(--bg-elevated); color: var(--text-primary); }
  .data-table td:first-child { color: var(--text-primary); font-weight: 500; }
  .table-wrapper { overflow-x: auto; border-radius: var(--radius-lg); border: 1px solid var(--border); background: var(--bg-card); }

  .hero-bg {
    background:
      radial-gradient(ellipse 60% 40% at 50% -10%, rgba(232,162,48,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 50%, rgba(34,197,94,0.04) 0%, transparent 60%),
      var(--bg-panel);
    border-bottom: 1px solid var(--border);
  }

  .filter-bar {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    padding: 14px; background: var(--bg-panel);
    border: 1px solid var(--border); border-radius: var(--radius-lg);
  }
  .filter-bar input, .filter-bar select { flex: 1; min-width: 140px; max-width: 280px; }

  .view-toggle {
    display: flex; background: var(--bg-elevated);
    border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
  }
  .view-toggle button { padding: 6px 12px; font-size: 13px; color: var(--text-muted); transition: all 0.15s; }
  .view-toggle button.active { background: var(--gold); color: #0a0b0f; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; transition: all 0.2s;
  }
  .btn-gold  { background: var(--gold); color: #0a0b0f; }
  .btn-gold:hover { background: var(--amber); }
  .btn-ghost { background: var(--bg-elevated); color: var(--text-secondary); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text-primary); border-color: var(--gold-dim); }
  .btn-sm { padding: 5px 12px; font-size: 12px; }

  .section-head {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 10px; margin-bottom: 16px;
  }
  .section-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--text-primary); }

  .count-pill {
    background: var(--bg-elevated); color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 2px 8px; border-radius: 20px;
    font-size: 12px; font-family: 'DM Mono', monospace;
  }

  /* Pagination (FIX #5) */
  .pagination { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .page-btn {
    min-width: 32px; height: 32px; padding: 0 6px;
    border-radius: 6px; font-size: 13px;
    color: var(--text-secondary); background: var(--bg-card);
    border: 1px solid var(--border); transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .page-btn:hover:not(:disabled) { border-color: var(--gold-dim); color: var(--text-primary); }
  .page-btn.active { background: var(--gold); color: #0a0b0f; border-color: var(--gold); font-weight: 700; }
  .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .page-ellipsis { color: var(--text-muted); padding: 0 2px; font-size: 13px; line-height: 32px; user-select: none; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// FIX #8: Only used hooks/components imported. Removed: useCallback, useRef, LineChart, Line.
const { useState, useEffect, useMemo } = React;
const { XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid, AreaChart, Area } = Recharts;

// =============================================================================
// API LAYER
// NOTE on FIX #2: corsproxy.io is intentionally kept here for browser-demo use.
// For production, replace CORS_PROXY with '' and configure proper CORS on the
// server side, or route through your own reverse proxy / serverless function.
// =============================================================================
const BASE       = 'https://api.opsucht.net';
const CORS_PROXY = 'https://corsproxy.io/?';

async function apiFetch(path, externalSignal) {
  const ctrl  = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 12000);
  // FIX #13: support caller-provided AbortSignal for cleanup on unmount
  if (externalSignal) {
    if (externalSignal.aborted) { clearTimeout(timer); ctrl.abort(); }
    else externalSignal.addEventListener('abort', () => ctrl.abort());
  }
  const url = CORS_PROXY + encodeURIComponent(BASE + path);
  try {
    const res = await fetch(url, { signal: ctrl.signal });
    clearTimeout(timer);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  } catch (e) {
    clearTimeout(timer);
    throw e;
  }
}

const api = {
  marketCategories:  (s) => apiFetch('/market/categories', s),
  marketItems:       (s) => apiFetch('/market/items', s),
  marketPrices:      (s) => apiFetch('/market/prices', s),
  marketPrice:       (m, s) => apiFetch('/market/price/'  + encodeURIComponent(m), s),
  marketHistory:     (m, s) => apiFetch('/market/history/' + encodeURIComponent(m), s),
  auctionCategories: (s) => apiFetch('/auctions/categories', s),
  activeAuctions:    (cat, s) => apiFetch('/auctions/active' + (cat ? '?category=' + encodeURIComponent(cat) : ''), s),
};

// =============================================================================
// NORMALIZATION
// =============================================================================
function extractArray(data) {
  if (!data) return [];
  if (Array.isArray(data)) return data;
  for (const v of Object.values(data)) {
    if (Array.isArray(v)) return v;
  }
  if (typeof data === 'object') {
    return Object.entries(data).map(([k, v]) =>
      (typeof v === 'object' && v !== null) ? { ...v, _key: k } : { value: v, _key: k }
    );
  }
  return [];
}

function getField(obj, ...keys) {
  for (const k of keys) {
    const v = obj?.[k];
    if (v !== undefined && v !== null && v !== '') return v;
  }
  return undefined;
}

// FIX #4: Handles nested structures like { buy: { price: 1234 } }.
// pathLists is an array of key-path arrays; returns first numeric leaf found.
function getNestedNum(obj, pathLists) {
  for (const path of pathLists) {
    let cur = obj;
    for (const key of path) {
      if (cur === null || cur === undefined) { cur = undefined; break; }
      cur = cur[key];
    }
    const n = parseFloat(cur);
    if (!isNaN(n)) return n;
  }
  return undefined;
}

function extractBuyPrice(p) {
  return getNestedNum(p, [
    ['buy','price'], ['buy','value'], ['buy'],
    ['buyPrice'], ['buy_price'], ['price','buy'],
    ['price'], ['value'],
  ]);
}
function extractSellPrice(p) {
  return getNestedNum(p, [
    ['sell','price'], ['sell','value'], ['sell'],
    ['sellPrice'], ['sell_price'],
  ]);
}

function normalizeMarketItem(raw, idx) {
  const id       = String(getField(raw, 'id', 'material', '_key', 'name') ?? idx);
  const label    = String(getField(raw, 'name', 'displayName', 'display_name', 'label', 'material', '_key') ?? id);
  const material = String(getField(raw, 'material', 'id', '_key') ?? id);
  const category = getField(raw, 'category', 'type', 'group');
  return { id, label, material, category: category ? String(category) : undefined, raw };
}

function normalizePrice(raw) {
  if (!raw) return null;
  return {
    buy:  extractBuyPrice(raw),
    sell: extractSellPrice(raw),
    avg:  getNestedNum(raw, [['avg','price'],['avg'],['average'],['avgPrice'],['avg_price']]),
    min:  getNestedNum(raw, [['min','price'],['min'],['minPrice'],['min_price']]),
    max:  getNestedNum(raw, [['max','price'],['max'],['maxPrice'],['max_price']]),
    raw,
  };
}

function normalizeAuction(raw, idx) {
  const id       = String(getField(raw, 'id', 'auctionId', 'uuid') ?? idx);
  const name     = String(getField(raw, 'name', 'item', 'title', 'material', 'itemName', 'item_name', 'displayName') ?? 'Unbekannt');
  const category = getField(raw, 'category', 'type');
  const price    = getNestedNum(raw, [['price'],['bid'],['currentBid'],['current_bid'],['startPrice'],['start_price'],['highestBid']]);
  const seller   = getField(raw, 'seller', 'owner', 'player', 'creator', 'auctioneer');
  const endTime  = getField(raw, 'expiresAt', 'endAt', 'endTime', 'end_time', 'expires', 'timeLeft', 'time_left', 'endsAt');
  const quantity = getField(raw, 'quantity', 'amount', 'count', 'stack', 'qty');
  return { id, name, category: category ? String(category) : undefined, price, seller, endTime, quantity, raw };
}

// FIX #9: pre-build search strings once per dataset, not on every keystroke
function withSearchIndex(items) {
  return items.map(it => ({
    ...it,
    _s: [it.label, it.material, it.category || ''].join(' ').toLowerCase(),
  }));
}
function withAuctionSearchIndex(auctions) {
  return auctions.map(a => ({
    ...a,
    _s: [a.name, a.category || '', a.seller || ''].join(' ').toLowerCase(),
  }));
}

// =============================================================================
// FORMAT
// =============================================================================
function fmt(n) {
  if (n === undefined || n === null) return '—';
  const num = parseFloat(n);
  if (isNaN(num)) return String(n);
  if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
  if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
  return num.toLocaleString('de-DE', { maximumFractionDigits: 2 });
}
function fmtLabel(key) {
  return key.replace(/_/g,' ').replace(/([A-Z])/g,' $1').replace(/^./,s=>s.toUpperCase()).trim();
}
function fmtTime(val) {
  if (!val) return '—';
  let d;
  if (typeof val === 'number') d = new Date(val > 1e12 ? val : val * 1000);
  else if (typeof val === 'string') d = new Date(val);
  if (d && !isNaN(d)) {
    const diff = d - Date.now();
    if (diff > 0) {
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      return h > 0 ? h + 'h ' + m + 'm' : m + 'm';
    }
    return d.toLocaleString('de-DE');
  }
  return String(val);
}

// =============================================================================
// CLIPBOARD + TOAST  (FIX #11)
// =============================================================================
function useToast() {
  const [toast, setToast] = useState(null);
  const timerRef = { current: null };
  function show(msg, type = 'success') {
    setToast({ msg, type });
    clearTimeout(timerRef.current);
    timerRef.current = setTimeout(() => setToast(null), 2200);
  }
  return { toast, show };
}

function copyText(text, show) {
  const done = () => show && show('Kopiert: ' + text.slice(0, 32), 'success');
  const fail = () => show && show('Kopieren nicht erlaubt', 'error');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(done).catch(fail);
  } else {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta); done();
    } catch { fail(); }
  }
}

// =============================================================================
// PAGINATION  (FIX #5: unique page numbers, proper ellipsis)
// =============================================================================
function buildPages(cur, total) {
  if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);
  const set = new Set([1, total]);
  for (let i = Math.max(2, cur - 2); i <= Math.min(total - 1, cur + 2); i++) set.add(i);
  const sorted = [...set].sort((a, b) => a - b);
  const out = [];
  let prev = 0;
  for (const p of sorted) {
    if (p - prev > 1) out.push('...');
    out.push(p);
    prev = p;
  }
  return out;
}

function Pagination({ page, total, onChange }) {
  if (total <= 1) return null;
  const pages = buildPages(page, total);
  return (
    <div className="pagination" aria-label="Seiten">
      <button className="page-btn" disabled={page === 1} onClick={() => onChange(page - 1)} aria-label="Zurueck">&#8249;</button>
      {pages.map((p, i) =>
        p === '...'
          ? <span key={'e' + i} className="page-ellipsis">&#8230;</span>
          : <button
              key={p}
              className={'page-btn' + (p === page ? ' active' : '')}
              onClick={() => onChange(p)}
              aria-current={p === page ? 'page' : undefined}
            >{p}</button>
      )}
      <button className="page-btn" disabled={page === total} onClick={() => onChange(page + 1)} aria-label="Weiter">&#8250;</button>
    </div>
  );
}

// =============================================================================
// SHARED COMPONENTS
// =============================================================================
function LoadingSkeleton({ rows = 6 }) {
  return (
    <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))', gap:12 }}>
      {Array.from({ length: rows }).map((_, i) => (
        <div key={i} className="skeleton" style={{ height: 100, opacity: 1 - i * 0.06 }} />
      ))}
    </div>
  );
}

function ErrorState({ message, onRetry }) {
  return (
    <div style={{ textAlign:'center', padding:'48px 24px' }} role="alert">
      <div style={{ fontSize:32, marginBottom:12, color:'var(--red)' }}>&#9888;</div>
      <div style={{ fontFamily:'Syne, sans-serif', fontSize:18, fontWeight:700, marginBottom:8 }}>Fehler beim Laden</div>
      <div style={{ color:'var(--text-muted)', maxWidth:400, margin:'0 auto 24px' }}>{message || 'Unbekannter Fehler'}</div>

// Partial-failure banner  (FIX #6)
function WarnBanner({ errors }) {

  return (
    <div className="warn-banner" role="status">
      <span>&#9888;</span>

// FIX #12: JSON computed once via useMemo; download button added
function RawJsonViewer({ data, label }) {
  const [open, setOpen] = useState(false);
  const { toast, show } = useToast();
  const json    = useMemo(() => data ? JSON.stringify(data, null, 2) : '', [data]);
  const display = useMemo(() => json.length > 10000 ? json.slice(0, 10000) + '\n\n... [auf 10.000 Zeichen gekuerzt]' : json, [json]);

  function download() {
    const blob = new Blob([json], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = (label || 'data').replace(/\s+/g, '_') + '.json';
    a.click(); URL.revokeObjectURL(url);
  }

  return (
    <div style={{ marginTop:12 }}>
      {toast && <div className={'toast ' + 'toast-' + toast.type}>{toast.msg}</div>}
      <button className="btn btn-ghost btn-sm" onClick={() => setOpen(o => !o)}>
        {open ? '▲ Rohdaten schliessen' : '▼ Rohdaten anzeigen'}
        {label && <span style={{ color:'var(--text-muted)', marginLeft:6 }}>({label})</span>}
      </button>
      {open && (
        <div style={{ marginTop:8, position:'relative' }}>
          <div style={{ position:'absolute', top:8, right:8, display:'flex', gap:6, zIndex:1 }}>
            <button className="btn btn-ghost btn-sm" onClick={() => copyText(json, show)}>&#8664; Kopieren</button>
            <button className="btn btn-ghost btn-sm" onClick={download}>&#8615; JSON</button>
          </div>
          <div className="code-box">{display}</div>
        </div>
      )}
    </div>
  );
}

function KeyValueGrid({ obj, skip = ['raw', '_key', '_s'] }) {
  const entries = Object.entries(obj || {}).filter(([k]) => !skip.includes(k));
  if (!entries.length) return <div className="muted" style={{ fontSize:13 }}>Keine Daten</div>;
  return (
    <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))', gap:8 }}>
      {entries.map(([k, v]) => (
        <div key={k} style={{ background:'var(--bg-base)', border:'1px solid var(--border-subtle)', borderRadius:8, padding:'8px 12px' }}>
          <div style={{ fontSize:10, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:'0.07em', marginBottom:2 }}>{fmtLabel(k)}</div>
          <div style={{ fontSize:13, color:'var(--text-primary)', fontFamily: typeof v === 'number' ? 'DM Mono, monospace' : 'inherit', wordBreak:'break-all' }}>
            {v === null || v === undefined
              ? <span className="muted">—</span>
              : typeof v === 'object'
                ? <span style={{ fontSize:11, color:'var(--text-muted)' }}>{JSON.stringify(v).slice(0, 60)}</span>
                : String(v)}
          </div>
        </div>
      ))}
    </div>
  );
}

// =============================================================================
// PRICE CHART
// =============================================================================
function PriceChart({ data }) {
  const points = useMemo(() => {
    const arr = extractArray(data);
    if (!arr.length) return null;
    const mapped = arr.map((item, i) => {
      const ts    = getField(item, 'timestamp', 'time', 'date', 'createdAt', 't', 'ts', 'at');
      const price = getNestedNum(item, [['price'],['value'],['buy'],['sell'],['avg'],['average'],['p'],['buyPrice']]);
      if (price !== undefined) {
        let label = '#' + (i + 1);
        if (ts) {
          const d = new Date(typeof ts === 'number' && ts < 1e12 ? ts * 1000 : ts);
          if (!isNaN(d)) label = d.toLocaleDateString('de-DE');
        }
        return { x: label, price };
      }
      return null;
    }).filter(Boolean);
    return mapped.length >= 2 ? mapped : null;
  }, [data]);

  if (!points) {
    return (
      <div>
        <div style={{ color:'var(--text-muted)', fontSize:13, marginBottom:8 }}>
          &#9432; Preisverlauf konnte nicht als Zeitreihe erkannt werden
        </div>
        <RawJsonViewer data={data} label="History-Rohdaten" />
      </div>
    );
  }

  return (
    <div style={{ width:'100%', height:200 }} role="img" aria-label="Preisverlauf-Diagramm">
      <ResponsiveContainer width="100%" height="100%">
        <AreaChart data={points} margin={{ top:5, right:10, left:0, bottom:5 }}>
          <defs>
            <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="5%"  stopColor="#e8a230" stopOpacity={0.3}/>
              <stop offset="95%" stopColor="#e8a230" stopOpacity={0}/>
            </linearGradient>
          </defs>
          <CartesianGrid strokeDasharray="3 3" stroke="#1a1d28"/>
          <XAxis dataKey="x" tick={{ fill:'#545870', fontSize:10 }} tickLine={false} axisLine={false}/>
          <YAxis tick={{ fill:'#545870', fontSize:10 }} tickLine={false} axisLine={false} tickFormatter={fmt} width={60}/>
          <Tooltip
            contentStyle={{ background:'#1e2130', border:'1px solid #252836', borderRadius:8, fontSize:12 }}
            labelStyle={{ color:'#545870' }}
            itemStyle={{ color:'#e8a230' }}
            formatter={v => [fmt(v), 'Preis']}
          />
          <Area type="monotone" dataKey="price" stroke="#e8a230" strokeWidth={2} fill="url(#goldGrad)" dot={false} activeDot={{ r:4, fill:'#e8a230' }}/>
        </AreaChart>
      </ResponsiveContainer>
    </div>
  );
}

// =============================================================================
// MODAL WRAPPER — Escape key, aria (FIX #10)
// =============================================================================
function Modal({ onClose, children, label }) {
  useEffect(() => {
    const fn = e => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', fn);
    return () => document.removeEventListener('keydown', fn);
  }, [onClose]);

  return (
    <div
      className="modal-overlay"
      onClick={e => e.target === e.currentTarget && onClose()}
      role="dialog" aria-modal="true" aria-label={label}
    >
      <div className="modal">{children}</div>
    </div>
  );
}

// =============================================================================
// MARKET ITEM DETAIL  (FIX #13: AbortController)
// =============================================================================
function MarketItemDetail({ item, onClose }) {
  const [priceData, setPriceData] = useState(null);
  const [histData,  setHistData]  = useState(null);
  const [loadingP,  setLoadingP]  = useState(true);
  const [loadingH,  setLoadingH]  = useState(true);
  const [errPrice,  setErrPrice]  = useState(null);
  const { toast, show } = useToast();

  useEffect(() => {
    const ctrl = new AbortController();
    const sig  = ctrl.signal;
    setLoadingP(true); setLoadingH(true); setErrPrice(null);

    api.marketPrice(item.material, sig)
      .then(d  => { if (!sig.aborted) { setPriceData(d); setLoadingP(false); } })
      .catch(e => { if (!sig.aborted && e.name !== 'AbortError') { setErrPrice(e.message); setLoadingP(false); } else if (!sig.aborted) setLoadingP(false); });

    api.marketHistory(item.material, sig)
      .then(d  => { if (!sig.aborted) { setHistData(d);  setLoadingH(false); } })
      .catch(() => { if (!sig.aborted) { setHistData(null); setLoadingH(false); } });

    return () => ctrl.abort();
  }, [item.material]);

  const price = normalizePrice(priceData);

  return (
    <Modal onClose={onClose} label={'Detail: ' + item.label}>
      {toast && <div className={'toast toast-' + toast.type}>{toast.msg}</div>}

      <div style={{ padding:'20px 24px 16px', borderBottom:'1px solid #252836', display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:12 }}>
        <div>
          <div style={{ fontFamily:'Syne, sans-serif', fontSize:20, fontWeight:700, marginBottom:4 }}>{item.label}</div>
          <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
            {item.category && <span className="badge badge-gold">{item.category}</span>}
            <button
              className="badge badge-muted mono"
              style={{ cursor:'pointer', border:'1px solid #1a1d28' }}
              onClick={() => copyText(item.material, show)}
              aria-label={'Material-ID kopieren: ' + item.material}
              title="Material-ID kopieren"
            >&#8664; {item.material.length > 28 ? item.material.slice(0,28) + '…' : item.material}</button>
          </div>
        </div>
        <button className="btn btn-ghost btn-sm" onClick={onClose} aria-label="Schliessen" style={{ flexShrink:0 }}>&#10005;</button>
      </div>

      <div style={{ padding:'20px 24px', display:'flex', flexDirection:'column', gap:20 }}>
        {loadingP
          ? <div className="skeleton" style={{ height:80 }}/>
          : errPrice
            ? <div style={{ color:'var(--red)', fontSize:13 }}>Preis konnte nicht geladen werden: {errPrice}</div>
            : price && (
              <div>
                <div style={{ fontSize:12, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:'0.07em', marginBottom:10 }}>Preisdaten</div>
                <div className="grid-3" style={{ gap:10 }}>
                  {[['Kaufen', price.buy], ['Verkaufen', price.sell], ['Durchschnitt', price.avg], ['Minimum', price.min], ['Maximum', price.max]]
                    .filter(([, v]) => v !== undefined && v !== null)
                    .map(([lbl, val]) => (
                      <div key={lbl} style={{ background:'#0a0b0f', border:'1px solid #1a1d28', borderRadius:8, padding:'10px 14px' }}>
                        <div style={{ fontSize:10, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:'0.07em' }}>{lbl}</div>
                        <div style={{ fontFamily:'DM Mono, monospace', fontSize:18, fontWeight:500, color:'var(--gold)', marginTop:2 }}>{fmt(val)}</div>
                      </div>
                    ))}
                </div>
                {priceData && <RawJsonViewer data={priceData} label="price endpoint"/>}
              </div>
            )
        }

        <div>
          <div style={{ fontSize:12, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:'0.07em', marginBottom:10 }}>Preisverlauf</div>
          {loadingH
            ? <div className="skeleton" style={{ height:200 }}/>
            : histData
              ? <PriceChart data={histData}/>
              : <div style={{ color:'var(--text-muted)', fontSize:13 }}>Kein Preisverlauf verfuegbar</div>}
          {histData && !loadingH && <RawJsonViewer data={histData} label="history endpoint"/>}
        </div>

        <div>
          <div style={{ fontSize:12, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:'0.07em', marginBottom:10 }}>Item-Details</div>
          <KeyValueGrid obj={item.raw}/>
        </div>
      </div>
    </Modal>
  );
}

function MarketSection({ marketData }) {
  const { categories, items, prices, loading, errors, reload } = marketData;
  const [search,    setSearch]    = useState('');
  const [catFilter, setCatFilter] = useState('');
  const [sort,      setSort]      = useState('name');
  const [view,      setView]      = useState('grid');
  const [selected,  setSelected]  = useState(null);
  const [page,      setPage]      = useState(1);
  const PAGE_SIZE = 48;

  const catList = useMemo(() => {
    return extractArray(categories)
      .map(c => typeof c === 'string' ? c : getField(c,'name','id','_key') ?? String(c))
      .filter(Boolean);
  }, [categories]);

  // FIX #9: search index built once
  const indexed = useMemo(() =>
    withSearchIndex(extractArray(items).map((it, i) => normalizeMarketItem(it, i)))
  , [items]);

  // FIX #4: robust price map — handles arrays and plain objects
  const priceMap = useMemo(() => {
    const map = {};
    extractArray(prices).forEach(p => {
      const key = getField(p, 'material', 'id', 'name', '_key');
      if (key) map[String(key)] = p;
    });
    if (!Array.isArray(prices) && typeof prices === 'object' && prices !== null) {
      Object.entries(prices).forEach(([k, v]) => { if (!map[k]) map[k] = v; });
    }
    return map;
  }, [prices]);

  const filtered = useMemo(() => {
    let list = indexed;
    if (catFilter) list = list.filter(it => it.category === catFilter);
    if (search) {
      const q = search.toLowerCase();
      list = list.filter(it => it._s.includes(q));
    }
    if (sort === 'name')     list = [...list].sort((a,b) => a.label.localeCompare(b.label));
    if (sort === 'category') list = [...list].sort((a,b) => (a.category||'').localeCompare(b.category||''));
    if (sort === 'price')    list = [...list].sort((a,b) => (extractBuyPrice(priceMap[b.material])??0) - (extractBuyPrice(priceMap[a.material])??0));
    return list;
  }, [indexed, catFilter, search, sort, priceMap]);

  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const paginated  = filtered.slice((page - 1) * PAGE_SIZE, page * PAGE_SIZE);
  useEffect(() => { setPage(1); }, [search, catFilter, sort]);

  if (loading) return <LoadingSkeleton rows={12}/>;

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
      <WarnBanner errors={errors}/>

      <div className="filter-bar">
        <input placeholder="Name, Material, Kategorie ..." value={search} onChange={e=>setSearch(e.target.value)} style={{ maxWidth:280 }} aria-label="Items suchen"/>
        <select value={catFilter} onChange={e=>setCatFilter(e.target.value)} style={{ maxWidth:180 }} aria-label="Kategorie">
          <option value="">Alle Kategorien</option>
          {catList.map(c => <option key={c} value={c}>{c}</option>)}
        </select>
        <select value={sort} onChange={e=>setSort(e.target.value)} style={{ maxWidth:160 }} aria-label="Sortierung">
          <option value="name">A–Z Name</option>
          <option value="category">A–Z Kategorie</option>
          <option value="price">Preis (hoch→tief)</option>
        </select>
        <div className="view-toggle" role="group" aria-label="Ansicht">
          <button className={view==='grid'?'active':''} onClick={()=>setView('grid')} aria-label="Kacheln" aria-pressed={view==='grid'}>&#8862;</button>
          <button className={view==='table'?'active':''} onClick={()=>setView('table')} aria-label="Tabelle" aria-pressed={view==='table'}>&#8801;</button>
        </div>
      </div>

      <div className="section-head">
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <span className="section-title">Markt-Items</span>
          <span className="count-pill" aria-live="polite">{filtered.length}</span>
        </div>
        <Pagination page={page} total={totalPages} onChange={setPage}/>
      </div>

      {paginated.length === 0 ? <EmptyState text="Keine Items gefunden"/> : view === 'grid' ? (
        <div className="items-grid">
          {paginated.map(item => {
            const p = priceMap[item.material];
            const bp = extractBuyPrice(p);
            return (
              <div
                key={item.id} className="card card-clickable"
                onClick={() => setSelected(item)}
                role="button" tabIndex={0}
                onKeyDown={e => (e.key==='Enter'||e.key===' ') && setSelected(item)}
                aria-label={item.label + ' – Details'}
              >
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:8 }}>
                  <div style={{ fontFamily:'Syne, sans-serif', fontSize:14, fontWeight:600, flex:1, marginRight:8, wordBreak:'break-word' }}>{item.label}</div>
                  {bp !== undefined && <span className="gold mono" style={{ fontSize:13, whiteSpace:'nowrap' }}>{fmt(bp)}</span>}
                </div>
                <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
                  {item.category && <span className="badge badge-muted">{item.category}</span>}
                  <span className="badge badge-blue mono" style={{ fontSize:10 }}>
                    {item.material.length > 22 ? item.material.slice(0,22)+'…' : item.material}
                  </span>
                </div>
              </div>
            );
          })}
        </div>
      ) : (
        <div className="table-wrapper">
          <table className="data-table">
            <thead><tr><th>Name</th><th>Material</th><th>Kategorie</th><th>Kaufpreis</th><th>Verkaufspreis</th></tr></thead>
            <tbody>
              {paginated.map(item => {
                const p = priceMap[item.material];
                return (
                  <tr key={item.id} onClick={()=>setSelected(item)} onKeyDown={e=>(e.key==='Enter'||e.key===' ')&&setSelected(item)} style={{ cursor:'pointer' }} tabIndex={0}>
                    <td>{item.label}</td>
                    <td><span className="mono" style={{ fontSize:12, color:'var(--text-muted)' }}>{item.material}</span></td>
                    <td>{item.category ? <span className="badge badge-muted">{item.category}</span> : <span className="muted">—</span>}</td>
                    <td className="gold mono">{p ? fmt(extractBuyPrice(p)) : '—'}</td>
                    <td className="mono" style={{ color:'var(--green)' }}>{p ? fmt(extractSellPrice(p)) : '—'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {selected && <MarketItemDetail item={selected} onClose={()=>setSelected(null)}/>}
    </div>
  );
}

          <span className="section-title">Aktive Auktionen</span>
          <span className="count-pill" aria-live="polite">{filtered.length}</span>
          {loadingAuctions && <span style={{ fontSize:12, color:'var(--text-muted)' }}>Laedt…</span>}
        </div>
      </div>

      {filtered.length === 0 ? <EmptyState text="Keine Auktionen gefunden"/> : (
        <div className="auctions-grid">
          {filtered.map(auction => (
            <div
              key={auction.id} className="card card-clickable"
              onClick={()=>setSelected(auction)}
              role="button" tabIndex={0}
              onKeyDown={e=>(e.key==='Enter'||e.key===' ')&&setSelected(auction)}
              aria-label={auction.name + ' – Details'}
            >
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:10 }}>
                <div style={{ fontFamily:'Syne, sans-serif', fontSize:14, fontWeight:600, flex:1, marginRight:8, wordBreak:'break-word' }}>{auction.name}</div>
                {auction.price !== undefined && <span className="gold mono" style={{ fontSize:14, whiteSpace:'nowrap', fontWeight:600 }}>{fmt(auction.price)}</span>}
              </div>
              <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
                {auction.category && <span className="badge badge-gold" style={{ alignSelf:'flex-start' }}>{auction.category}</span>}
                <div style={{ display:'flex', gap:12, flexWrap:'wrap', marginTop:4 }}>
                  {auction.seller   && <span style={{ fontSize:12, color:'var(--text-muted)' }}>Verkaeufer: {auction.seller}</span>}
                  {auction.quantity !== undefined && <span style={{ fontSize:12, color:'var(--text-muted)' }}>x{auction.quantity}</span>}
                  {auction.endTime  !== undefined && <span style={{ fontSize:12, color:'var(--amber)' }}>Endet: {fmtTime(auction.endTime)}</span>}
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
      {selected && <AuctionDetail auction={selected} onClose={()=>setSelected(null)}/>}
    </div>
  );
}

// =============================================================================
// RAW DATA SECTION  (FIX #12: per-endpoint memoized JSON + download)
// =============================================================================
function RawEndpoint({ label, apiPath, data }) {
  const { toast, show } = useToast();
  const json    = useMemo(() => data ? JSON.stringify(data, null, 2) : null, [data]);
  const display = useMemo(() => json && json.length > 10000 ? json.slice(0,10000) + '\n\n... [auf 10.000 Zeichen gekuerzt]' : json, [json]);

  function download() {
    if (!json) return;
    const blob = new Blob([json], { type:'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = label.replace(/\s+/g,'_') + '.json';
    a.click(); URL.revokeObjectURL(url);
  }

  return (
    <div style={{ background:'var(--bg-card)', border:'1px solid #252836', borderRadius:'var(--radius-lg)', padding:16 }}>
      {toast && <div className={'toast toast-' + toast.type}>{toast.msg}</div>}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10, flexWrap:'wrap', gap:8 }}>
        <div>
          <span style={{ fontFamily:'Syne, sans-serif', fontSize:15, fontWeight:600 }}>{label}</span>
          {apiPath && <span className="mono" style={{ fontSize:11, color:'var(--text-muted)', marginLeft:10 }}>{apiPath}</span>}
        </div>
        {json && (
          <div style={{ display:'flex', gap:6 }}>
            <button className="btn btn-ghost btn-sm" onClick={()=>copyText(json, show)}>&#8664; Kopieren</button>
            <button className="btn btn-ghost btn-sm" onClick={download}>&#8615; JSON</button>
          </div>
        )}
      </div>
      {!data
        ? <div className="muted" style={{ fontSize:13 }}>Noch nicht geladen oder Fehler</div>
        : <div className="code-box">{display}</div>}
    </div>
  );
}

function RawDataSection({ marketData, auctionData }) {
  const eps = [
    { label:'Market Categories',  apiPath:'/market/categories',  data: marketData.categories  },
    { label:'Market Items',        apiPath:'/market/items',        data: marketData.items       },
    { label:'Market Prices',       apiPath:'/market/prices',       data: marketData.prices      },
    { label:'Auction Categories',  apiPath:'/auctions/categories', data: auctionData.categories },
    { label:'Active Auctions',     apiPath:'/auctions/active',     data: auctionData.auctions   },
  ];
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
      <div style={{ color:'var(--text-muted)', fontSize:13 }}>
        Vollstaendige, unveraenderte API-Responses aller Endpunkte. Jede Response kann einzeln kopiert oder als JSON-Datei heruntergeladen werden.
      </div>
      {eps.map(e => <RawEndpoint key={e.label} {...e}/>)}
    </div>
  );
}

// =============================================================================
// STATS
// =============================================================================
function StatsOverview({ marketData, auctionData }) {
  const stats = [
    { label:'Markt-Items',      value: marketData.items      ? extractArray(marketData.items).length      : null },
    { label:'Kategorien',       value: marketData.categories ? extractArray(marketData.categories).length : null },
    { label:'Preiseintraege',   value: marketData.prices     ? (Array.isArray(marketData.prices) ? marketData.prices.length : Object.keys(marketData.prices||{}).length) : null },
    { label:'Aktive Auktionen', value: auctionData.auctions  ? extractArray(auctionData.auctions).length  : null },
  ];
  return (
    <div className="grid-4" style={{ gap:12 }}>
      {stats.map(({ label, value }) => (
        <div key={label} className="stat-card">
          <div className="stat-value">
            {value !== null
              ? value.toLocaleString('de-DE')
              : <span className="skeleton" style={{ display:'inline-block', width:60, height:26, verticalAlign:'middle' }}/>}
          </div>
          <div className="stat-label">{label}</div>
        </div>
      ))}
    </div>
  );
}

// =============================================================================
// ROOT APP
// =============================================================================
function App() {
  const [tab, setTab] = useState('market');

  // Market: per-endpoint partial-error tracking (FIX #6)
  const [mCats,    setMCats]    = useState(null);
  const [mItems,   setMItems]   = useState(null);
  const [mPrices,  setMPrices]  = useState(null);
  const [mLoading, setMLoading] = useState(true);
  const [mErrors,  setMErrors]  = useState([]);

  // Auctions: categories cached separately (FIX #7)
  const [aCats,     setACats]     = useState(null);
  const [aAuctions, setAAuctions] = useState(null);
  const [aLoadingA, setALoadingA] = useState(true);
  const [aErrCats,  setAErrCats]  = useState(null);
  const [aErrAucts, setAErrAucts] = useState(null);

  function loadMarket() {
    setMLoading(true); setMErrors([]);
    Promise.allSettled([api.marketCategories(), api.marketItems(), api.marketPrices()])
      .then(([cats, items, prices]) => {
        setMCats(  cats.status   === 'fulfilled' ? cats.value   : null);
        setMItems( items.status  === 'fulfilled' ? items.value  : null);
        setMPrices(prices.status === 'fulfilled' ? prices.value : null);
        const errs = [];
        if (cats.status   !== 'fulfilled') errs.push('Kategorien nicht geladen');
        if (items.status  !== 'fulfilled') errs.push('Items nicht geladen');
        if (prices.status !== 'fulfilled') errs.push('Preise nicht geladen');
        setMErrors(errs); setMLoading(false);
      });
  }

  // FIX #7: load categories once; separate function for auctions
  function loadAuctionCategories() {
    api.auctionCategories()
      .then(d => setACats(d))
      .catch(e => setAErrCats(e.message));
  }

  function loadAuctions(cat) {
    setALoadingA(true); setAErrAucts(null);
    api.activeAuctions(cat)
      .then(d => { setAAuctions(d); setALoadingA(false); })
      .catch(e => { setAErrAucts(e.message); setALoadingA(false); });
  }

  useEffect(() => { loadMarket(); loadAuctionCategories(); loadAuctions(); }, []);

  const marketData = {
    categories: mCats, items: mItems, prices: mPrices,
    loading: mLoading, errors: mErrors, reload: loadMarket,
  };
  const auctionData = {
    categories: aCats, auctions: aAuctions,
    loadingAuctions: aLoadingA,
    errCats: aErrCats, errAuctions: aErrAucts,
    reloadAll: () => { loadAuctionCategories(); loadAuctions(); },
    loadByCategory: cat => loadAuctions(cat), // FIX #7: categories NOT re-fetched
  };

  return (
    <div style={{ minHeight:'100vh' }}>
      <header className="hero-bg" role="banner">
        <div style={{ maxWidth:1200, margin:'0 auto', padding:'24px 20px 22px' }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:16, marginBottom:20 }}>
            <div>
              <h1 style={{ fontFamily:'Syne, sans-serif', fontSize:22, fontWeight:800, letterSpacing:'-0.01em', color:'var(--text-primary)', marginBottom:4 }}>
                OPSUCHT <span style={{ color:'var(--gold)' }}>Markt</span> &amp; Auktions Dashboard
              </h1>
              <p style={{ color:'var(--text-muted)', fontSize:13 }}>
                Live-Daten aus der OPSUCHT Wirtschafts-API &middot; Marktpreise &middot; Aktive Auktionen
              </p>
            </div>
            <div style={{ display:'flex', gap:8, alignItems:'center' }}>
              <span style={{ fontSize:11, color:'var(--text-muted)', fontFamily:'DM Mono, monospace' }}>api.opsucht.net</span>
              <span className="badge badge-green" aria-label="Live-Verbindung">&#9679; Live</span>
            </div>
          </div>
          <StatsOverview marketData={marketData} auctionData={auctionData}/>
        </div>
        <div className="gold-line"/>
      </header>

      <main style={{ maxWidth:1200, margin:'0 auto', padding:'24px 20px 48px' }}>
        <nav aria-label="Hauptnavigation">
          <div className="tab-bar" style={{ marginBottom:24, maxWidth:420 }} role="tablist">
            {[['market','Markt'],['auctions','Auktionen'],['raw','Rohdaten']].map(([id, lbl]) => (
              <button
                key={id}
                className={'tab-btn' + (tab===id?' active':'')}
                onClick={()=>setTab(id)}
                role="tab" aria-selected={tab===id}
                id={'tab-'+id} aria-controls={'panel-'+id}
              >{lbl}</button>
            ))}
          </div>
        </nav>

        <div role="tabpanel" id={'panel-'+tab} aria-labelledby={'tab-'+tab}>
          {tab === 'market'   && <MarketSection   marketData={marketData}/>}
          {tab === 'auctions' && <AuctionsSection auctionData={auctionData}/>}
          {tab === 'raw'      && <RawDataSection  marketData={marketData} auctionData={auctionData}/>}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
