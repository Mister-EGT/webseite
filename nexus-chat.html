const MODEL_CATEGORIES = [
  { key: 'all', label: 'Alle' },
  { key: 'fav', label: '★ Favoriten' },
  { key: 'free', label: 'Kostenlos' },
  { key: 'reasoning', label: '🧠 Reasoning' },
  { key: 'multimodal', label: 'Multimodal' },
  { key: 'large', label: '100K+ Kontext' },
  { key: 'openai', label: 'OpenAI' },
  { key: 'anthropic', label: 'Anthropic' },
  { key: 'google', label: 'Google' },
  { key: 'meta', label: 'Meta' },
  { key: 'mistral', label: 'Mistral' },
];

function filterModels() {
  let list = store.models;
  const q = modelFilter.toLowerCase();
  if (q) list = list.filter(m => (m.name || m.id).toLowerCase().includes(q) || m.id.toLowerCase().includes(q));

  if (modelCategory === 'fav') list = list.filter(m => store.favModels.includes(m.id));
  else if (modelCategory === 'free') list = list.filter(m => parseFloat(m.pricing?.prompt || '1') === 0 && parseFloat(m.pricing?.completion || '1') === 0);
  else if (modelCategory === 'reasoning') list = list.filter(m => modelSupportsReasoning(m));
  else if (modelCategory === 'multimodal') list = list.filter(m => m.architecture?.modality?.includes('image') || m.id.includes('vision') || m.architecture?.modality === 'multimodal');
  else if (modelCategory === 'large') list = list.filter(m => (m.context_length || 0) >= 100000);
  else if (['openai','anthropic','google','meta','mistral'].includes(modelCategory)) list = list.filter(m => m.id.toLowerCase().includes(modelCategory));

  return list;
}

// ── FIX: Search no longer loses focus on every keystroke ──
// The previous implementation re-rendered the entire panel (including
// the search input itself) on every input event, which destroyed the
// active element. We now split rendering: the panel scaffolding is
// built once, and only the grid is updated on filter changes.
function renderModelsPanel() {
  const panel = document.getElementById('models-panel');
  if (!panel) return;

  panel.innerHTML = `
    <div class="panel-head">
      <h2>Modelle (${store.models.length})</h2>
      <button class="btn-icon" id="close-models">${IC.x}</button>
    </div>
    <div class="models-search">
      <input type="text" placeholder="Modell suchen…" id="model-search" value="${esc(modelFilter)}" autocomplete="off" autocapitalize="none" spellcheck="false">
      <div class="filter-chips" id="filter-chips">
        ${MODEL_CATEGORIES.map(c => `<span class="filter-chip${modelCategory === c.key ? ' active' : ''}" data-cat="${c.key}">${c.label}</span>`).join('')}
      </div>
    </div>
    <div class="models-grid" id="models-grid"></div>
  `;

  panel.querySelector('#close-models').onclick = () => toggleModels(false);

  const searchInput = panel.querySelector('#model-search');
  // Only update the grid — NOT the whole panel — so the input keeps focus.
  searchInput.addEventListener('input', (e) => {
    modelFilter = e.target.value;
    updateModelsGrid();
  });
  setTimeout(() => {
    if (document.activeElement !== searchInput) searchInput.focus();
  }, 100);

  // Category chip clicks — only update active state + grid
  panel.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      modelCategory = chip.dataset.cat;
      panel.querySelectorAll('.filter-chip').forEach(c => {
        c.classList.toggle('active', c.dataset.cat === modelCategory);
      });
      updateModelsGrid();
    });
  });

    updateModelsGrid();
}

// Renders only the grid content — called on every search keystroke
// and category change. Keeps the search input untouched so focus is
// never lost mid-typing.
function updateModelsGrid() {
  const grid = document.getElementById('models-grid');
  if (!grid) return;

  const chat = store.getChat();
  const currentModel = chat?.model;
  const filtered = filterModels();

  grid.innerHTML = `
    ${filtered.length === 0 ? '<p style="padding:20px;color:var(--text-3);text-align:center">Keine Modelle gefunden</p>' : ''}
    ${filtered.slice(0, 120).map(m => modelCardHtml(m, currentModel)).join('')}
    ${filtered.length > 120 ? `<p style="padding:12px;color:var(--text-3);text-align:center;font-size:.82rem">${filtered.length - 120} weitere Modelle — verfeinere die Suche</p>` : ''}
  `;

  grid.querySelectorAll('.model-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.fav-btn')) return;
      const id = card.dataset.id;
      if (chat) { chat.model = id; store.save(); }
      toggleModels(false);
      render();
      toast(`Modell: ${(store.modelMap[id]?.name || id).split('/').pop()}`, 'success');
    });
  });

  grid.querySelectorAll('.fav-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.dataset.model;
      const idx = store.favModels.indexOf(id);
      if (idx >= 0) store.favModels.splice(idx, 1);
      else store.favModels.push(id);
      store.save();
      // Only re-render the affected card area — but since favorite state
      // can affect the "Favoriten" filter, simply refresh the grid.
      updateModelsGrid();
    });
  });
}

function modelCardHtml(m, currentModel) {
  const isFav = store.favModels.includes(m.id);
  const isSelected = m.id === currentModel;
  const pp = parseFloat(m.pricing?.prompt || '0');
  const cp = parseFloat(m.pricing?.completion || '0');
  const isFree = pp === 0 && cp === 0;
  const provider = m.id.split('/')[0] || '?';
  const ctx = m.context_length || 0;
  const supportsR = modelSupportsReasoning(m);

  const badges = [];
  if (isFree) badges.push('<span class="badge badge-green">Kostenlos</span>');
  if (supportsR) badges.push('<span class="badge badge-reasoning">🧠 Reasoning</span>');
  if (ctx >= 100000) badges.push(`<span class="badge badge-blue">${formatTokens(ctx)} ctx</span>`);
  if (m.architecture?.modality?.includes('image') || m.architecture?.modality === 'multimodal') badges.push('<span class="badge badge-amber">Multimodal</span>');

  return `<div class="model-card${isSelected ? ' selected' : ''}" data-id="${m.id}">
    <div class="mc-top">
      <div style="min-width:0">
        <div class="mc-name">${esc((m.name || m.id).split('/').pop())}</div>
        <div class="mc-provider">${esc(provider)}</div>
      </div>
      <button class="fav-btn${isFav ? ' faved' : ''}" data-model="${m.id}" title="Favorit">${isFav ? IC.starFill : IC.star}</button>
    </div>
    ${badges.length ? `<div class="mc-badges">${badges.join('')}</div>` : ''}
    <div class="mc-stats">
      <span>Prompt: ${isFree ? 'gratis' : '$' + (pp * 1e6).toFixed(2) + '/M'}</span>
      <span>Compl: ${isFree ? 'gratis' : '$' + (cp * 1e6).toFixed(2) + '/M'}</span>
      ${ctx ? `<span>Ctx: ${formatTokens(ctx)}</span>` : ''}
    </div>
  </div>`;
}

  panel.querySelector('#set-clear-chats').onclick = () => {
    if (!confirm('Alle Chats wirklich löschen?')) return;
    store.chats = [];
    store.activeChatId = null;
    store.totalCost = 0;
    store.save();
    toggleSettings(false);
    store.newChat();
    render();
    toast('Alle Chats gelöscht', 'success');
  };

  panel.querySelector('#set-export-all').onclick = () => {
    const data = { settings: store.settings, chats: store.chats, favModels: store.favModels, totalCost: store.totalCost };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'nexus-export.json';
    a.click();
    URL.revokeObjectURL(a.href);
    toast('Daten exportiert', 'success');
  };

  const importFile = panel.querySelector('#import-file');
  panel.querySelector('#set-import-all').onclick = () => importFile.click();
  importFile.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (data.settings) store.settings = { ...DEFAULT_SETTINGS, ...data.settings };
        if (data.chats) store.chats = data.chats;
        if (data.favModels) store.favModels = data.favModels;
        if (data.totalCost != null) store.totalCost = data.totalCost;
        store.activeChatId = store.chats[0]?.id || null;
        document.documentElement.setAttribute('data-theme', store.settings.theme);
        store.save();
        toggleSettings(false);
        render();
        toast('Daten importiert!', 'success');
      } catch { toast('Ungültige JSON-Datei.', 'error'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  });
}

// ────────────────────────────────
// §18  RENAME MODAL
// ────────────────────────────────
function showRenameModal(chatId) {
  const chat = store.chats.find(c => c.id === chatId);
  if (!chat) return;

  const overlay = el('div', { className: 'modal-overlay' });
  const modal = el('div', { className: 'modal' });
  modal.innerHTML = `
    <h2>Chat umbenennen</h2>
    <input type="text" id="rename-input" value="${esc(chat.title)}" maxlength="80">
    <div class="modal-btns">
      <button class="btn-cancel">Abbrechen</button>
      <button class="btn-confirm">Speichern</button>
    </div>
  `;
  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  const inp = modal.querySelector('#rename-input');
  setTimeout(() => { inp.focus(); inp.select(); }, 50);

  const close = () => overlay.remove();
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
  modal.querySelector('.btn-cancel').onclick = close;
  modal.querySelector('.btn-confirm').onclick = () => {
    chat.title = inp.value.trim() || chat.title;
    store.save();
    renderSidebar();
    renderMainHeader();
    close();
  };
  inp.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') modal.querySelector('.btn-confirm').click();
    if (e.key === 'Escape') close();
  });
}

// ────────────────────────────────
// §19  KEYBOARD SHORTCUTS
// ────────────────────────────────
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === 'n') {
    e.preventDefault();
    store.newChat();
    editingMsgId = null;
    render();
    focusInput();
  }
  if (e.key === 'Escape') {
    if (modelsVisible) toggleModels(false);
    else if (settingsVisible) toggleSettings(false);
    else if (editingMsgId) { editingMsgId = null; renderMessages(); }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === '/') {
    e.preventDefault();
    const sb = document.getElementById('chat-search');
    if (sb) { toggleSidebar(true); sb.focus(); }
  }
});

// ────────────────────────────────
// §20  WINDOW RESIZE HANDLER
// ────────────────────────────────
let lastWidth = window.innerWidth;
window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const bd = document.getElementById('sidebar-backdrop');
  if (lastWidth <= 768 && w > 768 && bd) {
    bd.classList.remove('visible');
  }
  if (lastWidth > 768 && w <= 768) {
    const sb = document.getElementById('sidebar');
    if (sb && !sb.classList.contains('collapsed')) {
      sb.classList.add('collapsed');
    }
  }
  lastWidth = w;
});

// ────────────────────────────────
// §21  INIT
// ────────────────────────────────
renderKeyScreen();
</script>
