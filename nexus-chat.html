<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Nexus · OpenRouter Chat</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='7' r='3' fill='%23c98a3c'/><circle cx='7' cy='26' r='3' fill='%23c98a3c'/><circle cx='25' cy='26' r='3' fill='%23c98a3c'/><line x1='16' y1='10' x2='9' y2='23' stroke='%23c98a3c' stroke-width='2'/><line x1='16' y1='10' x2='23' y2='23' stroke='%23c98a3c' stroke-width='2'/><line x1='10' y1='26' x2='22' y2='26' stroke='%23c98a3c' stroke-width='2'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════
   NEXUS DESIGN SYSTEM v3 — CSS
   ═══════════════════════════════════ */

/* ── §1 Design Tokens ── */
:root,[data-theme="dark"]{
  --bg-0:#08080a;--bg-1:#0e0e11;--bg-2:#151518;--bg-3:#1c1c20;--bg-4:#232328;
  --bg-hover:#2a2a30;
  --border-1:#1f1f25;--border-2:#2e2e35;
  --text-1:#eaeaec;--text-2:#9a9aa2;--text-3:#606068;
  --accent:#c98a3c;--accent-h:#dfa050;--accent-dim:rgba(201,138,60,.12);--accent-glow:rgba(201,138,60,.22);
  --green:#3db870;--red:#dc4e4e;--blue:#5a9fea;--orange:#d49030;--purple:#b084e0;
  --radius-s:6px;--radius-m:10px;--radius-l:16px;--radius-xl:24px;
  --shadow-s:0 1px 3px rgba(0,0,0,.4);--shadow-m:0 4px 16px rgba(0,0,0,.45);--shadow-l:0 12px 40px rgba(0,0,0,.55);
  --ff:'Inter',system-ui,-apple-system,sans-serif;
  --fm:'JetBrains Mono','Fira Code',ui-monospace,monospace;
  --sidebar-w:280px;--header-h:52px;--msg-max:780px;
  color-scheme:dark;
}
[data-theme="light"]{
  --bg-0:#efede9;--bg-1:#f5f3f0;--bg-2:#faf9f7;--bg-3:#fff;--bg-4:#fff;
  --bg-hover:#ebe9e5;
  --border-1:#dddad5;--border-2:#ccc9c3;
  --text-1:#18181b;--text-2:#55555d;--text-3:#99999f;
  --accent:#a87125;--accent-h:#bf8430;--accent-dim:rgba(168,113,37,.1);--accent-glow:rgba(168,113,37,.16);
  --purple:#7a38ab;
  --shadow-s:0 1px 3px rgba(0,0,0,.07);--shadow-m:0 4px 16px rgba(0,0,0,.09);--shadow-l:0 12px 40px rgba(0,0,0,.13);
  color-scheme:light;
}

/* ── §2 Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;-webkit-text-size-adjust:100%;scroll-behavior:smooth;
  -webkit-tap-highlight-color:transparent;}
body{font-family:var(--ff);background:var(--bg-0);color:var(--text-1);
  line-height:1.6;overflow:hidden;height:100dvh;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);}
a{color:var(--accent);text-decoration:none}a:hover{color:var(--accent-h))}
a{color:var(--accent);text-decoration:none}a:hover{color:var(--accent-h)}
img,svg{display:block;max-width:100%}
button,input,textarea,select{font:inherit;color:inherit;border:none;background:none;outline:none}
button{cursor:pointer;-webkit-tap-highlight-color:transparent}
ul,ol{list-style:none}
::selection{background:var(--accent-dim);color:var(--accent-h)}

/* ── §3 Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:9px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

/* ── §4 hljs Syntax Theme ── */
.hljs{color:var(--text-1);background:transparent}
.hljs-comment,.hljs-quote{color:#636c76;font-style:italic}
.hljs-keyword,.hljs-selector-tag,.hljs-type{color:#f47067}
.hljs-string,.hljs-attr,.hljs-addition{color:#96d0ff}
.hljs-number,.hljs-literal,.hljs-built_in{color:#6cb6ff}
.hljs-function .hljs-title,.hljs-title.function_{color:#dcbdfb}
.hljs-variable,.hljs-template-variable{color:#f69d50}
.hljs-name,.hljs-tag{color:#7ee787}
.hljs-attribute{color:#d2a8ff}
.hljs-symbol,.hljs-bullet{color:#f69d50}
.hljs-meta{color:#8b949e}
.hljs-deletion{color:#ffa198;background:rgba(255,129,130,.1)}
.hljs-addition{background:rgba(63,185,80,.1)}
.hljs-emphasis{font-style:italic}
.hljs-strong{font-weight:700}
.hljs-section{color:var(--accent);font-weight:700}
[data-theme="light"] .hljs-comment,[data-theme="light"] .hljs-quote{color:#6a737d}
[data-theme="light"] .hljs-keyword,[data-theme="light"] .hljs-selector-tag{color:#d73a49}
[data-theme="light"] .hljs-string{color:#032f62}
[data-theme="light"] .hljs-number,[data-theme="light"] .hljs-literal,[data-theme="light"] .hljs-built_in{color:#005cc5}
[data-theme="light"] .hljs-function .hljs-title,[data-theme="light"] .hljs-title.function_{color:#6f42c1}
[data-theme="light"] .hljs-name,[data-theme="light"] .hljs-tag{color:#22863a}
[data-theme="light"] .hljs-variable{color:#e36209}

/* ── §5 SVG Icon Sizing ── */
.nx-icon{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.nx-icon svg{width:100%;height:100%}
.brand .nx-icon{width:22px;height:22px}
.key-card .logo .nx-icon{width:34px;height:34px}
.btn-icon{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;width:36px;height:36px;border-radius:var(--radius-s);color:var(--text-3);transition:background .15s,color .15s}
.btn-icon:hover{background:var(--bg-hover);color:var(--text-1)}
.btn-icon svg{width:18px;height:18px}
.chat-icon{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;width:18px;height:18px}
.chat-icon svg{width:100%;height:100%}
.sidebar-footer button svg{width:17px;height:17px;flex-shrink:0}
.send-btn svg{width:18px;height:18px}
.attach-btn svg{width:18px;height:18px}
.msg-actions button svg{width:15px;height:15px}
.chat-actions button svg{width:14px;height:14px}
.fav-btn svg{width:16px;height:16px}
.toggle-vis svg{width:18px;height:18px}
.sec-item svg{width:16px;height:16px;flex-shrink:0;margin-top:2px;color:var(--green)}
.code-header button svg{width:14px;height:14px;flex-shrink:0}
.model-sel svg:first-child{width:16px;height:16px;flex-shrink:0}
.model-sel svg:last-child{width:14px;height:14px;flex-shrink:0;opacity:.5}

/* ═══ §6 KEY ENTRY SCREEN ═══ */
#key-screen{position:fixed;inset:0;z-index:900;display:flex;align-items:center;justify-content:center;
  background:var(--bg-0);transition:opacity .5s,visibility .5s;padding:16px}
#key-screen.hidden{opacity:0;visibility:hidden;pointer-events:none}
.key-bg-grad{position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 40%,var(--accent-dim),transparent 70%);pointer-events:none}
.key-card{position:relative;width:100%;max-width:440px;padding:48px 36px 40px;background:var(--bg-2);
  border:1px solid var(--border-1);border-radius:var(--radius-l);
  box-shadow:var(--shadow-l),0 0 80px var(--accent-glow);z-index:1;animation:fadeUp .6s ease}
.key-card .logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
.key-card .logo h1{font-size:1.65rem;font-weight:700;letter-spacing:-.5px}
.key-card .logo span{color:var(--accent)}
.key-card label{display:block;font-size:.82rem;font-weight:500;color:var(--text-2);margin-bottom:8px;letter-spacing:.02em}
.key-input-wrap{position:relative;margin-bottom:20px}
.key-input-wrap input{width:100%;padding:13px 48px 13px 16px;background:var(--bg-1);
  border:1px solid var(--border-2);border-radius:var(--radius-m);
  font-size:.95rem;font-family:var(--fm);transition:border-color .25s,box-shadow .25s;letter-spacing:.03em}
.key-input-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.key-input-wrap .toggle-vis{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  color:var(--text-3);transition:color .2s;border-radius:var(--radius-s)}
.key-input-wrap .toggle-vis:hover{color:var(--text-2);background:var(--bg-hover)}
.key-card .storage-opt{display:flex;align-items:center;gap:8px;margin-bottom:22px;font-size:.82rem;color:var(--text-2)}
.key-card .storage-opt input[type=checkbox]{accent-color:var(--accent);width:18px;height:18px;flex-shrink:0;cursor:pointer}
.key-card .storage-opt label{cursor:pointer}
.btn-primary{width:100%;padding:13px 0;border-radius:var(--radius-m);background:var(--accent);
  color:#fff;font-weight:600;font-size:.95rem;transition:background .2s,transform .15s,box-shadow .2s;letter-spacing:.01em}
.btn-primary:hover{background:var(--accent-h);box-shadow:0 4px 20px var(--accent-glow)}
.btn-primary:active{transform:scale(.985)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.key-card .sec-info{margin-top:24px;padding-top:20px;border-top:1px solid var(--border-1)}
.key-card .sec-item{display:flex;align-items:flex-start;gap:10px;font-size:.78rem;
  color:var(--text-3);margin-bottom:10px;line-height:1.5}

/* ═══ §7 MAIN LAYOUT ═══ */
#app-main{display:flex;height:100dvh;opacity:0;visibility:hidden;transition:opacity .5s,visibility .5s}
#app-main.visible{opacity:1;visibility:visible}

/* ── Sidebar ── */
.sidebar{width:var(--sidebar-w);height:100%;display:flex;flex-direction:column;
  background:var(--bg-1);border-right:1px solid var(--border-1);flex-shrink:0;
  transition:transform .3s ease;z-index:700}
.sidebar.collapsed{transform:translateX(calc(-1 * var(--sidebar-w)))}
.sidebar-backdrop{display:none}
.sidebar-head{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border-1);flex-shrink:0}
.sidebar-head .brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:1.05rem}
.sidebar-head .brand span{color:var(--accent)}
.sidebar-actions{padding:12px 12px 8px;display:flex;gap:6px;flex-shrink:0}
.btn-new-chat{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;
  padding:10px 14px;border-radius:var(--radius-s);font-size:.82rem;font-weight:500;
  background:var(--accent-dim);color:var(--accent);transition:background .15s,color .15s}
.btn-new-chat svg{width:16px;height:16px}
.btn-new-chat:hover{background:var(--accent);color:#fff}
.sidebar-search{padding:0 12px 10px;flex-shrink:0}
.sidebar-search input{width:100%;padding:9px 12px;background:var(--bg-0);
  border:1px solid var(--border-1);border-radius:var(--radius-s);font-size:.82rem;transition:border-color .2s}
.sidebar-search input:focus{border-color:var(--accent)}
.chat-list{flex:1;overflow-y:auto;padding:4px 8px}
.chat-list-section{margin-bottom:6px}
.chat-list-section .section-label{font-size:.7rem;font-weight:600;text-transform:uppercase;
  letter-spacing:.08em;color:var(--text-3);padding:10px 10px 4px}
.chat-item{display:flex;align-items:center;gap:8px;padding:10px 12px;
  border-radius:var(--radius-s);cursor:pointer;transition:background .15s;position:relative}
.chat-item:hover{background:var(--bg-hover)}
.chat-item.active{background:var(--accent-dim)}
.chat-item .chat-icon{color:var(--text-3)}
.chat-item.active .chat-icon{color:var(--accent)}
.chat-item .chat-title{flex:1;font-size:.84rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-item .chat-actions{display:flex;gap:2px;opacity:0;transition:opacity .15s;flex-shrink:0}
.chat-item:hover .chat-actions{opacity:1}
.chat-item .chat-actions button{width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  border-radius:4px;color:var(--text-3);transition:background .15s,color .15s}
.chat-item .chat-actions button:hover{background:var(--bg-4);color:var(--text-1)}
.sidebar-footer{padding:12px;border-top:1px solid var(--border-1);display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.sidebar-footer button{display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:var(--radius-s);font-size:.82rem;color:var(--text-2);
  transition:background .15s,color .15s;width:100%;text-align:left}
.sidebar-footer button:hover{background:var(--bg-hover);color:var(--text-1)}

/* ── Main Area ── */
.main-area{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
.main-header{height:var(--header-h);padding:0 16px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--border-1);
  background:var(--bg-1);flex-shrink:0;gap:8px}
.main-header .left{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
.main-header .model-sel{display:flex;align-items:center;gap:8px;padding:6px 12px;
  background:var(--bg-3);border:1px solid var(--border-1);border-radius:var(--radius-s);
  font-size:.84rem;font-weight:500;cursor:pointer;transition:border-color .2s,background .15s;
  max-width:320px;min-width:0}
.main-header .model-sel:hover{border-color:var(--accent);background:var(--bg-4)}
.main-header .model-sel .model-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.main-header .right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:99px;
  font-size:.7rem;font-weight:600;letter-spacing:.02em;white-space:nowrap}
.badge-amber{background:var(--accent-dim);color:var(--accent)}
.badge-green{background:rgba(61,184,112,.12);color:var(--green)}
.badge-blue{background:rgba(90,159,234,.12);color:var(--blue)}
.badge-reasoning{background:rgba(156,89,209,.14);color:var(--purple)}
[data-theme="light"] .badge-reasoning{background:rgba(128,56,184,.1);color:var(--purple)}

/* ═══ §8 CHAT MESSAGES ═══ */
.chat-container{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;
  scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
.chat-messages{max-width:var(--msg-max);width:100%;margin:0 auto;display:flex;flex-direction:column;gap:6px;flex:1}
.msg{position:relative;padding:14px 18px;border-radius:var(--radius-m);
  font-size:.92rem;line-height:1.72;animation:fadeUp .3s ease}
.msg-user{background:var(--accent-dim);border:1px solid rgba(201,138,60,.1);
  align-self:flex-end;max-width:85%;border-bottom-right-radius:4px}
.msg-assistant{background:var(--bg-2);border:1px solid var(--border-1);
  align-self:flex-start;max-width:92%;border-bottom-left-radius:4px}
.msg-system{background:var(--bg-3);border:1px solid var(--border-2);
  border-left:3px solid var(--accent);font-size:.85rem;color:var(--text-2);align-self:stretch}
.msg-role{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;
  color:var(--text-3);margin-bottom:4px}
.msg-meta{display:flex;align-items:center;gap:10px;margin-top:10px;font-size:.72rem;
  color:var(--text-3);flex-wrap:wrap}
.msg-actions{display:flex;gap:2px;margin-left:auto;opacity:0;transition:opacity .15s}
.msg:hover .msg-actions,.msg .msg-actions.touch-visible{opacity:1}
.msg-actions button{width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius-s);color:var(--text-3);transition:background .15s,color .15s}
.msg-actions button:hover{background:var(--bg-hover);color:var(--text-1)}
.msg-error{background:rgba(220,78,78,.08);border-color:rgba(220,78,78,.2);color:var(--red)}
.typing-indicator{display:inline-flex;gap:4px;padding:4px 0}
.typing-indicator span{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:blink 1.4s infinite both}
.typing-indicator span:nth-child(2){animation-delay:.2s}
.typing-indicator span:nth-child(3){animation-delay:.4s}

/* ── Markdown in Messages ── */
.msg-content{overflow-wrap:break-word;word-break:break-word}
.msg-content p{margin-bottom:.6em}
.msg-content p:last-child{margin-bottom:0}
.msg-content strong{font-weight:600}
.msg-content em{font-style:italic}
.msg-content ul,.msg-content ol{padding-left:1.4em;margin-bottom:.6em}
.msg-content li{margin-bottom:.25em}
.msg-content ol{list-style:decimal}
.msg-content ul{list-style:disc}
.msg-content blockquote{border-left:3px solid var(--accent);padding:4px 14px;margin:8px 0;
  color:var(--text-2);background:var(--accent-dim);border-radius:0 var(--radius-s) var(--radius-s) 0}
.msg-content a{color:var(--accent);text-decoration:underline;text-underline-offset:2px}
.msg-content table{border-collapse:collapse;margin:8px 0;font-size:.85rem;width:100%;display:block;overflow-x:auto}
.msg-content th,.msg-content td{border:1px solid var(--border-2);padding:6px 10px;text-align:left}
.msg-content th{background:var(--bg-3);font-weight:600}
.msg-content h1,.msg-content h2,.msg-content h3,.msg-content h4{font-weight:600;margin:16px 0 8px;line-height:1.3}
.msg-content h1{font-size:1.3rem}
.msg-content h2{font-size:1.15rem}
.msg-content h3{font-size:1.05rem}
.msg-content h4{font-size:.95rem}
.msg-content code:not(pre code){background:var(--bg-4);padding:2px 6px;border-radius:4px;
  font-size:.84em;font-family:var(--fm)}
.msg-content pre{margin:10px 0;border-radius:var(--radius-s);overflow:hidden;border:1px solid var(--border-1)}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;
  background:var(--bg-4);font-size:.73rem;font-weight:500;color:var(--text-3);
  border-bottom:1px solid var(--border-1)}
.code-header button{display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--text-3);
  padding:4px 8px;border-radius:4px;transition:background .15s,color .15s}
.code-header button:hover{background:var(--bg-hover);color:var(--text-1)}
.msg-content pre code{display:block;padding:14px 16px;background:var(--bg-1);
  font-size:.82rem;font-family:var(--fm);line-height:1.6;overflow-x:auto;white-space:pre}
.msg-content hr{border:none;border-top:1px solid var(--border-1);margin:12px 0}
.msg-content img{max-width:100%;border-radius:var(--radius-s);margin:8px 0}

/* ═══ §9 REASONING / THINKING BLOCK ═══ */
.reasoning-block{
  margin-bottom:14px;border-radius:var(--radius-m);overflow:hidden;
  border:1px solid rgba(201,138,60,.18);
  background:linear-gradient(135deg,rgba(201,138,60,.03),rgba(201,138,60,.07));
}
[data-theme="light"] .reasoning-block{
  border-color:rgba(168,113,37,.22);
  background:linear-gradient(135deg,rgba(168,113,37,.03),rgba(168,113,37,.08));
}
.reasoning-hdr{
  display:flex;align-items:center;gap:8px;padding:11px 14px;
  font-size:.82rem;font-weight:500;color:var(--accent);cursor:pointer;
  transition:background .15s;user-select:none;width:100%;text-align:left;
  background:transparent;
}
.reasoning-hdr:hover{background:rgba(201,138,60,.08)}
.reasoning-hdr .r-icon{width:16px;height:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:color .2s}
.reasoning-hdr .r-icon svg{width:16px;height:16px}
.reasoning-hdr .r-label{flex:1;display:flex;align-items:center;gap:8px}
.reasoning-hdr .r-meta{font-size:.7rem;color:var(--text-3);font-family:var(--fm);font-weight:400;white-space:nowrap}
.reasoning-hdr .r-timer{
  font-family:var(--fm);font-size:.7rem;color:var(--accent);
  background:rgba(201,138,60,.15);padding:2px 9px;border-radius:99px;
  font-weight:500;white-space:nowrap;letter-spacing:.02em;
}
.reasoning-hdr .r-chevron{width:14px;height:14px;transition:transform .3s ease;opacity:.5;flex-shrink:0}
.reasoning-hdr .r-chevron svg{width:14px;height:14px}
.reasoning-hdr.expanded .r-chevron{transform:rotate(180deg);opacity:.8}

/* Smooth animated body with grid trick */
.reasoning-body-wrap{
  display:grid;grid-template-rows:0fr;transition:grid-template-rows .35s cubic-bezier(.4,0,.2,1);
}
.reasoning-body-wrap.expanded{grid-template-rows:1fr}
.reasoning-body{overflow:hidden;min-height:0}
.reasoning-body-inner{
  padding:0 14px 14px;font-size:.84rem;color:var(--text-2);line-height:1.65;
  max-height:500px;overflow-y:auto;
}
.reasoning-body-inner .msg-content{font-size:.84rem;color:var(--text-2)}

/* Streaming pulse on the reasoning block */
.reasoning-block.streaming{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent-dim)}
.reasoning-block.streaming .r-icon{color:var(--accent);animation:rBrainPulse 1.8s ease-in-out infinite}
@keyframes rBrainPulse{
  0%,100%{opacity:.7;transform:scale(1)}
  50%{opacity:1;transform:scale(1.15)}
}

/* Reasoning Timeline — steps with dots, lines and icons */
.r-timeline{padding:4px 0 2px 0}
.r-step{
  position:relative;padding:5px 0 10px 22px;
  font-size:.84rem;line-height:1.6;color:var(--text-2);
  animation:fadeUp .3s ease;
}
.r-step::before{
  content:'';position:absolute;left:3px;top:10px;
  width:9px;height:9px;border-radius:50%;
  background:var(--border-2);z-index:1;
  transition:background .3s,box-shadow .3s,transform .3s;
}
.r-step::after{
  content:'';position:absolute;left:7px;top:20px;
  bottom:-4px;width:1px;background:var(--border-2);opacity:.7;
}
.r-step:last-child::after{display:none}
.r-step.completed::before{
  background:var(--accent);opacity:.85;
}
.r-step.active::before{
  background:var(--accent);opacity:1;
  box-shadow:0 0 0 4px var(--accent-dim);
  animation:rDotPulse 1.2s ease-in-out infinite;
}
@keyframes rDotPulse{
  0%,100%{box-shadow:0 0 0 4px var(--accent-dim)}
  50%{box-shadow:0 0 0 8px rgba(201,138,60,.08)}
}
.r-step-md > *:first-child{margin-top:0}
.r-step-md > *:last-child{margin-bottom:0}
.r-step-md p{margin-bottom:.35em}
.r-step-md p:last-child{margin-bottom:0}

/* ═══ §10 REASONING BUTTON in input ═══ */
.reasoning-btn{
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius-s);color:var(--text-3);
  transition:background .15s,color .15s;flex-shrink:0;position:relative;
}
.reasoning-btn svg{width:18px;height:18px}
.reasoning-btn:hover{background:var(--bg-hover);color:var(--text-1)}
.reasoning-btn.active{color:var(--accent)}
.reasoning-btn .r-badge{
  position:absolute;top:1px;right:1px;font-size:.55rem;font-weight:700;
  background:var(--accent);color:#fff;width:15px;height:15px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;line-height:1;
  box-shadow:0 1px 3px rgba(0,0,0,.3);
  pointer-events:none;
}

/* ═══ §11 CHAT INPUT ═══ */
.chat-input-area{padding:12px 16px 16px;background:var(--bg-1);border-top:1px solid var(--border-1);
  flex-shrink:0;padding-bottom:calc(16px + env(safe-area-inset-bottom))}
.chat-input-wrap{max-width:var(--msg-max);margin:0 auto;position:relative}
.attached-preview{display:flex;gap:8px;padding:8px 8px 6px;flex-wrap:wrap}
.attached-chip{display:flex;align-items:center;gap:6px;padding:4px 10px 4px 6px;
  background:var(--bg-3);border:1px solid var(--border-2);border-radius:var(--radius-s);
  font-size:.75rem;color:var(--text-2)}
.attached-chip img{width:24px;height:24px;object-fit:cover;border-radius:3px}
.attached-chip button{width:18px;height:18px;display:flex;align-items:center;justify-content:center;
  border-radius:3px;color:var(--text-3);transition:color .15s}
.attached-chip button:hover{color:var(--red)}
.attached-chip button svg{width:12px;height:12px}
.chat-input-box{display:flex;align-items:center;gap:8px;background:var(--bg-2);
  border:1px solid var(--border-2);border-radius:var(--radius-m);padding:10px 12px;
  transition:border-color .25s,box-shadow .25s}
.chat-input-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.chat-input-box textarea{flex:1;resize:none;background:none;font-size:.92rem;line-height:1.55;
  max-height:200px;min-height:24px;overflow-y:auto;padding:2px 0}
.chat-input-box textarea::placeholder{color:var(--text-3)}
.chat-input-box .send-btn{width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius-s);background:var(--accent);color:#fff;
  transition:background .2s,transform .15s;flex-shrink:0;align-self:flex-end}
.chat-input-box .send-btn:hover{background:var(--accent-h)}
.chat-input-box .send-btn:active{transform:scale(.92)}
.chat-input-box .send-btn:disabled{opacity:.35;cursor:not-allowed}
.chat-input-box .send-btn.stop{background:var(--red)}
.chat-input-box .attach-btn{width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius-s);color:var(--text-3);transition:background .15s,color .15s;flex-shrink:0}
.chat-input-box .attach-btn:hover{background:var(--bg-hover);color:var(--text-1)}
.input-info{display:flex;align-items:center;justify-content:space-between;margin-top:6px;
  font-size:.72rem;color:var(--text-3);padding:0 4px}

/* ═══ §12 EMPTY STATE ═══ */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:40px 20px;gap:16px}
.empty-state .empty-icon{width:56px;height:56px;color:var(--border-2)}
.empty-state .empty-icon svg{width:100%;height:100%}
.empty-state h3{font-size:1.15rem;font-weight:600;color:var(--text-2)}
.empty-state p{font-size:.85rem;color:var(--text-3);max-width:360px;line-height:1.6}

/* ═══ §13 MODELS PANEL ═══ */
.panel-overlay{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  opacity:0;visibility:hidden;transition:opacity .25s,visibility .25s}
.panel-overlay.visible{opacity:1;visibility:visible}
.models-panel{position:fixed;top:0;right:0;bottom:0;width:min(680px,100%);z-index:801;
  background:var(--bg-1);border-left:1px solid var(--border-1);
  transform:translateX(100%);transition:transform .3s ease;
  display:flex;flex-direction:column;box-shadow:var(--shadow-l)}
.models-panel.visible{transform:translateX(0)}
.panel-head{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border-1);flex-shrink:0}
.panel-head h2{font-size:1.1rem;font-weight:600}
.models-search{padding:12px 16px;display:flex;flex-direction:column;gap:8px;
  border-bottom:1px solid var(--border-1);flex-shrink:0}
.models-search input{width:100%;padding:10px 14px;background:var(--bg-2);border:1px solid var(--border-1);
  border-radius:var(--radius-s);font-size:.88rem;transition:border-color .2s}
.models-search input:focus{border-color:var(--accent)}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap}
.filter-chip{padding:5px 12px;border-radius:99px;font-size:.74rem;font-weight:500;
  background:var(--bg-3);border:1px solid var(--border-1);cursor:pointer;
  transition:all .15s;white-space:nowrap}
.filter-chip:hover{border-color:var(--accent)}
.filter-chip.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.models-grid{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px;
  -webkit-overflow-scrolling:touch}
.model-card{padding:14px 16px;background:var(--bg-2);border:1px solid var(--border-1);
  border-radius:var(--radius-m);cursor:pointer;transition:border-color .2s,background .15s}
.model-card:hover{border-color:var(--accent);background:var(--bg-3)}
.model-card.selected{border-color:var(--accent);background:var(--accent-dim)}
.model-card .mc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:4px}
.model-card .mc-name{font-size:.88rem;font-weight:600;line-height:1.3;word-break:break-word}
.model-card .mc-provider{font-size:.73rem;color:var(--text-3);font-weight:500;margin-top:1px}
.model-card .mc-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.model-card .mc-stats{display:flex;gap:12px;margin-top:8px;font-size:.72rem;color:var(--text-3);flex-wrap:wrap}
.model-card .mc-stats span{display:flex;align-items:center;gap:4px;white-space:nowrap}
.model-card .fav-btn{color:var(--text-3);transition:color .15s;flex-shrink:0;width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;border-radius:var(--radius-s)}
.model-card .fav-btn:hover,.model-card .fav-btn.faved{color:var(--accent)}

/* ═══ §14 SETTINGS PANEL ═══ */
.settings-panel{position:fixed;top:0;right:0;bottom:0;width:min(420px,100%);z-index:801;
  background:var(--bg-1);border-left:1px solid var(--border-1);
  transform:translateX(100%);transition:transform .3s ease;
  display:flex;flex-direction:column;box-shadow:var(--shadow-l)}
.settings-panel.visible{transform:translateX(0)}
.settings-body{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
.setting-section{margin-bottom:28px}
.setting-section h3{font-size:.82rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;
  color:var(--text-3);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border-1)}
.setting-row{margin-bottom:16px}
.setting-row label{display:flex;align-items:center;justify-content:space-between;
  font-size:.85rem;margin-bottom:6px;color:var(--text-2)}
.setting-row label span.val{font-family:var(--fm);font-size:.8rem;color:var(--accent);font-weight:500;
  min-width:52px;text-align:right}
.setting-row input[type=range]{width:100%;accent-color:var(--accent);height:8px;cursor:pointer;
  -webkit-appearance:none;appearance:none;background:var(--bg-4);border-radius:4px;margin-top:4px}
.setting-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;
  width:18px;height:18px;background:var(--accent);border-radius:50%;cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,.3)}
.setting-row input[type=range]::-moz-range-thumb{width:18px;height:18px;background:var(--accent);
  border:none;border-radius:50%;cursor:pointer}
.setting-row input[type=number],.setting-row input[type=text]{width:100%;padding:10px 12px;
  background:var(--bg-2);border:1px solid var(--border-1);border-radius:var(--radius-s);
  font-size:.85rem;transition:border-color .2s}
.setting-row input:focus{border-color:var(--accent)}
.setting-row textarea{width:100%;padding:10px 12px;background:var(--bg-2);border:1px solid var(--border-1);
  border-radius:var(--radius-s);font-size:.85rem;resize:vertical;min-height:80px;
  transition:border-color .2s;line-height:1.55}
.setting-row textarea:focus{border-color:var(--accent)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;
  border-bottom:1px solid var(--border-1);gap:16px}
.toggle-row:last-child{border-bottom:none}
.toggle-row .tl{font-size:.85rem}
.toggle-row .td{font-size:.73rem;color:var(--text-3);margin-top:2px}
.switch{position:relative;width:44px;height:26px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0;position:absolute}
.switch .slider{position:absolute;inset:0;background:var(--bg-4);border:1.5px solid var(--border-2);
  border-radius:99px;cursor:pointer;transition:background .25s,border-color .25s}
.switch .slider::before{content:'';position:absolute;width:20px;height:20px;left:2px;top:50%;
  transform:translateY(-50%);background:var(--text-3);border-radius:50%;transition:transform .25s,background .25s}
.switch input:checked+.slider{background:var(--accent-dim);border-color:var(--accent)}
.switch input:checked+.slider::before{transform:translate(18px,-50%);background:var(--accent)}

/* ═══ §15 DEBUG PANEL ═══ */
.debug-panel{background:var(--bg-1);border:1px solid var(--border-1);border-radius:var(--radius-s);
  margin-top:10px;overflow:hidden}
.debug-toggle{padding:8px 12px;font-size:.74rem;font-weight:500;color:var(--text-3);cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:color .15s;user-select:none}
.debug-toggle:hover{color:var(--text-2)}
.debug-content{padding:0 12px 12px;font-family:var(--fm);font-size:.73rem;line-height:1.5;
  color:var(--text-2);white-space:pre-wrap;overflow-x:auto;max-height:300px;overflow-y:auto;word-break:break-all}

/* ═══ §16 TOAST ═══ */
.toast-container{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));right:16px;
  z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:calc(100vw - 32px)}
.toast{padding:12px 18px;background:var(--bg-3);border:1px solid var(--border-2);
  border-radius:var(--radius-m);box-shadow:var(--shadow-m);font-size:.84rem;
  animation:slideUp .3s ease;display:flex;align-items:center;gap:10px;
  max-width:360px;transition:opacity .3s,transform .3s}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
.toast.info{border-color:var(--blue);color:var(--blue)}

/* ═══ §17 MODAL ═══ */
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .2s ease}
.modal{background:var(--bg-2);border:1px solid var(--border-1);border-radius:var(--radius-l);
  box-shadow:var(--shadow-l);padding:28px;max-width:440px;width:100%;animation:fadeUp .3s ease}
.modal h2{font-size:1.1rem;font-weight:600;margin-bottom:16px}
.modal input[type=text]{width:100%;padding:10px 12px;background:var(--bg-1);border:1px solid var(--border-2);
  border-radius:var(--radius-s);font-size:.9rem;margin-bottom:16px;transition:border-color .2s}
.modal input:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btns button{padding:10px 20px;border-radius:var(--radius-s);font-size:.85rem;font-weight:500;transition:background .15s}
.modal-btns .btn-cancel{color:var(--text-2)}
.modal-btns .btn-cancel:hover{background:var(--bg-hover)}
.modal-btns .btn-confirm{background:var(--accent);color:#fff}
.modal-btns .btn-confirm:hover{background:var(--accent-h)}
.modal-btns .btn-danger{background:var(--red);color:#fff}
.modal-btns .btn-danger:hover{background:#e56060}

/* ═══ §18 ANIMATIONS ═══ */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-spin{animation:spin .8s linear infinite}

/* ═══ §19 RESPONSIVE — TABLET ═══ */
@media(max-width:1024px){
  :root{--sidebar-w:260px}
}

/* ═══ §20 RESPONSIVE — MOBILE ═══ */
@media(max-width:768px){
  :root{--sidebar-w:85vw;--msg-max:100%;--header-h:48px}
  html{font-size:14.5px}

  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);
    transition:transform .3s cubic-bezier(.4,0,.2,1);
    box-shadow:var(--shadow-l);max-width:320px;width:var(--sidebar-w)}
  .sidebar:not(.collapsed){transform:translateX(0)}
  .sidebar.collapsed{transform:translateX(-100%)}

  .sidebar-backdrop{display:block;position:fixed;inset:0;background:rgba(0,0,0,.5);
    z-index:699;opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s;
    -webkit-tap-highlight-color:transparent}
  .sidebar-backdrop.visible{opacity:1;visibility:visible}

  .main-header{padding:0 12px}
  .main-header .model-sel{max-width:200px;padding:6px 10px;font-size:.8rem}
  .main-header .right .badge{display:none}

  .chat-container{padding:16px 10px}
  .msg{padding:12px 14px;font-size:.88rem}
  .msg-user{max-width:92%}
  .msg-assistant{max-width:100%}
  .msg-actions{opacity:1}

  .chat-input-area{padding:10px 10px 12px;padding-bottom:calc(12px + env(safe-area-inset-bottom))}
  .chat-input-box{padding:8px 10px}
  .chat-input-box textarea{font-size:.88rem}

  .models-panel,.settings-panel{width:100%}
  .models-search{padding:10px 12px}
  .models-grid{padding:10px 12px}

  .key-card{padding:32px 24px 28px}
  .key-card .logo h1{font-size:1.4rem}

  .chat-item .chat-actions{opacity:1}

  .input-info .desktop-only{display:none}
}

@media(max-width:380px){
  .key-card{padding:28px 18px 24px}
  .main-header .model-sel{max-width:150px}
}

/* ═══ §21 TOUCH DEVICE ADJUSTMENTS ═══ */
@media(hover:none){
  .msg-actions{opacity:1}
  .chat-item .chat-actions{opacity:1}
  .btn-icon{min-width:44px;min-height:44px}
  .chat-item{padding:12px}
  .chat-item .chat-actions button{width:36px;height:36px}
  .msg-actions button{width:36px;height:36px}
  .send-btn,.attach-btn,.reasoning-btn{min-width:44px;min-height:44px}
}
</style>
</head>
<body>

<div id="key-screen"></div>
<div id="app-main"></div>
<div class="toast-container" id="toasts"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>

<script>
/* ═══════════════════════════════════════════════════

// ────────────────────────────────
// §1  SVG ICONS
// ────────────────────────────────
const IC = {

const $ = (s, p) => (p || document).querySelector(s);
const $$ = (s, p) => [...(p || document).querySelectorAll(s)];
const uuid = () => crypto.randomUUID ? crypto.randomUUID() : 'xxxx-xxxx-4xxx'.replace(/x/g, () => (Math.random()*16|0).toString(16));
const esc = (s) => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };

function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'className') e.className = v;
    else if (k === 'innerHTML') e.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else if (c) e.appendChild(c);
  }
  return e;
}

function formatCost(n) {
  if (!n || n <= 0) return '$0.00';
  if (n < 0.0001) return '< $0.0001';
  if (n < 0.01) return '$' + n.toFixed(4);
  return '$' + n.toFixed(4);
}

function formatTokens(n) {
  if (!n) return '0';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(0) + 'K';
  return String(n);
}

function formatDate(ts) {
  const d = new Date(ts);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) return d.toLocaleTimeString('de', {hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('de', {day:'numeric',month:'short'});
}

function toast(msg, type = 'info') {
  const c = document.getElementById('toasts');
  const t = el('div', {className: `toast ${type}`});
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(10px)'; setTimeout(() => t.remove(), 300); }, 3500);
}

// §4  OPENROUTER API CLIENT
// ────────────────────────────────
const API_BASE = 'https://openrouter.ai/api/v1';

async function fetchModels() {
  const r = await fetch(`${API_BASE}/models`);
  if (!r.ok) throw new Error(`Fehler ${r.status}: ${r.statusText}`);
  const j = await r.json();
  store.models = (j.data || []).sort((a, b) => (a.name || a.id).localeCompare(b.name || b.id));
  store.modelMap = {};
  store.models.forEach(m => store.modelMap[m.id] = m);
  return store.models;
}

async function validateKey() {
  try {
    const r = await fetch(`${API_BASE}/auth/key`, { headers: { 'Authorization': `Bearer ${store.apiKey}` } });
    return r.ok;
  } catch { return false; }
}

// ── Reasoning support detection ──
// Checks whether a model supports reasoning / extended thinking.
function modelSupportsReasoning(model) {
  if (!model) return false;
  // 1. OpenRouter's supported_parameters is the authoritative signal
  if (Array.isArray(model.supported_parameters)) {
    const sp = model.supported_parameters;
    if (sp.includes('reasoning') ||
        sp.includes('include_reasoning') ||
        sp.includes('reasoning_effort')) return true;
  }
  // 2. Fallback: known reasoning-capable model patterns
  const id = (model.id || '').toLowerCase();
  const name = (model.name || '').toLowerCase();
  const combined = id + ' ' + name;
  const patterns = [
    /\bo1\b/, /\bo1-/, /\/o1/,
    /\bo3\b/, /\bo3-/, /\/o3/,
    /\bo4-mini/, /\/o4/,
    /deepseek-r1/, /deepseek\/deepseek-r1/, /\br1-/,
    /thinking/, /reasoning/, /\bqwq\b/,
    /grok-3-mini/, /grok-4/,
    /claude-3\.?7/, /claude-opus-4/, /claude-sonnet-4/, /claude-3-7/,
    /gpt-5/, /gemini-2\.5/, /gemini-2\.0-flash-thinking/,
    /magistral/, /phi-4-reasoning/,
  ];
  return patterns.some(p => p.test(combined));
}

// Returns the effort levels supported by a model. Currently OpenRouter
// abstracts this across providers, so reasoning-capable models generally
// accept low/medium/high (Anthropic models translate to thinking budget).
function getReasoningEfforts(model) {
  if (!modelSupportsReasoning(model)) return [];
  return ['low', 'medium', 'high'];
}

/**
 * @param {function} onToken - (text, type:'content'|'reasoning')
 */
async function streamChat(messages, model, params, onToken, onDone, onError) {
  const ctrl = new AbortController();
  store.abortCtrl = ctrl;
  store.isStreaming = true;

  const body = {
    model,
    messages,
    stream: params.streaming !== false,
  };
  if (params.temperature != null && params.temperature !== 1) body.temperature = params.temperature;
  if (params.topP != null && params.topP !== 1) body.top_p = params.topP;
  if (params.maxTokens > 0) body.max_tokens = params.maxTokens;
  if (params.presencePenalty) body.presence_penalty = params.presencePenalty;
  if (params.frequencyPenalty) body.frequency_penalty = params.frequencyPenalty;

  // Reasoning / Extended Thinking (only sent when the model supports it — see sendChatMessage)
  if (params.reasoningEnabled && params.reasoningEffort) {
    body.reasoning = { effort: params.reasoningEffort };
  }

  const reqDebug = { url: `${API_BASE}/chat/completions`, body: JSON.parse(JSON.stringify(body)) };

  try {
    const r = await fetch(`${API_BASE}/chat/completions`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${store.apiKey}`,
        'HTTP-Referer': location.href,
        'X-Title': 'Nexus',
      },
      body: JSON.stringify(body),
      signal: ctrl.signal,
    });

    if (!r.ok) {
      const err = await r.json().catch(() => ({ error: { message: r.statusText } }));
      throw new Error(err.error?.message || `HTTP ${r.status}`);
    }

    if (!body.stream) {
      const j = await r.json();
      const content = j.choices?.[0]?.message?.content || '';
      const reasoning = j.choices?.[0]?.message?.reasoning || j.choices?.[0]?.message?.reasoning_content || '';
      if (reasoning) onToken(reasoning, 'reasoning');
      onToken(content, 'content');
      onDone({ usage: j.usage || {}, debug: { request: reqDebug, response: j } });
      return;
    }

    const reader = r.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    let fullResp = [];
    let usage = null;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop() || '';

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || !trimmed.startsWith('data: ')) continue;
        const data = trimmed.slice(6);
        if (data === '[DONE]') {
          onDone({ usage, debug: { request: reqDebug, response: fullResp } });
          store.isStreaming = false;
          store.abortCtrl = null;
          return;
        }
        try {
          const p = JSON.parse(data);
          fullResp.push(p);
          const c = p.choices?.[0]?.delta?.content;
          const rt = p.choices?.[0]?.delta?.reasoning || p.choices?.[0]?.delta?.reasoning_content;
          if (rt) onToken(rt, 'reasoning');
          if (c) onToken(c, 'content');
          if (p.usage) usage = p.usage;
        } catch {}
      }
    }
    onDone({ usage, debug: { request: reqDebug, response: fullResp } });
  } catch (e) {
    if (e.name === 'AbortError') {
      onDone({ usage: null, debug: { request: reqDebug, response: 'ABORTED' } });
    } else {
      onError(e);
    }
  } finally {
    store.isStreaming = false;
    store.abortCtrl = null;
  }
}

marked.use({ breaks: true, gfm: true });

function renderMd(text) {
  let html = marked.parse(text || '');
  html = html.replace(/<pre><code class="language-([\w+-]+)">/g, (match, lang) =>
    `<pre><div class="code-header"><span>${esc(lang)}</span><button onclick="nxCopyCode(this)">${IC.copy} Kopieren</button></div><code class="language-${lang}">`
  );
  html = html.replace(/<pre><code>(?!<\/code>)/g,
    `<pre><div class="code-header"><span>code</span><button onclick="nxCopyCode(this)">${IC.copy} Kopieren</button></div><code>`
  );
  return html;
}

function highlightCode(container) {
  if (!container || !hljs) return;
  container.querySelectorAll('pre code').forEach(block => {
    if (!block.dataset.highlighted) hljs.highlightElement(block);
  });
}

window.nxCopyCode = function(btn) {
  const code = btn.closest('pre')?.querySelector('code');
  if (!code) return;
  navigator.clipboard.writeText(code.textContent).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = `${IC.check} Kopiert!`;
    setTimeout(() => { btn.innerHTML = orig; }, 1500);
  });
};

/** Global reasoning toggle */
window.nxToggleReasoning = function(btn) {
  const hdr = btn;
  const wrap = hdr.parentElement.querySelector('.reasoning-body-wrap');
  const chev = hdr.querySelector('.r-chevron');
  const isExpanded = hdr.classList.contains('expanded');
  if (isExpanded) {
    hdr.classList.remove('expanded');
    if (wrap) wrap.classList.remove('expanded');
    if (chev) chev.classList.remove('expanded');
  } else {
    hdr.classList.add('expanded');
    if (wrap) wrap.classList.add('expanded');
    if (chev) chev.classList.add('expanded');
  }
};

// Reasoning effort cycle
const REASONING_CYCLE = ['off', 'low', 'medium', 'high'];

// Reasoning live timer state
let reasoningStartTime = null;
let reasoningTimerInterval = null;

function startReasoningTimer() {
  if (reasoningTimerInterval) return;
  reasoningStartTime = Date.now();
  reasoningTimerInterval = setInterval(() => {
    const el = document.getElementById('r-timer');
    if (el) {
      const elapsed = (Date.now() - reasoningStartTime) / 1000;
      el.textContent = elapsed.toFixed(1) + 's';
    }
  }, 100);
}

function stopReasoningTimer() {
  if (reasoningTimerInterval) {
    clearInterval(reasoningTimerInterval);
    reasoningTimerInterval = null;
  }
}

function cycleReasoning() {
  const chat = store.getChat();
  const currentModel = chat ? store.modelMap[chat.model] : null;
  if (!modelSupportsReasoning(currentModel)) {
    toast('Dieses Modell unterstützt kein Reasoning.', 'info');
    return;
  }
  const s = store.settings;
  if (!s.reasoningEnabled) {
    s.reasoningEnabled = true;
    s.reasoningEffort = 'low';
  } else {
    const idx = REASONING_CYCLE.indexOf(s.reasoningEffort);
    const next = idx + 1;
    if (next >= REASONING_CYCLE.length) {
      s.reasoningEnabled = false;
      s.reasoningEffort = 'medium';
    } else {
      s.reasoningEffort = REASONING_CYCLE[next];
    }
  }
  store.save();
  renderInputArea();
}

function getReasoningLabel() {
  if (!store.settings.reasoningEnabled) return null;
  const m = { low: 'L', medium: 'M', high: 'H' };
  return m[store.settings.reasoningEffort] || 'M';
}

  persist.checked = store.settings.keyStorage === 'local';
  inp.addEventListener('input', () => { btn.disabled = !inp.value.trim(); });
  toggleBtn.addEventListener('click', () => {
    const isPass = inp.type === 'password';
    inp.type = isPass ? 'text' : 'password';
    toggleBtn.innerHTML = isPass ? IC.eyeOff : IC.eye;
  });
  inp.addEventListener('keydown', (e) => { if (e.key === 'Enter' && inp.value.trim()) submitKey(); });
  btn.addEventListener('click', submitKey);

  async function submitKey() {
    const key = inp.value.trim();
    if (!key) return;
    btn.disabled = true;
    btn.textContent = 'Verbinde…';
    store.apiKey = key;

    const ok = await validateKey();
    if (!ok) {
      toast('Ungültiger API Key oder Netzwerkfehler.', 'error');
      store.apiKey = '';
      btn.disabled = false;
      btn.textContent = 'Verbinden';
      return;
    }

    if (persist.checked) {
      localStorage.setItem('nx_key', key);
      store.settings.keyStorage = 'local';
    } else {
      sessionStorage.setItem('nx_key', key);
      store.settings.keyStorage = 'session';
    }
    store.save();

    screen.classList.add('hidden');
    document.getElementById('app-main').classList.add('visible');
    initApp();
  }

  inp.focus();
}

// ────────────────────────────────
// §8  INIT APP
// ────────────────────────────────
async function initApp() {
  renderAppShell();
  try {
    await fetchModels();
    if (!store.chats.length) store.newChat();
    else store.activeChatId = store.chats[0]?.id;
    render();
    focusInput();
  } catch (e) {
    toast('Modelle konnten nicht geladen werden: ' + e.message, 'error');
    if (!store.chats.length) store.newChat();
    else store.activeChatId = store.chats[0]?.id;
    render();
  }
}

function toggleSidebar(open) {
  const sb = document.getElementById('sidebar');
  const bd = document.getElementById('sidebar-backdrop');
  if (!sb || !bd) return;

  if (open) {
    sb.classList.remove('collapsed');
    if (isMobile()) bd.classList.add('visible');
  } else {
    sb.classList.add('collapsed');
    bd.classList.remove('visible');
  }
  store.settings.sidebarOpen = open;
  store.save();
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  if (!sb) return;

  const favChats = store.chats.filter(c => c.fav && !c.archived);
  const recentChats = store.chats.filter(c => !c.fav && !c.archived);
  const archivedChats = store.chats.filter(c => c.archived);
  const filt = chatSearch.toLowerCase();
  const filterFn = (c) => !filt || c.title.toLowerCase().includes(filt);

  sb.innerHTML = `
    <div class="sidebar-head">
      <div class="brand"><span class="nx-icon">${IC.logo}</span> Nex<span>us</span></div>
      <button class="btn-icon" id="sb-collapse" title="Sidebar schließen">${IC.x}</button>
    </div>
    <div class="sidebar-actions">
      <button class="btn-new-chat" id="btn-new-chat">${IC.plus} Neuer Chat</button>
    </div>
    <div class="sidebar-search">
      <input type="text" placeholder="Chats durchsuchen…" id="chat-search" value="${esc(chatSearch)}">
    </div>
    <div class="chat-list" id="chat-list">
      ${favChats.filter(filterFn).length ? `<div class="chat-list-section"><div class="section-label">★ Favoriten</div>${favChats.filter(filterFn).map(chatItemHtml).join('')}</div>` : ''}
      ${recentChats.filter(filterFn).length ? `<div class="chat-list-section"><div class="section-label">Aktuell</div>${recentChats.filter(filterFn).map(chatItemHtml).join('')}</div>` : ''}
      ${archivedChats.filter(filterFn).length ? `<div class="chat-list-section"><div class="section-label">Archiviert</div>${archivedChats.filter(filterFn).map(chatItemHtml).join('')}</div>` : ''}
    </div>
    <div class="sidebar-footer">
      <button id="sb-models">${IC.cpu} Modelle <span style="margin-left:auto;font-family:var(--fm);font-size:.75rem;color:var(--text-3)">${store.models.length}</span></button>
      <button id="sb-costs">${IC.dollar} Kosten <span style="color:var(--accent);font-family:var(--fm);margin-left:auto;font-size:.8rem">${formatCost(store.totalCost)}</span></button>
      <button id="sb-settings">${IC.settings} Einstellungen</button>
    </div>
  `;

  sb.querySelector('#sb-collapse').onclick = () => toggleSidebar(false);
  sb.querySelector('#btn-new-chat').onclick = () => { store.newChat(); editingMsgId = null; render(); focusInput(); if (isMobile()) toggleSidebar(false); };
  sb.querySelector('#chat-search').addEventListener('input', (e) => { chatSearch = e.target.value; renderSidebar(); });
  sb.querySelector('#sb-models').onclick = () => { toggleModels(true); if (isMobile()) toggleSidebar(false); };
  sb.querySelector('#sb-settings').onclick = () => { toggleSettings(true); if (isMobile()) toggleSidebar(false); };
  sb.querySelector('#sb-costs').onclick = () => { toggleSettings(true); if (isMobile()) toggleSidebar(false); };

  sb.querySelectorAll('.chat-item').forEach(item => {
    const id = item.dataset.id;
    item.addEventListener('click', (e) => {
      if (e.target.closest('.chat-actions')) return;
      store.activeChatId = id;
      editingMsgId = null;
      render();
      focusInput();
      if (isMobile()) toggleSidebar(false);
    });
  });

  sb.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.closest('.chat-item').dataset.id;
      const action = btn.dataset.action;
      if (action === 'fav') { const c = store.chats.find(x => x.id === id); if (c) { c.fav = !c.fav; store.save(); renderSidebar(); } }
      if (action === 'archive') { const c = store.chats.find(x => x.id === id); if (c) { c.archived = !c.archived; store.save(); render(); } }
      if (action === 'rename') showRenameModal(id);
      if (action === 'delete') { store.deleteChat(id); render(); }
    });
  });
}

function renderMessages() {
  const container = document.getElementById('chat-container');
  if (!container) return;
  const chat = store.getChat();

  if (!chat || !chat.messages.length) {
    container.innerHTML = '';
    const empty = el('div', { className: 'empty-state' });
    empty.innerHTML = `
      <div class="empty-icon">${IC.logo}</div>
      <h3>Starte ein Gespräch</h3>
      <p>Wähle ein Modell über die Kopfleiste, gib deine Nachricht ein und los geht's.</p>
    `;
    container.appendChild(empty);
    return;
  }

  container.innerHTML = `<div class="chat-messages" id="chat-messages"></div>`;
  const msgContainer = container.querySelector('#chat-messages');

  if (store.settings.systemPrompt) {
    const sysEl = el('div', { className: 'msg msg-system' });
    sysEl.innerHTML = `<div class="msg-role">System</div><div class="msg-content">${esc(store.settings.systemPrompt)}</div>`;
    msgContainer.appendChild(sysEl);
  }

  chat.messages.forEach(msg => {
    msgContainer.appendChild(createMessageEl(msg, chat));
  });

  highlightCode(msgContainer);

  if (store.settings.autoScroll) {
    requestAnimationFrame(() => { container.scrollTop = container.scrollHeight; });
  }
}

// Splits a reasoning text into visual "steps" (based on paragraph breaks).
// Used to render the timeline with connecting lines and dot icons.
function parseReasoningSteps(text) {
  if (!text) return [];
  const parts = text.split(/\n\s*\n/).map(s => s.trim()).filter(Boolean);
  return parts.length ? parts : [text];
}

function buildStepsHtml(steps, isStreaming) {
  return steps.map((step, i) => {
    const isLast = i === steps.length - 1;
    const stateClass = isStreaming ? (isLast ? 'active' : 'completed') : 'completed';
    return `<div class="r-step ${stateClass}"><div class="r-step-md msg-content">${renderMd(step)}</div></div>`;
  }).join('');
}

function buildReasoningBlockHtml(reasoning, isStreaming) {
  const charCount = reasoning ? reasoning.length : 0;
  const label = isStreaming ? 'Denkt nach' : 'Denkprozess';
  const expandedClass = isStreaming ? ' expanded' : '';
  const streamClass = isStreaming ? ' streaming' : '';
  const contentId = isStreaming ? ' id="stream-reasoning-content"' : '';

  const steps = parseReasoningSteps(reasoning);
  const stepsHtml = buildStepsHtml(steps, isStreaming);

  let meta = '';
  if (isStreaming) {
    meta = `<span class="r-timer" id="r-timer">0.0s</span>`;
  } else if (charCount > 0) {
    const sizeLabel = charCount > 1000 ? (charCount / 1000).toFixed(1) + 'K' : charCount;
    meta = `<span class="r-meta">${sizeLabel} Zeichen</span>`;
  }

  return `<div class="reasoning-block${streamClass}">
    <button class="reasoning-hdr${expandedClass}" onclick="nxToggleReasoning(this)">
      <span class="r-icon">${IC.think}</span>
      <span class="r-label">${label}</span>
      ${meta}
      <span class="r-chevron${expandedClass}">${IC.chevDown}</span>
    </button>
    <div class="reasoning-body-wrap${expandedClass}">
      <div class="reasoning-body">
        <div class="reasoning-body-inner"${contentId}>
          <div class="r-timeline">${stepsHtml}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function createMessageEl(msg, chat) {
  const div = el('div', { className: `msg msg-${msg.role}` });
  const isEditing = editingMsgId === msg.id;

  if (isEditing) {
    div.innerHTML = `
      <div class="msg-role">Du</div>
      <textarea class="edit-ta" style="width:100%;min-height:60px;padding:10px;background:var(--bg-1);
        border:1px solid var(--border-2);border-radius:var(--radius-s);font:inherit;resize:vertical;line-height:1.55">${esc(msg.content)}</textarea>
      <div style="display:flex;gap:8px;margin-top:10px;justify-content:flex-end">
        <button class="edit-cancel" style="padding:8px 16px;border-radius:var(--radius-s);font-size:.84rem;color:var(--text-2)">Abbrechen</button>
        <button class="edit-save" style="padding:8px 16px;border-radius:var(--radius-s);font-size:.84rem;background:var(--accent);color:#fff">Senden</button>
      </div>
    `;
    setTimeout(() => {
      const ta = div.querySelector('.edit-ta');
      if (ta) { ta.focus(); ta.selectionStart = ta.value.length; }
    }, 50);
    div.querySelector('.edit-cancel').onclick = () => { editingMsgId = null; renderMessages(); };
    div.querySelector('.edit-save').onclick = () => {
      const ta = div.querySelector('.edit-ta');
      msg.content = ta.value;
      editingMsgId = null;
      const idx = chat.messages.indexOf(msg);
      chat.messages = chat.messages.slice(0, idx + 1);
      store.save();
      renderMessages();
      sendChatMessage(msg.content, true);
    };
    return div;
  }

  // Content
  let contentHtml;
  if (msg.role === 'assistant') {
    contentHtml = renderMd(msg.content);
  } else {
    contentHtml = `<p>${esc(msg.content).replace(/\n/g, '<br>')}</p>`;
  }

  // Reasoning block
  let reasoningHtml = '';
  if (msg.reasoning && msg.reasoning.length > 0) {
    reasoningHtml = buildReasoningBlockHtml(msg.reasoning, false);
  }

  // Attached images
  let imagesHtml = '';
  if (msg.images && msg.images.length) {
    imagesHtml = `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">${msg.images.map(img => `<img src="${img.data}" alt="${esc(img.name)}" style="max-width:200px;max-height:150px;border-radius:var(--radius-s);object-fit:cover;border:1px solid var(--border-1)">`).join('')}</div>`;
  }

  // Meta
  let metaParts = [];
  if (msg.role === 'assistant') {
    if (msg.model) { const m = store.modelMap[msg.model]; metaParts.push(m ? (m.name || m.id).split('/').pop() : msg.model.split('/').pop()); }
    if (msg.duration) metaParts.push(`${(msg.duration / 1000).toFixed(1)}s`);
    if (msg.tokens) metaParts.push(`${msg.tokens.prompt || 0}+${msg.tokens.completion || 0} tok`);
    if (msg.cost) metaParts.push(formatCost(msg.cost));
  } else {
    metaParts.push(formatDate(msg.ts));
  }

  let actionsHtml = `<span class="msg-actions">`;
  actionsHtml += `<button data-act="copy" title="Kopieren">${IC.copy}</button>`;
  if (msg.role === 'user') actionsHtml += `<button data-act="edit" title="Bearbeiten">${IC.edit}</button>`;
  if (msg.role === 'assistant') actionsHtml += `<button data-act="regen" title="Neu generieren">${IC.refresh}</button>`;
  actionsHtml += `<button data-act="del" title="Löschen">${IC.trash}</button>`;
  actionsHtml += `</span>`;

  div.innerHTML = `
    <div class="msg-role">${msg.role === 'user' ? 'Du' : msg.role === 'assistant' ? 'Assistent' : msg.role}</div>
    ${reasoningHtml}
    <div class="msg-content">${contentHtml}</div>
    ${imagesHtml}
    <div class="msg-meta"><span>${metaParts.join(' · ')}</span>${actionsHtml}</div>
  `;

  // Debug
  if (store.settings.showDebug && msg.debug) {
    const dbg = el('div', { className: 'debug-panel' });
    const contentDiv = el('div', { className: 'debug-content', style: 'display:none' });
    contentDiv.textContent = JSON.stringify(msg.debug, null, 2);
    const toggle = el('div', { className: 'debug-toggle' });
    toggle.textContent = '▶ Debug Info';
    toggle.onclick = () => {
      const vis = contentDiv.style.display === 'none';
      contentDiv.style.display = vis ? 'block' : 'none';
      toggle.textContent = (vis ? '▼' : '▶') + ' Debug Info';
    };
    dbg.appendChild(toggle);
    dbg.appendChild(contentDiv);
    div.appendChild(dbg);
  }

  // Action handlers
  div.querySelectorAll('[data-act]').forEach(btn => {
    btn.addEventListener('click', () => {
      const act = btn.dataset.act;
      if (act === 'copy') navigator.clipboard.writeText(msg.content).then(() => toast('Kopiert!', 'success'));
      if (act === 'edit') { editingMsgId = msg.id; renderMessages(); }
      if (act === 'regen') regenerateMessage(msg, chat);
      if (act === 'del') { chat.messages = chat.messages.filter(m => m.id !== msg.id); store.save(); renderMessages(); }
    });
  });

  return div;
}

// ── Streaming Indicator with Reasoning ──
function showTypingIndicator() {
  const container = document.getElementById('chat-messages');
  if (!container) return null;
  let ind = container.querySelector('#typing-ind');
  if (!ind) {
    ind = el('div', { className: 'msg msg-assistant', id: 'typing-ind' });
    ind.innerHTML = `
      <div class="msg-role">Assistent</div>
      <div id="stream-reasoning-wrap" style="display:none"></div>
      <div class="msg-content" id="stream-content"></div>
      <div class="typing-indicator" id="typing-dots"><span></span><span></span><span></span></div>
    `;
    container.appendChild(ind);
  }
  return ind;
}

function updateStreamReasoning(text) {
  const wrap = document.getElementById('stream-reasoning-wrap');
  if (!wrap) return;
  if (text.length > 0 && wrap.style.display === 'none') {
    wrap.style.display = 'block';
    wrap.innerHTML = buildReasoningBlockHtml(text, true);
    startReasoningTimer();
  } else {
    const inner = document.getElementById('stream-reasoning-content');
    if (inner) {
      const steps = parseReasoningSteps(text);
      inner.innerHTML = `<div class="r-timeline">${buildStepsHtml(steps, true)}</div>`;
    }
  }
  const chatC = document.getElementById('chat-container');
  if (chatC && store.settings.autoScroll) chatC.scrollTop = chatC.scrollHeight;
}

function finalizeStreamReasoning() {
  const wrap = document.getElementById('stream-reasoning-wrap');
  if (!wrap || wrap.style.display === 'none') return;
  const block = wrap.querySelector('.reasoning-block');
  if (!block || !block.classList.contains('streaming')) return;

  stopReasoningTimer();
  block.classList.remove('streaming');

  const label = block.querySelector('.r-label');
  if (label) label.textContent = 'Denkprozess';

  // Freeze timer as static meta badge
  const timer = block.querySelector('#r-timer');
  if (timer && reasoningStartTime) {
    const elapsed = ((Date.now() - reasoningStartTime) / 1000).toFixed(1) + 's';
    timer.id = '';
    timer.className = 'r-meta';
    timer.textContent = elapsed;
  }

  // Transition all steps to completed
  block.querySelectorAll('.r-step').forEach(s => {
    s.classList.remove('active');
    s.classList.add('completed');
  });
}

function updateStreamContent(text) {
  const sc = document.getElementById('stream-content');
  const dots = document.getElementById('typing-dots');
  if (sc) sc.innerHTML = renderMd(text);
  if (dots && text.length > 0) dots.style.display = 'none';
  // Reasoning done when content starts
  finalizeStreamReasoning();
  const chatC = document.getElementById('chat-container');
  if (chatC && store.settings.autoScroll) chatC.scrollTop = chatC.scrollHeight;
}

function removeTypingIndicator() {
  const ind = document.getElementById('typing-ind');
  if (ind) ind.remove();
}

// ────────────────────────────────
// §13  INPUT AREA
// ────────────────────────────────
function renderInputArea() {
  const area = document.getElementById('chat-input-area');
  if (!area) return;

  // Determine whether the current model supports reasoning
  const chat = store.getChat();
  const currentModel = chat ? store.modelMap[chat.model] : null;
  const supportsReasoning = modelSupportsReasoning(currentModel);

  const rLabel = supportsReasoning ? getReasoningLabel() : null;
  const rActive = (supportsReasoning && store.settings.reasoningEnabled) ? ' active' : '';
  const rBadge = rLabel ? `<span class="r-badge">${rLabel}</span>` : '';
  const rTitle = store.settings.reasoningEnabled
    ? `Reasoning: ${store.settings.reasoningEffort.toUpperCase()} — Klick zum Wechseln (low · medium · high · aus)`
    : 'Reasoning aktivieren (Klick: low → medium → high → aus)';
  const reasoningBtnHtml = supportsReasoning
    ? `<button class="reasoning-btn${rActive}" id="btn-reasoning" title="${rTitle}">${IC.think}${rBadge}</button>`
    : '';

  area.innerHTML = `
    <div class="chat-input-wrap">
      <div class="attached-preview" id="attached-preview" style="display:none"></div>
      <div class="chat-input-box" id="input-box">
        <button class="attach-btn" id="btn-attach" title="Bild anhängen">${IC.paperclip}</button>
        ${reasoningBtnHtml}
        <textarea id="msg-input" rows="1" placeholder="Nachricht eingeben…"></textarea>
        <button class="send-btn" id="btn-send" disabled>${IC.send}</button>
      </div>
      <div class="input-info">
        <span id="input-model">${store.getChat()?.model?.split('/').pop() || ''}</span>
        <span class="desktop-only">Enter senden · Shift+Enter Zeile</span>
      </div>
      <input type="file" id="file-input" accept="image/*" style="display:none" multiple>
    </div>
  `;

  const ta = area.querySelector('#msg-input');
  const sendBtn = area.querySelector('#btn-send');
  const attachBtn = area.querySelector('#btn-attach');
  const fileInput = area.querySelector('#file-input');
  const reasoningBtn = area.querySelector('#btn-reasoning');

  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 200) + 'px';
    updateSendBtn();
  });

  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey && !e.metaKey && !isMobile()) {
      e.preventDefault();
      if (store.isStreaming) stopStreaming();
      else if (ta.value.trim()) handleSend();
    }
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      if (store.isStreaming) stopStreaming();
      else if (ta.value.trim()) handleSend();
    }
  });

  sendBtn.addEventListener('click', () => {
    if (store.isStreaming) stopStreaming();
    else if (ta.value.trim()) handleSend();
  });

  attachBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', handleFileAttach);

  if (reasoningBtn) reasoningBtn.addEventListener('click', cycleReasoning);

  updateAttachedPreview();
}

function updateSendBtn() {
  const sendBtn = document.getElementById('btn-send');
  const ta = document.getElementById('msg-input');
  if (!sendBtn || !ta) return;

  if (store.isStreaming) {
    sendBtn.innerHTML = IC.stop;
    sendBtn.classList.add('stop');
    sendBtn.disabled = false;
  } else {
    sendBtn.innerHTML = IC.send;
    sendBtn.classList.remove('stop');
    sendBtn.disabled = !ta.value.trim() && !attachedImages.length;
  }
}

function focusInput() {
  setTimeout(() => { const ta = document.getElementById('msg-input'); if (ta) ta.focus(); }, 150);
}

function handleFileAttach(e) {
  const files = Array.from(e.target.files || []);
  files.forEach(file => {
    if (!file.type.startsWith('image/')) { toast('Nur Bilder werden unterstützt.', 'error'); return; }
    const reader = new FileReader();
    reader.onload = () => {
      attachedImages.push({ name: file.name, data: reader.result });
      updateAttachedPreview();
      updateSendBtn();
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}

function updateAttachedPreview() {
  const preview = document.getElementById('attached-preview');
  if (!preview) return;

  if (!attachedImages.length) {
    preview.style.display = 'none';
    preview.innerHTML = '';
    return;
  }

  preview.style.display = 'flex';
  preview.innerHTML = attachedImages.map((img, i) => `
    <div class="attached-chip">
      <img src="${img.data}" alt="${esc(img.name)}">
      <span>${esc(img.name.length > 15 ? img.name.slice(0, 12) + '…' : img.name)}</span>
      <button data-remove="${i}" title="Entfernen">${IC.x}</button>
    </div>
  `).join('');

  preview.querySelectorAll('[data-remove]').forEach(btn => {
    btn.addEventListener('click', () => {
      attachedImages.splice(parseInt(btn.dataset.remove), 1);
      updateAttachedPreview();
      updateSendBtn();
    });
  });
}

// ────────────────────────────────
// §14  SEND / STREAM
// ────────────────────────────────
async function handleSend() {
  const ta = document.getElementById('msg-input');
  if (!ta) return;
  const content = ta.value.trim();
  if (!content && !attachedImages.length) return;
  ta.value = '';
  ta.style.height = 'auto';
  sendChatMessage(content, false);
}

async function sendChatMessage(content, isResend) {
  let chat = store.getChat();
  if (!chat) { chat = store.newChat(); render(); }

  if (chat.messages.length === 0 && chat.title === 'Neuer Chat' && content) {
    chat.title = content.slice(0, 50) + (content.length > 50 ? '…' : '');
  }

  if (!isResend) {
    const userMsg = { id: uuid(), role: 'user', content: content || '(Bild angehängt)', ts: Date.now() };
    if (attachedImages.length) userMsg.images = [...attachedImages];
    chat.messages.push(userMsg);
    attachedImages = [];
    updateAttachedPreview();
  }

  chat.updatedAt = Date.now();
  store.save();
  renderSidebar();
  renderMessages();
  updateSendBtn();

  // Build API messages
  const apiMsgs = [];
  if (store.settings.systemPrompt) apiMsgs.push({ role: 'system', content: store.settings.systemPrompt });

  for (const m of chat.messages) {
    if (m.role === 'user') {
      if (m.images && m.images.length) {
        apiMsgs.push({
          role: 'user',
          content: [
            ...(m.content ? [{ type: 'text', text: m.content }] : []),
            ...m.images.map(img => ({ type: 'image_url', image_url: { url: img.data } }))
          ]
        });
      } else {
        apiMsgs.push({ role: 'user', content: m.content });
      }
    } else if (m.role === 'assistant') {
      apiMsgs.push({ role: 'assistant', content: m.content });
    }
  }

  showTypingIndicator();
  updateSendBtn();

  let fullText = '';
  let reasoningText = '';
  const startTime = Date.now();

  // Only send the reasoning parameter when the current model actually supports it.
  const currentModel = store.modelMap[chat.model];
  const effectiveParams = { ...store.settings };
  if (!modelSupportsReasoning(currentModel)) {
    effectiveParams.reasoningEnabled = false;
  }

  await streamChat(
    apiMsgs, chat.model, effectiveParams,
    (token, type) => {
      if (type === 'reasoning') {
        reasoningText += token;
        updateStreamReasoning(reasoningText);
      } else {
        fullText += token;
        updateStreamContent(fullText);
      }
    },
    (info) => {
      stopReasoningTimer();
      removeTypingIndicator();
      const duration = Date.now() - startTime;
      const usage = info.usage || {};
      const promptTokens = usage.prompt_tokens || 0;
      const compTokens = usage.completion_tokens || 0;

      const model = store.modelMap[chat.model];
      let cost = 0;
      if (model?.pricing) {
        const pp = parseFloat(model.pricing.prompt) || 0;
        const cp = parseFloat(model.pricing.completion) || 0;
        cost = (promptTokens * pp) + (compTokens * cp);
      }

      const assistantMsg = {
        id: uuid(), role: 'assistant', content: fullText, ts: Date.now(),
        reasoning: reasoningText || undefined,
        tokens: { prompt: promptTokens, completion: compTokens },
        cost, model: chat.model, duration,
        debug: store.settings.showDebug ? info.debug : undefined,
      };
      chat.messages.push(assistantMsg);
      chat.tokens += promptTokens + compTokens;
      chat.cost += cost;
      store.totalCost += cost;
      store.save();
      renderMessages();
      renderSidebar();
      renderMainHeader();
      updateSendBtn();
    },
    (err) => {
      stopReasoningTimer();
      removeTypingIndicator();
      const errMsg = { id: uuid(), role: 'assistant', content: `**Fehler:** ${err.message}\n\nBitte überprüfe dein Modell und deinen API Key.`, ts: Date.now() };
      chat.messages.push(errMsg);
      store.save();
      renderMessages();
      toast('Fehler: ' + err.message, 'error');
      updateSendBtn();
    }
  );
}

function stopStreaming() {
  if (store.abortCtrl) { store.abortCtrl.abort(); store.abortCtrl = null; }
  stopReasoningTimer();
}

function regenerateMessage(msg, chat) {
  const idx = chat.messages.indexOf(msg);
  if (idx < 0) return;
  chat.messages = chat.messages.slice(0, idx);
  store.save();
  renderMessages();
  const lastUser = [...chat.messages].reverse().find(m => m.role === 'user');
  if (lastUser) sendChatMessage(lastUser.content, true);
}

// ────────────────────────────────
// §15  EXPORT
// ────────────────────────────────
function exportChat() {
  const chat = store.getChat();
  if (!chat || !chat.messages.length) { toast('Kein Chat zum Exportieren.', 'info'); return; }
  let md = `# ${chat.title}\n\n`;
  md += `**Modell:** ${chat.model}\n**Erstellt:** ${new Date(chat.createdAt).toLocaleString('de')}\n\n---\n\n`;
  for (const m of chat.messages) {
    if (m.reasoning) md += `<details><summary>Denkprozess</summary>\n\n${m.reasoning}\n\n</details>\n\n`;
    md += `### ${m.role === 'user' ? 'Du' : 'Assistent'}\n\n${m.content}\n\n---\n\n`;
  }
  const blob = new Blob([md], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${chat.title.replace(/[^a-zA-Z0-9äöüÄÖÜß -]/g, '_')}.md`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Chat exportiert', 'success');
}
