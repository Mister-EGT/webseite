async function initApp() {
  renderAppShell();
  try {
    await fetchModels();
    const fallbackModel = pickDefaultModel();
    for (const chat of store.chats) {
      if (!store.modelMap[chat.model]) chat.model = fallbackModel;
    }
    if (!store.chats.length) store.newChat(fallbackModel);
    else store.activeChatId = store.chats[0]?.id;
    render();
    focusInput();
  } catch (e) {
    toast('Modelle konnten nicht geladen werden: ' + e.message, 'error');
    if (!store.chats.length) store.newChat();
    else store.activeChatId = store.chats[0]?.id;
    render();
  }
}

function parseReasoningSteps(text) {
  if (!text) return [];

  const steps = [];
  const current = [];
  let openFence = null;
  const lines = String(text).split('\n');

  for (const line of lines) {
    const fence = line.match(/^\s*(`{3,}|~{3,})/);
    if (fence) {
      const marker = fence[1];
      const char = marker[0];
      const len = marker.length;

      if (!openFence) {
        openFence = { char, len };
      } else if (char === openFence.char && len >= openFence.len) {
        openFence = null;
      }
    }

    if (!openFence && !line.trim()) {
      const part = current.join('\n').trim();
      if (part) steps.push(part);
      current.length = 0;
      continue;
    }

    current.push(line);
  }

  const tail = current.join('\n').trim();
  if (tail) steps.push(tail);
  if (steps.length === 1 && steps[0].length > 900) {
    const byHeadings = steps[0]
      .split(/\n(?=(?:#{1,6}\s+|\d+[.)]\s+|[-*]\s+))/)
      .map(s => s.trim())
      .filter(Boolean);
    if (byHeadings.length > 1) return byHeadings;
  }
  return steps.length ? steps : [text];
}

function buildStepsHtml(steps, isStreaming) {
  return steps.map((step, i) => {
    const isLast = i === steps.length - 1;
    const stateClass = isStreaming ? (isLast ? 'active' : 'completed') : 'completed';
    return `<div class="r-step ${stateClass}"><div class="r-step-md msg-content">${renderMd(step)}</div></div>`;
  }).join('');
}

function buildLiveStepsHtml(steps) {
  return steps.map((step, i) => {
    const isLast = i === steps.length - 1;
    const stateClass = isLast ? 'active' : 'completed';
    return `<div class="r-step ${stateClass}"><div class="r-step-md msg-content">${renderStreamingMd(step)}</div></div>`;
  }).join('');
}

function buildReasoningBlockHtml(reasoning, isStreaming) {
  const charCount = reasoning ? reasoning.length : 0;
  const label = isStreaming ? 'Reasoning läuft' : 'Reasoning';
  const expandedClass = isStreaming ? ' expanded' : '';
  const streamClass = isStreaming ? ' streaming' : '';
  const contentId = isStreaming ? ' id="stream-reasoning-content"' : '';

  const steps = parseReasoningSteps(reasoning);
  const stepsHtml = isStreaming ? buildLiveStepsHtml(steps) : buildStepsHtml(steps, isStreaming);

  const stepMeta = steps.length > 1 ? `<span class="r-chip">${steps.length} Abschnitte</span>` : '';
  let meta = stepMeta;
  if (isStreaming) {
    meta += `<span class="r-timer" id="r-timer">0.0s</span>`;
  } else if (charCount > 0) {
    const sizeLabel = charCount > 1000 ? (charCount / 1000).toFixed(1) + 'K' : charCount;
    meta += `<span class="r-meta">${sizeLabel} Zeichen</span>`;
  }

  return `<div class="reasoning-block${streamClass}">
    <button class="reasoning-hdr${expandedClass}" onclick="nxToggleReasoning(this)">
      <span class="r-icon">${IC.think}</span>
      <span class="r-label">${label}</span>
      <span class="r-meta-group">${meta}</span>
      <span class="r-chevron${expandedClass}">${IC.chevDown}</span>
    </button>
    <div class="reasoning-body-wrap${expandedClass}">
      <div class="reasoning-body">
        <div class="reasoning-body-inner"${contentId}>
          <div class="r-timeline">${stepsHtml}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function getMessageRenderParts(msg) {
  const imagesKey = (msg.images || []).map(img => `${img.name || ''}:${String(img.data || '').length}`).join('|');
  const key = [
    msg.role,
    msg.error ? '1' : '0',
    msg.content || '',
    msg.reasoning || '',
    imagesKey
  ].join('\u001f');
  const cached = messageRenderCache.get(msg);
  if (cached?.key === key) return cached.parts;

  const contentHtml = msg.role === 'assistant'
    ? renderMd(msg.content)
    : `<p>${esc(msg.content).replace(/\n/g, '<br>')}</p>`;
  const reasoningHtml = msg.reasoning && msg.reasoning.length > 0
    ? buildReasoningBlockHtml(msg.reasoning, false)
    : '';
  const imagesHtml = msg.images && msg.images.length
    ? `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">${msg.images.map(img => `<img src="${escAttr(img.data)}" alt="${escAttr(img.name)}" style="max-width:200px;max-height:150px;border-radius:var(--radius-s);object-fit:cover;border:1px solid var(--border-1)">`).join('')}</div>`
    : '';

  const parts = { contentHtml, reasoningHtml, imagesHtml };
  messageRenderCache.set(msg, { key, parts });
  return parts;
}

function createMessageEl(msg, chat) {
  const errorClass = msg.error ? ' msg-error' : '';
  const div = el('div', { className: `msg msg-${msg.role}${errorClass}` });
  const isEditing = editingMsgId === msg.id;

  if (isEditing) {
    div.innerHTML = `
      <div class="msg-role">Du</div>
      <textarea class="edit-ta" style="width:100%;min-height:60px;padding:10px;background:var(--bg-1);
        border:1px solid var(--border-2);border-radius:var(--radius-s);font:inherit;resize:vertical;line-height:1.55">${esc(msg.content)}</textarea>
      <div style="display:flex;gap:8px;margin-top:10px;justify-content:flex-end">
        <button class="edit-cancel" style="padding:8px 16px;border-radius:var(--radius-s);font-size:.84rem;color:var(--text-2)">Abbrechen</button>
        <button class="edit-save" style="padding:8px 16px;border-radius:var(--radius-s);font-size:.84rem;background:var(--accent);color:#fff">Senden</button>
      </div>
    `;
    setTimeout(() => {
      const ta = div.querySelector('.edit-ta');
      if (ta) { ta.focus(); ta.selectionStart = ta.value.length; }
    }, 50);
    div.querySelector('.edit-cancel').onclick = () => { editingMsgId = null; renderMessages(); };
    div.querySelector('.edit-save').onclick = () => {
      const ta = div.querySelector('.edit-ta');
      msg.content = ta.value;
      editingMsgId = null;
      const idx = chat.messages.indexOf(msg);
      chat.messages = chat.messages.slice(0, idx + 1);
      store.save();
      renderMessages();
      sendChatMessage(msg.content, true);
    };
    return div;
  }

  const { contentHtml, reasoningHtml, imagesHtml } = getMessageRenderParts(msg);

  let metaParts = [];
  if (msg.role === 'assistant') {
    if (msg.model) { const m = store.modelMap[msg.model]; metaParts.push(m ? (m.name || m.id).split('/').pop() : msg.model.split('/').pop()); }
    if (msg.duration) metaParts.push(`${(msg.duration / 1000).toFixed(1)}s`);
    if (msg.tokens) metaParts.push(`${msg.tokens.prompt || 0}+${msg.tokens.completion || 0} tok`);
    if (msg.cost) metaParts.push(formatCost(msg.cost));
  } else {
    metaParts.push(formatDate(msg.ts));
  }

  let actionsHtml = `<span class="msg-actions">`;
  actionsHtml += `<button data-act="copy" title="Kopieren">${IC.copy}</button>`;
  if (msg.role === 'user') actionsHtml += `<button data-act="edit" title="Bearbeiten">${IC.edit}</button>`;
  if (msg.role === 'assistant' && !msg.error) actionsHtml += `<button data-act="regen" title="Neu generieren">${IC.refresh}</button>`;
  if (msg.error) actionsHtml += `<button data-act="retry" title="Erneut versuchen">${IC.refresh}</button>`;
  actionsHtml += `<button data-act="del" title="Löschen">${IC.trash}</button>`;
  actionsHtml += `</span>`;

  div.innerHTML = `
    <div class="msg-role">${msg.role === 'user' ? 'Du' : msg.role === 'assistant' ? (msg.error ? 'Fehler' : 'Assistent') : msg.role}</div>
    ${reasoningHtml}
    <div class="msg-content">${contentHtml}</div>
    ${imagesHtml}
    <div class="msg-meta"><span>${metaParts.join(' · ')}</span>${actionsHtml}</div>
  `;

  if (store.settings.showDebug && msg.debug) {
    const dbg = el('div', { className: 'debug-panel' });
    const contentDiv = el('div', { className: 'debug-content', style: 'display:none' });
    contentDiv.textContent = JSON.stringify(msg.debug, null, 2);
    const toggle = el('div', { className: 'debug-toggle' });
    toggle.textContent = '▶ Debug Info';
    toggle.onclick = () => {
      const vis = contentDiv.style.display === 'none';
      contentDiv.style.display = vis ? 'block' : 'none';
      toggle.textContent = (vis ? '▼' : '▶') + ' Debug Info';
    };
    dbg.appendChild(toggle);
    dbg.appendChild(contentDiv);
    div.appendChild(dbg);
  }

  div.querySelectorAll('[data-act]').forEach(btn => {
    btn.addEventListener('click', () => {
      const act = btn.dataset.act;
      if (act === 'copy') copyText(msg.content).then(ok => toast(ok ? 'Kopiert!' : 'Kopieren fehlgeschlagen.', ok ? 'success' : 'error'));
      if (act === 'edit') { editingMsgId = msg.id; renderMessages(); }
      if (act === 'regen') regenerateMessage(msg, chat);
      if (act === 'retry') retryMessage(msg, chat);
      if (act === 'del') { chat.messages = chat.messages.filter(m => m.id !== msg.id); store.save(); renderMessages(); }
    });
  });

  return div;
}

// ── Streaming Indicator ──
function showTypingIndicator() {
  const container = document.getElementById('chat-messages');
  if (!container) return null;
  let ind = container.querySelector('#typing-ind');
  if (!ind) {
    ind = el('div', { className: 'msg msg-assistant streaming-msg', id: 'typing-ind' });
    ind.innerHTML = `
      <div class="msg-role">Assistent</div>
      <div id="stream-reasoning-wrap" style="display:none"></div>
      <div class="msg-content" id="stream-content"></div>
      <div style="display:flex;align-items:center">
        <div class="typing-indicator" id="typing-dots"><span></span><span></span><span></span></div>
        <div class="typing-stats" id="typing-stats"></div>
      </div>
    `;
    container.appendChild(ind);
  }
  return ind;
}

function updateStreamReasoning(text) {
  const wrap = document.getElementById('stream-reasoning-wrap');
  if (!wrap) return;

  const dots = document.getElementById('typing-dots');
  if (dots && text.length > 0) dots.style.display = 'none';

  streamReasoningPendingText = text;

  if (text.length > 0 && wrap.style.display === 'none') {
    wrap.style.display = 'block';
    wrap.innerHTML = buildReasoningBlockHtml(text, true);
    startReasoningTimer();
  }

  if (!streamReasoningRaf) {
    streamReasoningRaf = requestAnimationFrame(() => {
      streamReasoningRaf = null;
      const inner = document.getElementById('stream-reasoning-content');
      if (!inner) return;
      const steps = parseReasoningSteps(streamReasoningPendingText);
      inner.innerHTML = `<div class="r-timeline">${buildLiveStepsHtml(steps)}</div>`;
      highlightCode(inner);
    });
  }

  maybeAutoScroll();
}

function finalizeStreamReasoning() {
  const wrap = document.getElementById('stream-reasoning-wrap');
  if (!wrap || wrap.style.display === 'none') return;
  const block = wrap.querySelector('.reasoning-block');
  if (!block || !block.classList.contains('streaming')) return;

  stopReasoningTimer();
  block.classList.remove('streaming');

  const label = block.querySelector('.r-label');
  if (label) label.textContent = 'Denkprozess';

  const timer = block.querySelector('#r-timer');
  if (timer && reasoningStartTime) {
    const elapsed = ((Date.now() - reasoningStartTime) / 1000).toFixed(1) + 's';
    timer.id = '';
    timer.className = 'r-meta';
    timer.textContent = elapsed;
  }

  const inner = document.getElementById('stream-reasoning-content');
  if (inner) {
    const steps = parseReasoningSteps(streamReasoningPendingText);
    inner.innerHTML = `<div class="r-timeline">${buildStepsHtml(steps, false)}</div>`;
    highlightCode(inner);
  }

  block.querySelectorAll('.r-step').forEach(s => {
    s.classList.remove('active');
    s.classList.add('completed');
  });
}

function updateStreamContent(text) {
  const dots = document.getElementById('typing-dots');
  streamContentPendingText = text;

  if (dots && text.length > 0) dots.style.display = 'none';
  if (!streamContentStart && text.length > 0) startStreamStats();

  const render = () => {
    streamContentTimer = null;
    streamContentRaf = requestAnimationFrame(() => {
      streamContentRaf = null;
      streamContentLastRender = Date.now();
      const sc = document.getElementById('stream-content');
      if (sc) {
        sc.innerHTML = renderStreamingMd(streamContentPendingText);
        highlightCode(sc);
      }
    });
  };

  if (!streamContentRaf && !streamContentTimer) {
    const wait = Math.max(0, STREAM_RENDER_MIN_MS - (Date.now() - streamContentLastRender));
    if (wait > 0) streamContentTimer = setTimeout(render, wait);
    else render();
  }

  maybeAutoScroll();
}

function maybeAutoScroll() {
  const chatC = document.getElementById('chat-container');
  if (!chatC) return;
  if (!store.settings.autoScroll) return;
  // Only auto-scroll if user is already close to bottom
  if (isNearBottom(chatC, 200)) {
    if (!autoScrollRaf) {
      autoScrollRaf = requestAnimationFrame(() => {
        autoScrollRaf = null;
        const c = document.getElementById('chat-container');
        if (c) c.scrollTop = c.scrollHeight;
      });
    }
  } else {
    // Show the "new message" dot on scroll-to-bottom button
    const btn = document.getElementById('scroll-bottom-btn');
    if (btn && btn.classList.contains('visible') && !btn.querySelector('.new-msg-dot')) {
      const dot = document.createElement('span');
      dot.className = 'new-msg-dot';
      btn.appendChild(dot);
    }
  }
}

function clearStreamingFrames() {
  if (streamReasoningRaf) cancelAnimationFrame(streamReasoningRaf);
  if (streamContentRaf) cancelAnimationFrame(streamContentRaf);
  if (autoScrollRaf) cancelAnimationFrame(autoScrollRaf);
  if (streamContentTimer) clearTimeout(streamContentTimer);
  streamReasoningRaf = null;
  streamContentRaf = null;
  streamContentTimer = null;
  autoScrollRaf = null;
}

function removeTypingIndicator() {
  finalizeStreamReasoning();
  clearStreamingFrames();
  const ind = document.getElementById('typing-ind');
  if (ind) ind.remove();
  stopStreamStats();
  streamContentStart = null;
  streamContentLastRender = 0;
  streamContentPendingText = '';
  streamReasoningPendingText = '';
}

// ────────────────────────────────
// §13  INPUT AREA
// ────────────────────────────────
function renderInputArea() {
  const area = document.getElementById('chat-input-area');
  if (!area) return;

  // Preserve focus on textarea across rerenders triggered by same chat
  // (e.g. reasoning toggle). Draft is loaded from chat.draft regardless,
  // so cross-chat rerenders correctly show the new chat's draft.
  const prevTa = document.getElementById('msg-input');
  const prevHadFocus = prevTa && document.activeElement === prevTa;
  const prevCursor = prevTa ? prevTa.selectionStart : 0;

  const chat = store.getChat();
  const currentModel = chat ? store.modelMap[chat.model] : null;
  const supportsReasoning = modelSupportsReasoning(currentModel);
  const supportsImages = modelSupportsImages(currentModel);

  const rLabel = supportsReasoning ? getReasoningLabel() : null;
  const rActive = (supportsReasoning && store.settings.reasoningEnabled) ? ' active' : '';
  const rBadge = rLabel ? `<span class="r-badge">${rLabel}</span>` : '';
  const rTitle = store.settings.reasoningEnabled
    ? `Reasoning: ${store.settings.reasoningEffort.toUpperCase()} — Klick zum Wechseln (low · medium · high · aus)`
    : 'Reasoning aktivieren (Klick: low → medium → high → aus)';
  const reasoningBtnHtml = supportsReasoning
    ? `<button class="reasoning-btn${rActive}" id="btn-reasoning" title="${escAttr(rTitle)}">${IC.think}${rBadge}</button>`
    : '';
  const attachDisabled = supportsImages ? '' : ' disabled';
  const attachTitle = supportsImages
    ? 'Bild anhängen'
    : 'Das aktuelle Modell unterstützt wahrscheinlich keine Bilder';

  area.innerHTML = `
    <div class="chat-input-wrap">
      <div class="attached-preview" id="attached-preview" style="display:none"></div>
      <div class="chat-input-box" id="input-box">
        <button class="attach-btn" id="btn-attach" title="${escAttr(attachTitle)}"${attachDisabled}>${IC.paperclip}</button>
        ${reasoningBtnHtml}
        <textarea id="msg-input" rows="1" placeholder="Nachricht eingeben…"></textarea>
        <button class="send-btn" id="btn-send" disabled>${IC.send}</button>
      </div>
      <div class="input-info">
        <span id="input-model">${esc(chat?.model?.split('/').pop() || '')}</span>
        <span class="tokens" id="input-tokens">~0 tok</span>
      </div>
      <input type="file" id="file-input" accept="image/*" style="display:none" multiple>
    </div>
  `;

  const ta = area.querySelector('#msg-input');
  const sendBtn = area.querySelector('#btn-send');
  const attachBtn = area.querySelector('#btn-attach');
  const fileInput = area.querySelector('#file-input');
  const reasoningBtn = area.querySelector('#btn-reasoning');

  // Load draft
  if (chat && chat.draft) {
    ta.value = chat.draft;
    requestAnimationFrame(() => {
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 200) + 'px';
    });
  }

  // Restore focus if same chat
  if (prevHadFocus) {
    ta.focus();
    try { ta.setSelectionRange(prevCursor, prevCursor); } catch {}
  }

  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 200) + 'px';
    updateSendBtn();
    updateInputTokenCount();
    // Persist draft (debounced)
    const c = store.getChat();
    if (c) {
      c.draft = ta.value;
      store.saveDebounced(500);
    }
  });

  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey && !e.metaKey && !isMobile()) {
      e.preventDefault();
      if (store.isStreaming) stopStreaming();
      else if (ta.value.trim() || attachedImages.length) handleSend();
    }
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      if (store.isStreaming) stopStreaming();
      else if (ta.value.trim() || attachedImages.length) handleSend();
    }
  });

  // Paste images directly into input
  ta.addEventListener('paste', (e) => {
    if (!supportsImages) return;
    const items = e.clipboardData?.items;
    if (!items) return;
    let handled = false;
    for (const item of items) {
      if (item.type && item.type.startsWith('image/')) {
        const blob = item.getAsFile();
        if (!blob) continue;
        handled = true;
        const reader = new FileReader();
        reader.onload = () => {
          attachedImages.push({
            name: blob.name || `pasted-${Date.now()}.png`,
            data: reader.result
          });
          updateAttachedPreview();
          updateSendBtn();
        };
        reader.readAsDataURL(blob);
      }
    }
    if (handled) e.preventDefault();
  });

  sendBtn.addEventListener('click', () => {
    if (store.isStreaming) stopStreaming();
    else if (ta.value.trim() || attachedImages.length) handleSend();
  });

  attachBtn.addEventListener('click', () => { if (supportsImages) fileInput.click(); });
  fileInput.addEventListener('change', handleFileAttach);

  if (reasoningBtn) reasoningBtn.addEventListener('click', cycleReasoning);

  updateAttachedPreview();
  updateSendBtn();
  updateInputTokenCount();
}

function updateInputTokenCount() {
  const ta = document.getElementById('msg-input');
  const lbl = document.getElementById('input-tokens');
  if (!ta || !lbl) return;
  const chat = store.getChat();
  let totalChars = ta.value.length + (store.settings.systemPrompt || '').length;
  if (chat) for (const m of chat.messages) totalChars += (m.content || '').length;
  const tok = Math.ceil(totalChars / 3.8);
  lbl.textContent = `~${formatTokens(tok)} tok`;
  const model = chat ? store.modelMap[chat.model] : null;
  const ctx = model?.context_length || 0;
  lbl.classList.toggle('warn', ctx > 0 && tok > ctx * 0.8);
}

function updateSendBtn() {
  const sendBtn = document.getElementById('btn-send');
  const ta = document.getElementById('msg-input');
  if (!sendBtn || !ta) return;

  if (store.isStreaming) {
    sendBtn.innerHTML = IC.stop;
    sendBtn.classList.add('stop');
    sendBtn.disabled = false;
  } else {
    sendBtn.innerHTML = IC.send;
    sendBtn.classList.remove('stop');
    sendBtn.disabled = !ta.value.trim() && !attachedImages.length;
  }
}

function focusInput() {
  if (isMobile()) return;
  setTimeout(() => { const ta = document.getElementById('msg-input'); if (ta) ta.focus(); }, 150);
}

function handleFileAttach(e) {
  const chat = store.getChat();
  const currentModel = chat ? store.modelMap[chat.model] : null;
  if (!modelSupportsImages(currentModel)) {
    toast('Das aktuelle Modell unterstützt wahrscheinlich keine Bilder.', 'error');
    e.target.value = '';
    return;
  }

  const files = Array.from(e.target.files || []);
  files.forEach(file => {
    if (!file.type.startsWith('image/')) { toast('Nur Bilder werden unterstützt.', 'error'); return; }
    const reader = new FileReader();
    reader.onload = () => {
      attachedImages.push({ name: file.name, data: reader.result });
      updateAttachedPreview();
      updateSendBtn();
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}

function updateAttachedPreview() {
  const preview = document.getElementById('attached-preview');
  if (!preview) return;

  if (!attachedImages.length) {
    preview.style.display = 'none';
    preview.innerHTML = '';
    return;
  }

  preview.style.display = 'flex';
  preview.innerHTML = attachedImages.map((img, i) => `
    <div class="attached-chip">
      <img src="${escAttr(img.data)}" alt="${escAttr(img.name)}">
      <span>${esc(img.name.length > 15 ? img.name.slice(0, 12) + '…' : img.name)}</span>
      <button data-remove="${i}" title="Entfernen">${IC.x}</button>
    </div>
  `).join('');

  preview.querySelectorAll('[data-remove]').forEach(btn => {
    btn.addEventListener('click', () => {
      attachedImages.splice(parseInt(btn.dataset.remove), 1);
      updateAttachedPreview();
      updateSendBtn();
    });
  });
}

// ────────────────────────────────
// §14  SEND / STREAM
// ────────────────────────────────
async function handleSend() {
  const ta = document.getElementById('msg-input');
  if (!ta) return;
  const content = ta.value.trim();
  if (!content && !attachedImages.length) return;
  const chat = store.getChat();
  const currentModel = chat ? store.modelMap[chat.model] : null;
  if (attachedImages.length && !modelSupportsImages(currentModel)) {
    toast('Das aktuelle Modell unterstützt wahrscheinlich keine Bilder.', 'error');
    return;
  }
  ta.value = '';
  ta.style.height = 'auto';
  // Clear draft for this chat
  if (chat) { chat.draft = ''; store.save(); }
  updateInputTokenCount();
  sendChatMessage(content, false);
}

async function sendChatMessage(content, isResend) {
  let chat = store.getChat();
  if (!chat) { chat = store.newChat(); render(); }

  const currentModel = store.modelMap[chat.model];
  if (attachedImages.length && !modelSupportsImages(currentModel)) {
    toast('Das aktuelle Modell unterstützt wahrscheinlich keine Bilder.', 'error');
    return;
  }

  if (chat.messages.length === 0 && chat.title === 'Neuer Chat' && content) {
    chat.title = content.slice(0, 50) + (content.length > 50 ? '…' : '');
  }

  if (!isResend) {
    const userMsg = { id: uuid(), role: 'user', content: content || '(Bild angehängt)', ts: Date.now() };
    if (attachedImages.length) userMsg.images = [...attachedImages];
    chat.messages.push(userMsg);
    attachedImages = [];
    updateAttachedPreview();
  }

  chat.updatedAt = Date.now();
  store.save();
  renderSidebar();
  renderMessages();

  const { messages: apiMsgs, truncated } = buildApiMessagesForChat(chat, currentModel);
  if (truncated) toast(`${truncated} ältere Nachrichten wurden für diese Anfrage ausgelassen.`, 'info');

  showTypingIndicator();

  let fullText = '';
  let rawContentText = '';
  let apiReasoningText = '';
  let inlineReasoningText = '';
  const startTime = Date.now();

  const effectiveParams = { ...store.settings };
  if (!modelSupportsReasoning(currentModel)) {
    effectiveParams.reasoningEnabled = false;
  }

  const onToken = (token, type) => {
    if (type === 'reasoning') {
      apiReasoningText = appendChunk(apiReasoningText, token);
      updateStreamReasoning(combineReasoningTexts(apiReasoningText, inlineReasoningText));
    } else {
      rawContentText = appendChunk(rawContentText, token);
      const split = splitInlineThinking(rawContentText, true);
      fullText = split.content;
      inlineReasoningText = split.reasoning;

      const combinedReasoning = combineReasoningTexts(apiReasoningText, inlineReasoningText);
      if (combinedReasoning.trim()) updateStreamReasoning(combinedReasoning);
      updateStreamContent(fullText);
    }
  };

  const onDone = (info = {}) => {
    stopReasoningTimer();
    removeTypingIndicator();
    const duration = Date.now() - startTime;
    const usage = info.usage || {};
    const promptTokens = usage.prompt_tokens || 0;
    const compTokens = usage.completion_tokens || 0;

    const model = store.modelMap[chat.model];
    let cost = 0;
    if (model?.pricing) {
      const pp = parseFloat(model.pricing.prompt) || 0;
      const cp = parseFloat(model.pricing.completion) || 0;
      cost = (promptTokens * pp) + (compTokens * cp);
    }

    const finalSplit = splitInlineThinking(rawContentText, false);
    fullText = finalSplit.content;
    inlineReasoningText = finalSplit.reasoning;

    // If nothing was returned (aborted early) skip pushing an empty msg
    const finalReasoningText = combineReasoningTexts(apiReasoningText, inlineReasoningText);

    if (!fullText.trim() && !finalReasoningText.trim()) {
      renderMessages();
      return;
    }

    const assistantMsg = {
      id: uuid(), role: 'assistant', content: fullText, ts: Date.now(),
      reasoning: finalReasoningText || undefined,
      tokens: { prompt: promptTokens, completion: compTokens },
      cost, model: chat.model, duration,
      debug: store.settings.showDebug ? info.debug : undefined,
    };
    chat.messages.push(assistantMsg);
    chat.tokens += promptTokens + compTokens;
    chat.cost += cost;
    store.totalCost += cost;
    store.save();
    renderMessages();
    renderSidebar();
    renderMainHeader();
    updateInputTokenCount();
  };

  const onError = (err) => {
    stopReasoningTimer();
    removeTypingIndicator();
    const errorInfo = classifyApiError(err);
    const errMsg = {
      id: uuid(), role: 'assistant',
      content: formatErrorForUser(err),
      ts: Date.now(), error: true,
      errorType: errorInfo.title,
      debug: store.settings.showDebug ? { message: err.message, status: err.status, payload: err.payload } : undefined,
    };
    chat.messages.push(errMsg);
    store.save();
    renderMessages();
    renderMainHeader();
    toast(errorInfo.title, 'error');
  };

  // Fix: start stream first so isStreaming=true BEFORE updateSendBtn runs.
  const streamPromise = streamChat(apiMsgs, chat.model, effectiveParams, onToken, onDone, onError);
  updateSendBtn();
  await streamPromise;
  updateSendBtn();
}

function stopStreaming() {
  if (store.abortCtrl) { store.abortCtrl.abort(); store.abortCtrl = null; }
  stopReasoningTimer();
  stopStreamStats();
  clearStreamingFrames();
}

function regenerateMessage(msg, chat) {
  const idx = chat.messages.indexOf(msg);
  if (idx < 0) return;
  chat.messages = chat.messages.slice(0, idx);
  store.save();
  renderMessages();
  const lastUser = [...chat.messages].reverse().find(m => m.role === 'user');
  if (lastUser) sendChatMessage(lastUser.content, true);
}

function retryMessage(msg, chat) {
  const idx = chat.messages.indexOf(msg);
  if (idx < 0) return;
  // Remove the error message, then resend last user input
  chat.messages.splice(idx, 1);
  store.save();
  renderMessages();
  const lastUser = [...chat.messages].reverse().find(m => m.role === 'user');
  if (lastUser) sendChatMessage(lastUser.content, true);
  else toast('Keine vorherige Nachricht zum Wiederholen.', 'info');
}

// ────────────────────────────────
// §15  EXPORT
// ────────────────────────────────
function exportChat() {
  const chat = store.getChat();
  if (!chat || !chat.messages.length) { toast('Kein Chat zum Exportieren.', 'info'); return; }
  let md = `# ${chat.title}\n\n`;
  md += `**Modell:** ${chat.model}\n**Erstellt:** ${new Date(chat.createdAt).toLocaleString('de')}\n\n---\n\n`;
  for (const m of chat.messages) {
    if (m.error) continue;
    if (m.reasoning) md += `<details><summary>Denkprozess</summary>\n\n${m.reasoning}\n\n</details>\n\n`;
    md += `### ${m.role === 'user' ? 'Du' : 'Assistent'}\n\n${m.content}\n\n---\n\n`;
  }
  const blob = new Blob([md], { type: 'text/markdown' });
  const filename = `${chat.title.replace(/[^a-zA-Z0-9äöüÄÖÜß -]/g, '_')}.md`;
  downloadBlob(blob, filename);
  toast('Chat exportiert', 'success');
}

const MODEL_CATEGORIES = [
  { key: 'all', label: 'Alle' },
  { key: 'fav', label: '★ Favoriten' },
  { key: 'free', label: 'Kostenlos' },
  { key: 'reasoning', label: '🧠 Reasoning' },

  { key: 'openai', label: 'OpenAI' },
  { key: 'anthropic', label: 'Anthropic' },
  { key: 'google', label: 'Google' },
  { key: 'meta', label: 'Meta' },
  { key: 'mistral', label: 'Mistral' },
];

const MODEL_SORTS = [
  { key: 'name', label: 'Name A–Z' },
  { key: 'price-asc', label: 'Preis ↑' },
  { key: 'price-desc', label: 'Preis ↓' },
  { key: 'ctx-desc', label: 'Kontext ↓' },
  { key: 'newest', label: 'Neueste zuerst' },
];

function filterModels() {
  let list = store.models.slice();
  const q = modelFilter.toLowerCase();
  if (q) list = list.filter(m => (m.name || m.id).toLowerCase().includes(q) || m.id.toLowerCase().includes(q));

  if (modelCategory === 'fav') list = list.filter(m => store.favModels.includes(m.id));
  else if (modelCategory === 'free') list = list.filter(m => parseFloat(m.pricing?.prompt || '1') === 0 && parseFloat(m.pricing?.completion || '1') === 0);
  else if (modelCategory === 'reasoning') list = list.filter(m => modelSupportsReasoning(m));
  else if (modelCategory === 'multimodal') list = list.filter(m => modelSupportsImages(m));
  else if (modelCategory === 'large') list = list.filter(m => (m.context_length || 0) >= 100000);
  else if (['openai','anthropic','google','meta','mistral'].includes(modelCategory)) list = list.filter(m => m.id.toLowerCase().includes(modelCategory));

  const sort = store.settings.modelSort || 'name';
  list.sort((a, b) => {
    if (sort === 'price-asc' || sort === 'price-desc') {
      const pa = (parseFloat(a.pricing?.prompt || '0') + parseFloat(a.pricing?.completion || '0'));
      const pb = (parseFloat(b.pricing?.prompt || '0') + parseFloat(b.pricing?.completion || '0'));
      return sort === 'price-asc' ? pa - pb : pb - pa;
    }
    if (sort === 'ctx-desc') {
      return (b.context_length || 0) - (a.context_length || 0);
    }
    if (sort === 'newest') {
      return (b.created || 0) - (a.created || 0);
    }
    // name (default)
    return (a.name || a.id).localeCompare(b.name || b.id);
  });

  return list;
}

function updateModelsGrid() {
  const grid = document.getElementById('models-grid');
  if (!grid) return;

  const chat = store.getChat();
  const currentModel = chat?.model;
  const filtered = filterModels();

  const countEl = document.getElementById('models-count');
  if (countEl) countEl.textContent = `${filtered.length} Treffer`;

  grid.innerHTML = `
    ${filtered.length === 0 ? '<p style="padding:20px;color:var(--text-3);text-align:center">Keine Modelle gefunden</p>' : ''}
    ${filtered.slice(0, 120).map(m => modelCardHtml(m, currentModel)).join('')}
    ${filtered.length > 120 ? `<p style="padding:12px;color:var(--text-3);text-align:center;font-size:.82rem">${filtered.length - 120} weitere Modelle — verfeinere die Suche</p>` : ''}
  `;

  grid.querySelectorAll('.model-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.fav-btn')) return;
      const id = card.dataset.id;
      if (chat) { chat.model = id; store.save(); }
      toggleModels(false);
      render();
      toast(`Modell: ${(store.modelMap[id]?.name || id).split('/').pop()}`, 'success');
    });
  });

  grid.querySelectorAll('.fav-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.dataset.model;
      const idx = store.favModels.indexOf(id);
      if (idx >= 0) store.favModels.splice(idx, 1);
      else store.favModels.push(id);
      store.save();
      updateModelsGrid();
    });
  });
}

function modelCardHtml(m, currentModel) {
  const isFav = store.favModels.includes(m.id);
  const isSelected = m.id === currentModel;
  const pp = parseFloat(m.pricing?.prompt || '0');
  const cp = parseFloat(m.pricing?.completion || '0');
  const isFree = pp === 0 && cp === 0;
  const provider = m.id.split('/')[0] || '?';
  const ctx = m.context_length || 0;
  const supportsR = modelSupportsReasoning(m);

  const badges = [];
  if (isFree) badges.push('<span class="badge badge-green">Kostenlos</span>');
  if (supportsR) badges.push('<span class="badge badge-reasoning">🧠 Reasoning</span>');
  if (ctx >= 100000) badges.push(`<span class="badge badge-blue">${formatTokens(ctx)} ctx</span>`);
  if (modelSupportsImages(m)) badges.push('<span class="badge badge-amber">Multimodal</span>');

  return `<div class="model-card${isSelected ? ' selected' : ''}" data-id="${escAttr(m.id)}">
    <div class="mc-top">
      <div style="min-width:0">
        <div class="mc-name">${esc((m.name || m.id).split('/').pop())}</div>
        <div class="mc-provider">${esc(provider)}</div>
      </div>
      <button class="fav-btn${isFav ? ' faved' : ''}" data-model="${escAttr(m.id)}" title="Favorit">${isFav ? IC.starFill : IC.star}</button>
    </div>
    ${badges.length ? `<div class="mc-badges">${badges.join('')}</div>` : ''}
    <div class="mc-stats">
      <span>Prompt: ${isFree ? 'gratis' : '$' + (pp * 1e6).toFixed(2) + '/M'}</span>
      <span>Compl: ${isFree ? 'gratis' : '$' + (cp * 1e6).toFixed(2) + '/M'}</span>
      ${ctx ? `<span>Ctx: ${formatTokens(ctx)}</span>` : ''}
    </div>
  </div>`;
}

        if (Array.isArray(data.favModels)) store.favModels = normalizeStringArray(data.favModels);

        render();

    };
    reader.readAsText(file);
    e.target.value = '';
  });

function showRenameModal(chatId) {
  const chat = store.chats.find(c => c.id === chatId);
  if (!chat) return;

  const overlay = el('div', { className: 'modal-overlay' });
  const modal = el('div', { className: 'modal' });
  modal.innerHTML = `
    <h2>Chat umbenennen</h2>
    <input type="text" id="rename-input" value="${escAttr(chat.title)}" maxlength="80">
    <div class="modal-btns">
      <button class="btn-cancel">Abbrechen</button>
      <button class="btn-confirm">Speichern</button>
    </div>
  `;
  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  const inp = modal.querySelector('#rename-input');
  setTimeout(() => { inp.focus(); inp.select(); }, 50);

  const close = () => overlay.remove();
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
  modal.querySelector('.btn-cancel').onclick = close;
  modal.querySelector('.btn-confirm').onclick = () => {
    chat.title = inp.value.trim() || chat.title;
    store.save();
    renderSidebar();
    renderMainHeader();
    close();
  };
  inp.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') modal.querySelector('.btn-confirm').click();
    if (e.key === 'Escape') close();
  });
}

let lastWidth = window.innerWidth;
window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const sb = document.getElementById('sidebar');
  const bd = document.getElementById('sidebar-backdrop');

  if (lastWidth <= 768 && w > 768) {
    if (bd) bd.classList.remove('visible');
    if (sb) sb.classList.toggle('collapsed', !store.settings.sidebarOpen);
  }

  if (lastWidth > 768 && w <= 768) {
    if (sb) sb.classList.add('collapsed');
    if (bd) bd.classList.remove('visible');
  }

  lastWidth = w;
});

// §21  BEFORE UNLOAD — persist drafts immediately
// ────────────────────────────────
window.addEventListener('beforeunload', () => {
  const ta = document.getElementById('msg-input');
  const chat = store.getChat();
  if (ta && chat) {
    chat.draft = ta.value;
  }
  // Flush any pending debounced save
  if (store._saveTimer) { clearTimeout(store._saveTimer); store._saveTimer = null; }
  if (store._draftTimer) { clearTimeout(store._draftTimer); store._draftTimer = null; }
  store.save();
});

// Also persist drafts when tab becomes hidden (mobile background, etc.)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') {
    const ta = document.getElementById('msg-input');
    const chat = store.getChat();
    if (ta && chat) chat.draft = ta.value;
    store.save();
  }
});

// ────────────────────────────────
// §22  INIT
// ────────────────────────────────
renderKeyScreen();
</script>
</body>
</html>
