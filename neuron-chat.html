<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus · OpenRouter Chat</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='7' r='3' fill='%23c98a3c'/><circle cx='7' cy='26' r='3' fill='%23c98a3c'/><circle cx='25' cy='26' r='3' fill='%23c98a3c'/><line x1='16' y1='10' x2='9' y2='23' stroke='%23c98a3c' stroke-width='2'/><line x1='16' y1='10' x2='23' y2='23' stroke='%23c98a3c' stroke-width='2'/><line x1='10' y1='26' x2='22' y2='26' stroke='%23c98a3c' stroke-width='2'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   NEXUS DESIGN SYSTEM — CSS
   ═══════════════════════════════════════════ */

/* ── Tokens ── */
:root, [data-theme="dark"] {
  --bg-0: #08080a;
  --bg-1: #0e0e11;
  --bg-2: #151518;
  --bg-3: #1c1c20;
  --bg-4: #232328;
  --bg-hover: #2a2a30;
  --border-1: #1f1f25;
  --border-2: #2e2e35;
  --text-1: #eaeaec;
  --text-2: #9a9aa2;
  --text-3: #606068;
  --accent: #c98a3c;
  --accent-h: #dfa050;
  --accent-dim: rgba(201,138,60,.12);
  --accent-glow: rgba(201,138,60,.22);
  --green: #3db870;
  --red: #dc4e4e;
  --blue: #5a9fea;
  --orange: #d49030;
  --radius-s: 6px;
  --radius-m: 10px;
  --radius-l: 16px;
  --radius-xl: 24px;
  --shadow-s: 0 1px 3px rgba(0,0,0,.4);
  --shadow-m: 0 4px 16px rgba(0,0,0,.45);
  --shadow-l: 0 12px 40px rgba(0,0,0,.55);
  --ff: 'Inter',system-ui,-apple-system,sans-serif;
  --fm: 'JetBrains Mono','Fira Code',ui-monospace,monospace;
  --sidebar-w: 280px;
  --header-h: 52px;
  --msg-max: 780px;
  color-scheme: dark;
}
[data-theme="light"] {
  --bg-0: #efede9;
  --bg-1: #f5f3f0;
  --bg-2: #faf9f7;
  --bg-3: #ffffff;
  --bg-4: #ffffff;
  --bg-hover: #ebe9e5;
  --border-1: #dddad5;
  --border-2: #ccc9c3;
  --text-1: #18181b;
  --text-2: #55555d;
  --text-3: #99999f;
  --accent: #a87125;
  --accent-h: #bf8430;
  --accent-dim: rgba(168,113,37,.1);
  --accent-glow: rgba(168,113,37,.16);
  --shadow-s: 0 1px 3px rgba(0,0,0,.07);
  --shadow-m: 0 4px 16px rgba(0,0,0,.09);
  --shadow-l: 0 12px 40px rgba(0,0,0,.13);
  color-scheme: light;
}

/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{font-family:var(--ff);background:var(--bg-0);color:var(--text-1);line-height:1.6;overflow:hidden;height:100dvh}
a{color:var(--accent);text-decoration:none}
a:hover{color:var(--accent-h)}
img,svg{display:block;max-width:100%}
button,input,textarea,select{font:inherit;color:inherit;border:none;background:none;outline:none}
button{cursor:pointer}
ul,ol{list-style:none}
::selection{background:var(--accent-dim);color:var(--accent-h)}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:9px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}

/* ── Utilities ── */
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap}
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ═══ KEY ENTRY SCREEN ═══ */
#key-screen{position:fixed;inset:0;z-index:900;display:flex;align-items:center;justify-content:center;background:var(--bg-0);transition:opacity .5s,visibility .5s}
#key-screen.hidden{opacity:0;visibility:hidden;pointer-events:none}
#key-screen .bg-grad{position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 40%,var(--accent-dim),transparent 70%);pointer-events:none}
.key-card{position:relative;width:100%;max-width:440px;padding:48px 36px 40px;background:var(--bg-2);border:1px solid var(--border-1);border-radius:var(--radius-l);box-shadow:var(--shadow-l),0 0 80px var(--accent-glow);z-index:1;animation:fadeUp .6s ease}
.key-card .logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
.key-card .logo svg{width:34px;height:34px;color:var(--accent)}
.key-card .logo h1{font-size:1.65rem;font-weight:700;letter-spacing:-.5px}
.key-card .logo span{color:var(--accent)}
.key-card label{display:block;font-size:.82rem;font-weight:500;color:var(--text-2);margin-bottom:8px;letter-spacing:.02em}
.key-input-wrap{position:relative;margin-bottom:20px}
.key-input-wrap input{width:100%;padding:13px 44px 13px 16px;background:var(--bg-1);border:1px solid var(--border-2);border-radius:var(--radius-m);font-size:.95rem;font-family:var(--fm);transition:border-color .25s,box-shadow .25s;letter-spacing:.03em}
.key-input-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.key-input-wrap .toggle-vis{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-3);transition:color .2s}
.key-input-wrap .toggle-vis:hover{color:var(--text-2)}
.key-card .storage-opt{display:flex;align-items:center;gap:8px;margin-bottom:22px;font-size:.82rem;color:var(--text-2)}
.key-card .storage-opt input[type=checkbox]{accent-color:var(--accent);width:16px;height:16px}
.btn-primary{width:100%;padding:13px 0;border-radius:var(--radius-m);background:var(--accent);color:#fff;font-weight:600;font-size:.95rem;transition:background .2s,transform .15s,box-shadow .2s;letter-spacing:.01em}
.btn-primary:hover{background:var(--accent-h);box-shadow:0 4px 20px var(--accent-glow)}
.btn-primary:active{transform:scale(.985)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.key-card .sec-info{margin-top:24px;padding-top:20px;border-top:1px solid var(--border-1)}
.key-card .sec-item{display:flex;align-items:flex-start;gap:10px;font-size:.78rem;color:var(--text-3);margin-bottom:10px;line-height:1.5}
.key-card .sec-item svg{width:16px;height:16px;flex-shrink:0;margin-top:2px;color:var(--green)}

/* ═══ MAIN LAYOUT ═══ */
#app-main{display:flex;height:100dvh;opacity:0;visibility:hidden;transition:opacity .5s,visibility .5s}
#app-main.visible{opacity:1;visibility:visible}

/* ── Sidebar ── */
.sidebar{width:var(--sidebar-w);height:100%;display:flex;flex-direction:column;background:var(--bg-1);border-right:1px solid var(--border-1);flex-shrink:0;transition:margin-left .3s ease,opacity .3s}
.sidebar.collapsed{margin-left:calc(-1 * var(--sidebar-w));opacity:0}
.sidebar-head{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-1)}
.sidebar-head .brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:1.05rem}
.sidebar-head .brand svg{width:22px;height:22px;color:var(--accent)}
.sidebar-head .brand span{color:var(--accent)}
.sidebar-actions{padding:12px 12px 8px;display:flex;gap:6px}
.sidebar-actions button,.btn-icon{display:flex;align-items:center;justify-content:center;gap:7px;padding:9px 14px;border-radius:var(--radius-s);font-size:.82rem;font-weight:500;transition:background .15s,color .15s}
.btn-new-chat{flex:1;background:var(--accent-dim);color:var(--accent)}
.btn-new-chat:hover{background:var(--accent);color:#fff}
.btn-icon{width:36px;height:36px;padding:0;color:var(--text-3)}
.btn-icon:hover{background:var(--bg-hover);color:var(--text-1)}
.sidebar-search{padding:0 12px 10px}
.sidebar-search input{width:100%;padding:8px 12px;background:var(--bg-0);border:1px solid var(--border-1);border-radius:var(--radius-s);font-size:.82rem;transition:border-color .2s}
.sidebar-search input:focus{border-color:var(--accent)}
.chat-list{flex:1;overflow-y:auto;padding:4px 8px}
.chat-list-section{margin-bottom:8px}
.chat-list-section .section-label{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);padding:10px 10px 4px}
.chat-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--radius-s);cursor:pointer;transition:background .15s;position:relative}
.chat-item:hover{background:var(--bg-hover)}
.chat-item.active{background:var(--accent-dim)}
.chat-item .chat-icon{width:18px;height:18px;color:var(--text-3);flex-shrink:0}
.chat-item.active .chat-icon{color:var(--accent)}
.chat-item .chat-title{flex:1;font-size:.84rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-item .chat-actions{display:flex;gap:2px;opacity:0;transition:opacity .15s}
.chat-item:hover .chat-actions{opacity:1}
.chat-item .chat-actions button{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:4px;color:var(--text-3);transition:background .15s,color .15s}
.chat-item .chat-actions button:hover{background:var(--bg-4);color:var(--text-1)}
.sidebar-footer{padding:12px;border-top:1px solid var(--border-1);display:flex;flex-direction:column;gap:4px}
.sidebar-footer button{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-s);font-size:.82rem;color:var(--text-2);transition:background .15s,color .15s;width:100%;text-align:left}
.sidebar-footer button:hover{background:var(--bg-hover);color:var(--text-1)}
.sidebar-footer button svg{width:17px;height:17px;flex-shrink:0}

/* ── Main Area ── */
.main-area{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
.main-header{height:var(--header-h);padding:0 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-1);background:var(--bg-1);flex-shrink:0;gap:12px}
.main-header .left{display:flex;align-items:center;gap:12px}
.main-header .model-sel{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--bg-3);border:1px solid var(--border-1);border-radius:var(--radius-s);font-size:.84rem;font-weight:500;cursor:pointer;transition:border-color .2s,background .15s;max-width:300px}
.main-header .model-sel:hover{border-color:var(--accent);background:var(--bg-4)}
.main-header .model-sel .model-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.main-header .right{display:flex;align-items:center;gap:6px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:.7rem;font-weight:600;letter-spacing:.02em}
.badge-amber{background:var(--accent-dim);color:var(--accent)}
.badge-green{background:rgba(61,184,112,.12);color:var(--green)}
.badge-blue{background:rgba(90,159,234,.12);color:var(--blue)}

/* ── Chat Messages ── */
.chat-container{flex:1;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column}
.chat-messages{max-width:var(--msg-max);width:100%;margin:0 auto;display:flex;flex-direction:column;gap:6px;flex:1}
.msg-group{display:flex;flex-direction:column;gap:2px}
.msg{position:relative;padding:14px 18px;border-radius:var(--radius-m);font-size:.92rem;line-height:1.72;animation:fadeUp .3s ease}
.msg-user{background:var(--accent-dim);border:1px solid rgba(201,138,60,.1);align-self:flex-end;max-width:85%;border-bottom-right-radius:4px}
.msg-assistant{background:var(--bg-2);border:1px solid var(--border-1);align-self:flex-start;max-width:92%;border-bottom-left-radius:4px}
.msg-system{background:var(--bg-3);border:1px solid var(--border-2);border-left:3px solid var(--accent);font-size:.85rem;color:var(--text-2);align-self:stretch}
.msg-role{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-bottom:4px}
.msg-meta{display:flex;align-items:center;gap:12px;margin-top:10px;font-size:.72rem;color:var(--text-3)}
.msg-actions{display:flex;gap:2px;margin-left:auto;opacity:0;transition:opacity .15s}
.msg:hover .msg-actions{opacity:1}
.msg-actions button{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:4px;color:var(--text-3);transition:background .15s,color .15s}
.msg-actions button:hover{background:var(--bg-hover);color:var(--text-1)}
.msg-error{background:rgba(220,78,78,.08);border-color:rgba(220,78,78,.2);color:var(--red)}
.typing-indicator{display:inline-flex;gap:4px;padding:4px 0}
.typing-indicator span{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:blink 1.4s infinite both}
.typing-indicator span:nth-child(2){animation-delay:.2s}
.typing-indicator span:nth-child(3){animation-delay:.4s}

/* ── Markdown in messages ── */
.msg-content{overflow-wrap:break-word;word-break:break-word}
.msg-content p{margin-bottom:.6em}
.msg-content p:last-child{margin-bottom:0}
.msg-content strong{font-weight:600}
.msg-content em{font-style:italic}
.msg-content ul,.msg-content ol{padding-left:1.4em;margin-bottom:.6em}
.msg-content li{margin-bottom:.25em}
.msg-content ol{list-style:decimal}
.msg-content ul{list-style:disc}
.msg-content blockquote{border-left:3px solid var(--accent);padding:4px 14px;margin:8px 0;color:var(--text-2);background:var(--accent-dim);border-radius:0 var(--radius-s) var(--radius-s) 0}
.msg-content a{color:var(--accent);text-decoration:underline;text-underline-offset:2px}
.msg-content table{border-collapse:collapse;margin:8px 0;font-size:.85rem;width:100%;overflow-x:auto;display:block}
.msg-content th,.msg-content td{border:1px solid var(--border-2);padding:6px 10px;text-align:left}
.msg-content th{background:var(--bg-3);font-weight:600}
.msg-content h1,.msg-content h2,.msg-content h3,.msg-content h4{font-weight:600;margin:16px 0 8px;line-height:1.3}
.msg-content h1{font-size:1.3rem}
.msg-content h2{font-size:1.15rem}
.msg-content h3{font-size:1.05rem}
.msg-content h4{font-size:.95rem}
.msg-content code:not(pre code){background:var(--bg-4);padding:1px 6px;border-radius:4px;font-size:.85em;font-family:var(--fm)}
.msg-content pre{margin:10px 0;border-radius:var(--radius-s);overflow:hidden;border:1px solid var(--border-1)}
.code-header{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;background:var(--bg-4);font-size:.73rem;font-weight:500;color:var(--text-3);border-bottom:1px solid var(--border-1)}
.code-header button{display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--text-3);padding:3px 8px;border-radius:4px;transition:background .15s,color .15s}
.code-header button:hover{background:var(--bg-hover);color:var(--text-1)}
.msg-content pre code{display:block;padding:14px 16px;background:var(--bg-1);font-size:.82rem;font-family:var(--fm);line-height:1.6;overflow-x:auto;white-space:pre}
.msg-content hr{border:none;border-top:1px solid var(--border-1);margin:12px 0}
.msg-content img{max-width:100%;border-radius:var(--radius-s);margin:8px 0}

/* ── Chat Input ── */
.chat-input-area{padding:12px 20px 20px;background:var(--bg-1);border-top:1px solid var(--border-1)}
.chat-input-wrap{max-width:var(--msg-max);margin:0 auto;position:relative}
.chat-input-box{display:flex;align-items:flex-end;gap:8px;background:var(--bg-2);border:1px solid var(--border-2);border-radius:var(--radius-m);padding:10px 14px;transition:border-color .25s,box-shadow .25s}
.chat-input-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.chat-input-box textarea{flex:1;resize:none;background:none;font-size:.92rem;line-height:1.55;max-height:200px;min-height:24px;overflow-y:auto}
.chat-input-box textarea::placeholder{color:var(--text-3)}
.chat-input-box .send-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-s);background:var(--accent);color:#fff;transition:background .2s,transform .15s;flex-shrink:0}
.chat-input-box .send-btn:hover{background:var(--accent-h)}
.chat-input-box .send-btn:active{transform:scale(.92)}
.chat-input-box .send-btn:disabled{opacity:.35;cursor:not-allowed}
.chat-input-box .send-btn.stop{background:var(--red)}
.chat-input-box .attach-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-s);color:var(--text-3);transition:background .15s,color .15s;flex-shrink:0}
.chat-input-box .attach-btn:hover{background:var(--bg-hover);color:var(--text-1)}
.input-info{display:flex;align-items:center;justify-content:space-between;margin-top:6px;font-size:.72rem;color:var(--text-3);padding:0 4px}

/* ── Empty State ── */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;gap:16px}
.empty-state svg{width:56px;height:56px;color:var(--border-2)}
.empty-state h3{font-size:1.15rem;font-weight:600;color:var(--text-2)}
.empty-state p{font-size:.85rem;color:var(--text-3);max-width:360px;line-height:1.6}
.preset-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:8px;max-width:480px;width:100%}
.preset-card{padding:14px 16px;background:var(--bg-2);border:1px solid var(--border-1);border-radius:var(--radius-m);text-align:left;cursor:pointer;transition:border-color .2s,background .15s,transform .15s}
.preset-card:hover{border-color:var(--accent);background:var(--bg-3);transform:translateY(-1px)}
.preset-card h4{font-size:.84rem;font-weight:600;margin-bottom:3px}
.preset-card p{font-size:.75rem;color:var(--text-3);line-height:1.4;margin:0}

/* ═══ MODELS VIEW ═══ */
.models-overlay{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);opacity:0;visibility:hidden;transition:opacity .25s,visibility .25s}
.models-overlay.visible{opacity:1;visibility:visible}
.models-panel{position:fixed;top:0;right:0;bottom:0;width:min(680px,100%);z-index:801;background:var(--bg-1);border-left:1px solid var(--border-1);transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column;box-shadow:var(--shadow-l)}
.models-panel.visible{transform:translateX(0)}
.models-head{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-1)}
.models-head h2{font-size:1.1rem;font-weight:600}
.models-search{padding:12px 20px;display:flex;flex-direction:column;gap:8px;border-bottom:1px solid var(--border-1)}
.models-search input{width:100%;padding:10px 14px;background:var(--bg-2);border:1px solid var(--border-1);border-radius:var(--radius-s);font-size:.88rem;transition:border-color .2s}
.models-search input:focus{border-color:var(--accent)}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap}
.filter-chip{padding:5px 12px;border-radius:99px;font-size:.74rem;font-weight:500;background:var(--bg-3);border:1px solid var(--border-1);cursor:pointer;transition:all .15s;white-space:nowrap}
.filter-chip:hover{border-color:var(--accent)}
.filter-chip.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.models-grid{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px}
.model-card{padding:14px 16px;background:var(--bg-2);border:1px solid var(--border-1);border-radius:var(--radius-m);cursor:pointer;transition:border-color .2s,background .15s}
.model-card:hover{border-color:var(--accent);background:var(--bg-3)}
.model-card.selected{border-color:var(--accent);background:var(--accent-dim)}
.model-card .mc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px}
.model-card .mc-name{font-size:.88rem;font-weight:600;line-height:1.3}
.model-card .mc-provider{font-size:.75rem;color:var(--text-3);font-weight:500}
.model-card .mc-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.model-card .mc-stats{display:flex;gap:14px;margin-top:8px;font-size:.73rem;color:var(--text-3)}
.model-card .mc-stats span{display:flex;align-items:center;gap:4px}
.model-card .fav-btn{color:var(--text-3);transition:color .15s;flex-shrink:0}
.model-card .fav-btn:hover,.model-card .fav-btn.faved{color:var(--accent)}

/* ═══ SETTINGS PANEL ═══ */
.settings-overlay{position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);opacity:0;visibility:hidden;transition:opacity .25s,visibility .25s}
.settings-overlay.visible{opacity:1;visibility:visible}
.settings-panel{position:fixed;top:0;right:0;bottom:0;width:min(420px,100%);z-index:801;background:var(--bg-1);border-left:1px solid var(--border-1);transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column;box-shadow:var(--shadow-l)}
.settings-panel.visible{transform:translateX(0)}
.settings-head{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-1)}
.settings-head h2{font-size:1.1rem;font-weight:600}
.settings-body{flex:1;overflow-y:auto;padding:20px}
.setting-section{margin-bottom:24px}
.setting-section h3{font-size:.82rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-bottom:14px}
.setting-row{margin-bottom:16px}
.setting-row label{display:flex;align-items:center;justify-content:space-between;font-size:.85rem;margin-bottom:6px;color:var(--text-2)}
.setting-row label span.val{font-family:var(--fm);font-size:.8rem;color:var(--accent);font-weight:500}
.setting-row input[type=range]{width:100%;accent-color:var(--accent);height:6px;cursor:pointer}
.setting-row input[type=number],.setting-row input[type=text]{width:100%;padding:9px 12px;background:var(--bg-2);border:1px solid var(--border-1);border-radius:var(--radius-s);font-size:.85rem;transition:border-color .2s}
.setting-row input:focus{border-color:var(--accent)}
.setting-row textarea{width:100%;padding:10px 12px;background:var(--bg-2);border:1px solid var(--border-1);border-radius:var(--radius-s);font-size:.85rem;resize:vertical;min-height:80px;transition:border-color .2s;line-height:1.55}
.setting-row textarea:focus{border-color:var(--accent)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border-1)}
.toggle-row:last-child{border-bottom:none}
.toggle-row .tl{font-size:.85rem}
.toggle-row .td{font-size:.75rem;color:var(--text-3);margin-top:1px}
.switch{position:relative;width:42px;height:24px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.switch .slider{position:absolute;inset:0;background:var(--bg-4);border:1px solid var(--border-2);border-radius:99px;cursor:pointer;transition:background .2s,border-color .2s}
.switch .slider::before{content:'';position:absolute;width:18px;height:18px;left:2px;top:2px;background:var(--text-2);border-radius:50%;transition:transform .2s,background .2s}
.switch input:checked+.slider{background:var(--accent-dim);border-color:var(--accent)}
.switch input:checked+.slider::before{transform:translateX(18px);background:var(--accent)}

/* ═══ DEBUG PANEL ═══ */
.debug-panel{background:var(--bg-1);border:1px solid var(--border-1);border-radius:var(--radius-m);margin:8px 0;overflow:hidden}
.debug-toggle{padding:8px 14px;font-size:.75rem;font-weight:500;color:var(--text-3);cursor:pointer;display:flex;align-items:center;gap:6px;transition:color .15s}
.debug-toggle:hover{color:var(--text-2)}
.debug-content{padding:0 14px 12px;font-family:var(--fm);font-size:.75rem;line-height:1.5;color:var(--text-2);white-space:pre-wrap;overflow-x:auto;max-height:300px;overflow-y:auto}

/* ═══ TOAST ═══ */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;background:var(--bg-3);border:1px solid var(--border-2);border-radius:var(--radius-m);box-shadow:var(--shadow-m);font-size:.84rem;animation:slideUp .3s ease;display:flex;align-items:center;gap:10px;max-width:360px}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
.toast.info{border-color:var(--blue);color:var(--blue)}

/* ═══ MODAL ═══ */
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.modal{background:var(--bg-2);border:1px solid var(--border-1);border-radius:var(--radius-l);box-shadow:var(--shadow-l);padding:28px;max-width:440px;width:calc(100% - 32px);animation:fadeUp .3s ease}
.modal h2{font-size:1.1rem;font-weight:600;margin-bottom:16px}
.modal input[type=text]{width:100%;padding:10px 12px;background:var(--bg-1);border:1px solid var(--border-2);border-radius:var(--radius-s);font-size:.9rem;margin-bottom:16px;transition:border-color .2s}
.modal input:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btns button{padding:9px 20px;border-radius:var(--radius-s);font-size:.85rem;font-weight:500;transition:background .15s}
.modal-btns .btn-cancel{color:var(--text-2)}
.modal-btns .btn-cancel:hover{background:var(--bg-hover)}
.modal-btns .btn-confirm{background:var(--accent);color:#fff}
.modal-btns .btn-confirm:hover{background:var(--accent-h)}
.modal-btns .btn-danger{background:var(--red);color:#fff}
.modal-btns .btn-danger:hover{background:#e56060}

/* ═══ COST VIEW ═══ */
.cost-bar{display:flex;align-items:center;gap:16px;padding:8px 16px;background:var(--bg-2);border-radius:var(--radius-s);font-size:.78rem;color:var(--text-3);margin:8px auto;max-width:var(--msg-max)}
.cost-bar .cost-val{font-family:var(--fm);font-weight:500;color:var(--accent)}

/* ═══ ANIMATIONS ═══ */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-spin{animation:spin .8s linear infinite}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  :root{--sidebar-w:100vw;--msg-max:100%}
  .sidebar{position:fixed;z-index:700;left:0;top:0;bottom:0}
  .sidebar.collapsed{margin-left:-100vw}
  .models-panel,.settings-panel{width:100%}
  .preset-grid{grid-template-columns:1fr}
  .msg-user{max-width:92%}
  .main-header .model-sel{max-width:180px}
}
@media(max-width:480px){
  .key-card{padding:32px 20px 28px;margin:0 12px}
  .chat-input-area{padding:10px 10px 14px}
}

// ────────────────────────────────
// §2  UTILITIES
// ────────────────────────────────
const $ = (/** @type string */ s, /** @type Element */ p) => (p || document).querySelector(s);
const $$ = (/** @type string */ s, /** @type Element */ p) => [...(p || document).querySelectorAll(s)];
const uuid = () => crypto.randomUUID ? crypto.randomUUID() : 'xxxx-xxxx-4xxx'.replace(/x/g, () => (Math.random()*16|0).toString(16));
const esc = (/** @type string */ s) => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
const sleep = (/** @type number */ ms) => new Promise(r => setTimeout(r, ms));

function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'className') e.className = v;
    else if (k === 'innerHTML') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else if (c) e.appendChild(c);
  }
  return e;
}

function formatCost(/** @type number */ n) {
  if (n < 0.0001) return '< $0.0001';
  if (n < 0.01) return '$' + n.toFixed(4);
  return '$' + n.toFixed(4);
}

function formatTokens(/** @type number */ n) {
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return String(n);
}

function formatDate(/** @type number */ ts) {
  const d = new Date(ts);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) return d.toLocaleTimeString('de', {hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('de', {day:'numeric',month:'short'});
}

function toast(/** @type string */ msg, /** @type string */ type = 'info') {
  const t = el('div', {className: `toast ${type}`, innerHTML: msg});
  document.getElementById('toasts').appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(10px)'; setTimeout(() => t.remove(), 300); }, 3500);
}

// ────────────────────────────────
// §3  STORE (State Management)
// ────────────────────────────────
/** @typedef {{id:string,title:string,model:string,messages:Array,createdAt:number,updatedAt:number,fav:boolean,archived:boolean,tokens:number,cost:number}} Chat */
/** @typedef {{id:string,role:string,content:string,ts:number,tokens?:{prompt:number,completion:number},cost?:number,model?:string,duration?:number,debug?:any,images?:Array}} Msg */

const DEFAULT_SETTINGS = {
  systemPrompt: '',
  temperature: 1,
  topP: 1,
  maxTokens: 0,
  presencePenalty: 0,
  frequencyPenalty: 0,
  streaming: true,
  autoScroll: true,
  theme: 'dark',
  keyStorage: 'session',
  showDebug: false,
  showTokens: true,
  showCosts: true,
  sidebarOpen: true,
};

const store = {
  apiKey: '',
  models: [],
  modelMap: {},
  favModels: JSON.parse(localStorage.getItem('nx_fav_models') || '[]'),
  chats: JSON.parse(localStorage.getItem('nx_chats') || '[]'),
  activeChatId: null,
  settings: { ...DEFAULT_SETTINGS, ...JSON.parse(localStorage.getItem('nx_settings') || '{}') },
  isStreaming: false,
  abortCtrl: null,
  totalCost: parseFloat(localStorage.getItem('nx_total_cost') || '0'),

  save() {
    localStorage.setItem('nx_chats', JSON.stringify(this.chats));
    localStorage.setItem('nx_settings', JSON.stringify(this.settings));
    localStorage.setItem('nx_fav_models', JSON.stringify(this.favModels));
    localStorage.setItem('nx_total_cost', String(this.totalCost));
  },
  getChat() { return this.chats.find(c => c.id === this.activeChatId); },
  newChat(model) {
    const c = { id: uuid(), title: 'Neuer Chat', model: model || 'openai/gpt-4o-mini', messages: [], createdAt: Date.now(), updatedAt: Date.now(), fav: false, archived: false, tokens: 0, cost: 0 };
    this.chats.unshift(c);
    this.activeChatId = c.id;
    this.save();
    return c;
  },
  deleteChat(id) { this.chats = this.chats.filter(c => c.id !== id); if (this.activeChatId === id) this.activeChatId = this.chats[0]?.id || null; this.save(); },
};

// Apply theme
document.documentElement.setAttribute('data-theme', store.settings.theme);

// ────────────────────────────────
// §4  OPENROUTER API CLIENT
// ────────────────────────────────
const API_BASE = 'https://openrouter.ai/api/v1';

async function fetchModels() {
  const r = await fetch(`${API_BASE}/models`, { headers: { 'Authorization': `Bearer ${store.apiKey}` } });
  if (!r.ok) throw new Error(`Fehler ${r.status}: ${r.statusText}`);
  const j = await r.json();
  store.models = (j.data || []).sort((a, b) => (a.name || a.id).localeCompare(b.name || b.id));
  store.modelMap = {};
  store.models.forEach(m => store.modelMap[m.id] = m);
  return store.models;
}

async function validateKey() {
  try {
    const r = await fetch(`${API_BASE}/models`, { headers: { 'Authorization': `Bearer ${store.apiKey}` } });
    return r.ok;
  } catch { return false; }
}

/**
 * Send chat completion with streaming
 * @param {Array} messages
 * @param {string} model
 * @param {object} params
 * @param {function} onToken
 * @param {function} onDone
 * @param {function} onError
 * @returns {Promise}
 */
async function streamChat(messages, model, params, onToken, onDone, onError) {
  const ctrl = new AbortController();
  store.abortCtrl = ctrl;
  store.isStreaming = true;

  const body = {
    model,
    messages,
    stream: params.streaming !== false,
    ...(params.temperature != null && params.temperature !== 1 ? { temperature: params.temperature } : {}),
    ...(params.topP != null && params.topP !== 1 ? { top_p: params.topP } : {}),
    ...(params.maxTokens > 0 ? { max_tokens: params.maxTokens } : {}),
    ...(params.presencePenalty ? { presence_penalty: params.presencePenalty } : {}),
    ...(params.frequencyPenalty ? { frequency_penalty: params.frequencyPenalty } : {}),
  };

  const reqDebug = { url: `${API_BASE}/chat/completions`, body };

  try {
    const r = await fetch(`${API_BASE}/chat/completions`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${store.apiKey}`,
        'HTTP-Referer': location.href,
        'X-Title': 'Nexus',
      },
      body: JSON.stringify(body),
      signal: ctrl.signal,
    });

    if (!r.ok) {
      const err = await r.json().catch(() => ({ error: { message: r.statusText } }));
      throw new Error(err.error?.message || `HTTP ${r.status}`);
    }

    if (!body.stream) {
      const j = await r.json();
      const content = j.choices?.[0]?.message?.content || '';
      const usage = j.usage || {};
      onToken(content);
      onDone({ usage, debug: { request: reqDebug, response: j } });
      return;
    }

    const reader = r.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    let fullResp = [];
    let usage = null;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || !trimmed.startsWith('data: ')) continue;
        const data = trimmed.slice(6);
        if (data === '[DONE]') { onDone({ usage, debug: { request: reqDebug, response: fullResp } }); store.isStreaming = false; store.abortCtrl = null; return; }
        try {
          const p = JSON.parse(data);
          fullResp.push(p);
          const c = p.choices?.[0]?.delta?.content;
          if (c) onToken(c);
          if (p.usage) usage = p.usage;
        } catch {}
      }
    }
    onDone({ usage, debug: { request: reqDebug, response: fullResp } });
  } catch (e) {
    if (e.name === 'AbortError') { onDone({ usage: null, debug: { request: reqDebug, response: 'ABORTED' } }); }
    else onError(e);
  } finally {
    store.isStreaming = false;
    store.abortCtrl = null;
  }
}

// §5  MARKDOWN RENDERING

marked.setOptions({
  highlight: (code, lang) => {
    if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
    return hljs.highlightAuto(code).value;
  },
  breaks: true,
  gfm: true,
});

function renderMd(/** @type string */ text) {
  let html = marked.parse(text || '');
  // Wrap code blocks with header
  html = html.replace(/<pre><code class="language-(\w+)">/g, (_, lang) =>
    `<pre><div class="code-header"><span>${esc(lang)}</span><button onclick="copyCode(this)">📋 Kopieren</button></div><code class="language-${lang}">`
  );
  html = html.replace(/<pre><code>/g, `<pre><div class="code-header"><span>code</span><button onclick="copyCode(this)">📋 Kopieren</button></div><code>`);
  return html;
}

function copyCode(btn) {
  const code = btn.closest('pre').querySelector('code');
  navigator.clipboard.writeText(code.textContent).then(() => {
    btn.textContent = '✓ Kopiert';
    setTimeout(() => btn.textContent = '📋 Kopieren', 1500);
  });
}

// ── Key Screen ──
function renderKeyScreen() {
  const screen = document.getElementById('key-screen');
  // Check if key exists
  const savedKey = sessionStorage.getItem('nx_key') || localStorage.getItem('nx_key') || '';
  if (savedKey) {
    store.apiKey = savedKey;
    screen.classList.add('hidden');
    document.getElementById('app-main').classList.add('visible');
    initApp();
    return;
  }

  screen.innerHTML = `<div class="bg-grad"></div>`;
  const card = el('div', { className: 'key-card' });

  card.innerHTML = `
    <div class="logo">${IC.logo}<h1>Nex<span>us</span></h1></div>
    <label for="api-key-input">OpenRouter API Key</label>
    <div class="key-input-wrap">
      <input id="api-key-input" type="password" placeholder="sk-or-v1-..." autocomplete="off" spellcheck="false">
      <button class="toggle-vis" type="button" title="Key anzeigen/verbergen">${IC.eye}</button>
    </div>
    <div class="storage-opt">
      <input type="checkbox" id="persist-key"><label for="persist-key">Key dauerhaft im Browser speichern (localStorage)</label>
    </div>
    <button class="btn-primary" id="key-submit" disabled>Verbinden</button>
    <div class="sec-info">
      <div class="sec-item">${IC.shield}<span>Dein API Key wird <strong>niemals</strong> an Dritte, Analytics oder andere Server weitergegeben.</span></div>
      <div class="sec-item">${IC.key}<span>Speicherung nur lokal in deinem Browser — du behältst die volle Kontrolle.</span></div>
      <div class="sec-item">${IC.eye}<span>Alle API-Aufrufe gehen direkt von deinem Browser zu OpenRouter.</span></div>
    </div>
  `;
  screen.appendChild(card);

  const inp = card.querySelector('#api-key-input');
  const btn = card.querySelector('#key-submit');
  const toggleBtn = card.querySelector('.toggle-vis');
  const persist = card.querySelector('#persist-key');

  // Restore preference
  persist.checked = store.settings.keyStorage === 'local';

  inp.addEventListener('input', () => { btn.disabled = !inp.value.trim(); });
  toggleBtn.addEventListener('click', () => {
    const isPass = inp.type === 'password';
    inp.type = isPass ? 'text' : 'password';
    toggleBtn.innerHTML = isPass ? IC.eyeOff : IC.eye;
  });

  inp.addEventListener('keydown', (e) => { if (e.key === 'Enter' && inp.value.trim()) submitKey(); });
  btn.addEventListener('click', submitKey);

  async function submitKey() {
    const key = inp.value.trim();
    if (!key) return;
    btn.disabled = true;
    btn.textContent = 'Verbinde…';
    store.apiKey = key;

    const ok = await validateKey();
    if (!ok) {
      toast('Ungültiger API Key oder Netzwerkfehler.', 'error');
      btn.disabled = false;
      btn.textContent = 'Verbinden';
      return;
    }

    // Save key
    if (persist.checked) {
      localStorage.setItem('nx_key', key);
      store.settings.keyStorage = 'local';
    } else {
      sessionStorage.setItem('nx_key', key);
      store.settings.keyStorage = 'session';
    }
    store.save();

    screen.classList.add('hidden');
    document.getElementById('app-main').classList.add('visible');
    initApp();
  }

  inp.focus();
}

      store.activeChatId = id;
      render();
      focusInput();
      if (window.innerWidth < 769) { sb.classList.add('collapsed'); }

    container.innerHTML = '';

    `;

      });
    });
    return;
  }

  container.innerHTML = `<div class="chat-messages" id="chat-messages"></div>`;

  // System prompt display
  if (store.settings.systemPrompt) {

    msgContainer.appendChild(sysEl);
  }

  chat.messages.forEach(msg => {
    msgContainer.appendChild(renderMessage(msg, chat));
  });

  // Scroll
  if (store.settings.autoScroll) {
    requestAnimationFrame(() => { container.scrollTop = container.scrollHeight; });
  }
}

function renderMessage(msg, chat) {
  const div = el('div', { className: `msg msg-${msg.role}` });
  const isEditing = editingMsgId === msg.id;

  let contentHtml;
  if (msg.role === 'assistant') {
    contentHtml = renderMd(msg.content);
  } else {
    contentHtml = `<p>${esc(msg.content).replace(/\n/g, '<br>')}</p>`;
  }

  let metaHtml = '';
  if (msg.role === 'assistant') {
    const parts = [];
    if (msg.model) { const m = store.modelMap[msg.model]; parts.push(m ? (m.name || m.id).split('/').pop() : msg.model.split('/').pop()); }
    if (msg.duration) parts.push(`${(msg.duration / 1000).toFixed(1)}s`);
    if (msg.tokens) parts.push(`${msg.tokens.prompt || 0}+${msg.tokens.completion || 0} tok`);
    if (msg.cost) parts.push(formatCost(msg.cost));
    if (parts.length) metaHtml = `<div class="msg-meta"><span>${parts.join(' · ')}</span>`;
    else metaHtml = `<div class="msg-meta">`;
  } else {
    metaHtml = `<div class="msg-meta"><span>${formatDate(msg.ts)}</span>`;
  }

  metaHtml += `<span class="msg-actions">`;
  metaHtml += `<button data-act="copy" title="Kopieren">${IC.copy}</button>`;
  if (msg.role === 'user') metaHtml += `<button data-act="edit" title="Bearbeiten">${IC.edit}</button>`;
  if (msg.role === 'assistant') metaHtml += `<button data-act="regen" title="Neu generieren">${IC.refresh}</button>`;
  metaHtml += `<button data-act="del" title="Löschen">${IC.trash}</button>`;
  metaHtml += `</span></div>`;

  if (isEditing) {
    div.innerHTML = `
      <div class="msg-role">${msg.role === 'user' ? 'Du' : msg.role}</div>
      <textarea class="edit-ta" style="width:100%;min-height:60px;padding:8px;background:var(--bg-1);border:1px solid var(--border-2);border-radius:var(--radius-s);font:inherit;resize:vertical">${esc(msg.content)}</textarea>
      <div style="display:flex;gap:6px;margin-top:8px;justify-content:flex-end">
        <button class="edit-cancel" style="padding:6px 14px;border-radius:var(--radius-s);font-size:.82rem;color:var(--text-2)">Abbrechen</button>
        <button class="edit-save" style="padding:6px 14px;border-radius:var(--radius-s);font-size:.82rem;background:var(--accent);color:#fff">Senden</button>
      </div>
    `;
    setTimeout(() => {
      const ta = div.querySelector('.edit-ta');
      if (ta) { ta.focus(); ta.selectionStart = ta.value.length; }
    }, 50);
    div.querySelector('.edit-cancel').addEventListener('click', () => { editingMsgId = null; renderMessages(); });
    div.querySelector('.edit-save').addEventListener('click', () => {
      const ta = div.querySelector('.edit-ta');
      msg.content = ta.value;
      editingMsgId = null;
      // Remove all messages after this one
      const idx = chat.messages.indexOf(msg);
      chat.messages = chat.messages.slice(0, idx + 1);
      store.save();
      renderMessages();
      // Re-send
      sendChatMessage(msg.content, true);
    });
  } else {
    div.innerHTML = `
      ${msg.role !== 'system' ? `<div class="msg-role">${msg.role === 'user' ? 'Du' : msg.role === 'assistant' ? 'Assistent' : msg.role}</div>` : ''}
      <div class="msg-content">${contentHtml}</div>
      ${metaHtml}
    `;
  }

  // Debug
  if (store.settings.showDebug && msg.debug) {
    const dbg = el('div', { className: 'debug-panel' });
    dbg.innerHTML = `
      <div class="debug-toggle" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">▶ Debug Info</div>
      <div class="debug-content" style="display:none">${esc(JSON.stringify(msg.debug, null, 2))}</div>
    `;
    div.appendChild(dbg);
  }

  // Actions
  div.querySelectorAll('[data-act]').forEach(btn => {
    btn.addEventListener('click', () => {
      const act = btn.dataset.act;
      if (act === 'copy') {
        navigator.clipboard.writeText(msg.content).then(() => toast('Kopiert!', 'success'));
      }
      if (act === 'edit') { editingMsgId = msg.id; renderMessages(); }
      if (act === 'regen') regenerateMessage(msg, chat);
      if (act === 'del') {
        chat.messages = chat.messages.filter(m => m.id !== msg.id);
        store.save();
        renderMessages();
      }
    });
  });

  return div;
}

function renderInputArea() {
  const area = document.getElementById('chat-input-area');
  if (!area) return;

  area.innerHTML = `
    <div class="chat-input-wrap">
      <div class="chat-input-box" id="input-box">
        <button class="attach-btn" id="btn-attach" title="Bild anhängen">${IC.paperclip}</button>
        <textarea id="msg-input" rows="1" placeholder="Nachricht eingeben… (Strg+Enter zum Senden)"></textarea>
        <button class="send-btn" id="btn-send" disabled>${IC.send}</button>
      </div>
      <div class="input-info">
        <span id="input-model">${store.getChat()?.model?.split('/').pop() || ''}</span>
        <span id="input-hint">Strg+Enter senden · Shift+Enter neue Zeile</span>
      </div>
      <input type="file" id="file-input" accept="image/*" style="display:none">
    </div>
  `;

  const ta = area.querySelector('#msg-input');
  const sendBtn = area.querySelector('#btn-send');
  const attachBtn = area.querySelector('#btn-attach');
  const fileInput = area.querySelector('#file-input');

  // Auto resize
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 200) + 'px';
    sendBtn.disabled = !ta.value.trim() && !store.isStreaming;
    updateSendBtn();
  });

  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      if (store.isStreaming) stopStreaming();
      else if (ta.value.trim()) handleSend();
    }
    if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey && !e.metaKey) {
      // On desktop, Enter sends (on mobile it's new line)
      if (window.innerWidth > 768) {
        e.preventDefault();
        if (ta.value.trim()) handleSend();
      }
    }
  });

  sendBtn.addEventListener('click', () => {
    if (store.isStreaming) stopStreaming();
    else if (ta.value.trim()) handleSend();
  });

  attachBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', handleFileAttach);

  function updateSendBtn() {
    if (store.isStreaming) {
      sendBtn.innerHTML = IC.stop;
      sendBtn.classList.add('stop');
      sendBtn.disabled = false;
    } else {
      sendBtn.innerHTML = IC.send;
      sendBtn.classList.remove('stop');
      sendBtn.disabled = !ta.value.trim();
    }
  }

  // Expose for external use
  window._updateSendBtn = updateSendBtn;
}

function focusInput() {
  setTimeout(() => { const ta = document.getElementById('msg-input'); if (ta) ta.focus(); }, 100);
}

let attachedImages = [];

function handleFileAttach(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    attachedImages.push({ name: file.name, data: reader.result });
    toast(`Bild "${file.name}" angehängt`, 'success');
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

// ── Send Message ──
async function handleSend() {
  const ta = document.getElementById('msg-input');
  if (!ta || !ta.value.trim()) return;
  const content = ta.value.trim();
  ta.value = '';
  ta.style.height = 'auto';
  sendChatMessage(content, false);
}

async function sendChatMessage(content, isResend) {
  let chat = store.getChat();
  if (!chat) { chat = store.newChat(); render(); }

  // Auto-title
  if (chat.messages.length === 0 && chat.title === 'Neuer Chat') {
    chat.title = content.slice(0, 50) + (content.length > 50 ? '…' : '');
  }

  if (!isResend) {
    // Build user message
    const userMsg = { id: uuid(), role: 'user', content, ts: Date.now(), images: attachedImages.length ? [...attachedImages] : undefined };
    chat.messages.push(userMsg);
    attachedImages = [];
  }

  chat.updatedAt = Date.now();
  store.save();
  renderSidebar();
  renderMessages();

  // Build API messages
  const apiMsgs = [];
  if (store.settings.systemPrompt) apiMsgs.push({ role: 'system', content: store.settings.systemPrompt });

  for (const m of chat.messages) {
    if (m.role === 'user') {
      if (m.images && m.images.length) {
        apiMsgs.push({
          role: 'user',
          content: [
            { type: 'text', text: m.content },
            ...m.images.map(img => ({ type: 'image_url', image_url: { url: img.data } }))
          ]
        });
      } else {
        apiMsgs.push({ role: m.role, content: m.content });
      }
    } else if (m.role === 'assistant') {
      apiMsgs.push({ role: m.role, content: m.content });
    }
  }

  // Show indicator
  showTypingIndicator();
  if (window._updateSendBtn) window._updateSendBtn();

  let fullText = '';
  const startTime = Date.now();

  await streamChat(
    apiMsgs,
    chat.model,
    store.settings,
    // onToken
    (token) => {
      fullText += token;
      updateStreamContent(fullText);
    },
    // onDone
    (info) => {
      removeTypingIndicator();
      const duration = Date.now() - startTime;
      const usage = info.usage || {};
      const promptTokens = usage.prompt_tokens || 0;
      const compTokens = usage.completion_tokens || 0;

      // Calculate cost
      const model = store.modelMap[chat.model];
      let cost = 0;
      if (model?.pricing) {
        const pp = parseFloat(model.pricing.prompt) || 0;
        const cp = parseFloat(model.pricing.completion) || 0;
        cost = (promptTokens * pp) + (compTokens * cp);
      }

      const assistantMsg = {
        id: uuid(),
        role: 'assistant',
        content: fullText,
        ts: Date.now(),
        tokens: { prompt: promptTokens, completion: compTokens },
        cost,
        model: chat.model,
        duration,
        debug: info.debug,
      };
      chat.messages.push(assistantMsg);
      chat.tokens += promptTokens + compTokens;
      chat.cost += cost;
      store.totalCost += cost;
      store.save();
      renderMessages();
      renderSidebar();
      renderMainHeader();
      if (window._updateSendBtn) window._updateSendBtn();
    },
    // onError
    (err) => {
      removeTypingIndicator();
      const errMsg = { id: uuid(), role: 'assistant', content: `**Fehler:** ${err.message}`, ts: Date.now() };
      chat.messages.push(errMsg);
      store.save();
      renderMessages();
      toast('Fehler: ' + err.message, 'error');
      if (window._updateSendBtn) window._updateSendBtn();
    }
  );
}

function stopStreaming() {
  if (store.abortCtrl) {
    store.abortCtrl.abort();
    store.abortCtrl = null;
  }
}

function regenerateMessage(msg, chat) {
  const idx = chat.messages.indexOf(msg);
  if (idx < 0) return;
  // Remove this and all after
  chat.messages = chat.messages.slice(0, idx);
  store.save();
  renderMessages();
  // Find last user message
  const lastUser = [...chat.messages].reverse().find(m => m.role === 'user');
  if (lastUser) sendChatMessage(lastUser.content, true);
}

// ── Export ──
function exportChat() {
  const chat = store.getChat();
  if (!chat) return;
  let md = `# ${chat.title}\n\n`;
  md += `**Modell:** ${chat.model}\n**Erstellt:** ${new Date(chat.createdAt).toLocaleString('de')}\n\n---\n\n`;
  for (const m of chat.messages) {
    md += `### ${m.role === 'user' ? 'Du' : 'Assistent'}\n\n${m.content}\n\n---\n\n`;
  }
  const blob = new Blob([md], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${chat.title.replace(/[^a-zA-Z0-9äöüÄÖÜß -]/g, '')}.md`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Chat exportiert', 'success');
}

const MODEL_CATEGORIES = [
  { key: 'all', label: 'Alle' },
  { key: 'free', label: 'Kostenlos' },
  { key: 'multimodal', label: 'Multimodal' },
  { key: 'large', label: '100K+ Kontext' },
  { key: 'openai', label: 'OpenAI' },
  { key: 'anthropic', label: 'Anthropic' },
  { key: 'google', label: 'Google' },
  { key: 'meta', label: 'Meta' },
  { key: 'mistral', label: 'Mistral' },
];

function filterModels() {
  let list = store.models;
  const q = modelFilter.toLowerCase();
  if (q) list = list.filter(m => (m.name || m.id).toLowerCase().includes(q) || m.id.toLowerCase().includes(q));

  if (modelCategory === 'free') list = list.filter(m => parseFloat(m.pricing?.prompt || '1') === 0 && parseFloat(m.pricing?.completion || '1') === 0);
  if (modelCategory === 'multimodal') list = list.filter(m => m.architecture?.modality?.includes('image') || m.id.includes('vision') || m.architecture?.modality === 'multimodal');
  if (modelCategory === 'large') list = list.filter(m => (m.context_length || 0) >= 100000);
  if (['openai','anthropic','google','meta','mistral'].includes(modelCategory)) list = list.filter(m => m.id.toLowerCase().includes(modelCategory));

  return list;
}

function renderModelsPanel() {
  const panel = document.getElementById('models-panel');
  if (!panel) return;
  const chat = store.getChat();

  const filtered = filterModels();

  panel.innerHTML = `

      const id = card.dataset.id;

      render();
      toast(`Modell: ${(store.modelMap[id]?.name || id).split('/').pop()}`, 'success');

function modelCardHtml(m, currentModel) {
  const isFav = store.favModels.includes(m.id);
  const isSelected = m.id === currentModel;
  const pp = parseFloat(m.pricing?.prompt || '0');
  const cp = parseFloat(m.pricing?.completion || '0');
  const isFree = pp === 0 && cp === 0;
  const provider = m.id.split('/')[0] || '?';
  const ctx = m.context_length || 0;

  const badges = [];
  if (isFree) badges.push('<span class="badge badge-green">Kostenlos</span>');
  if (ctx >= 100000) badges.push(`<span class="badge badge-blue">${formatTokens(ctx)} ctx</span>`);
  if (m.architecture?.modality?.includes('image') || m.architecture?.modality === 'multimodal') badges.push('<span class="badge badge-amber">Multimodal</span>');

  return `<div class="model-card${isSelected ? ' selected' : ''}" data-id="${m.id}">
    <div class="mc-top">
      <div>
        <div class="mc-name">${esc((m.name || m.id).split('/').pop())}</div>
        <div class="mc-provider">${esc(provider)}</div>
      </div>
      <button class="fav-btn${isFav ? ' faved' : ''}" data-model="${m.id}" title="Favorit">${isFav ? IC.starFill : IC.star}</button>
    </div>
    ${badges.length ? `<div class="mc-badges">${badges.join('')}</div>` : ''}
    <div class="mc-stats">
      <span>Prompt: ${isFree ? 'gratis' : '$' + (pp * 1e6).toFixed(2) + '/M'}</span>
      <span>Completion: ${isFree ? 'gratis' : '$' + (cp * 1e6).toFixed(2) + '/M'}</span>
      ${ctx ? `<span>Kontext: ${formatTokens(ctx)}</span>` : ''}
    </div>
  </div>`;
}

function showRenameModal(chatId) {
  const chat = store.chats.find(c => c.id === chatId);
  if (!chat) return;

  const overlay = el('div', { className: 'modal-overlay' });
  const modal = el('div', { className: 'modal' });
  modal.innerHTML = `
    <h2>Chat umbenennen</h2>
    <input type="text" id="rename-input" value="${esc(chat.title)}" maxlength="80">
    <div class="modal-btns">
      <button class="btn-cancel">Abbrechen</button>
      <button class="btn-confirm">Speichern</button>
    </div>
  `;
  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  const inp = modal.querySelector('#rename-input');
  inp.focus();
  inp.select();

  const close = () => overlay.remove();
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
  modal.querySelector('.btn-cancel').addEventListener('click', close);
  modal.querySelector('.btn-confirm').addEventListener('click', () => {
    chat.title = inp.value.trim() || chat.title;
    store.save();
    renderSidebar();
    renderMainHeader();
    close();
  });
  inp.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') modal.querySelector('.btn-confirm').click();
    if (e.key === 'Escape') close();
  });
}

// ────────────────────────────────
// §8  KEYBOARD SHORTCUTS
// ────────────────────────────────
document.addEventListener('keydown', (e) => {
  // Ctrl+Shift+N = New Chat
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'N') {
    e.preventDefault();
    store.newChat();
    render();
    focusInput();
  }
  // Escape = close panels
  if (e.key === 'Escape') {
    if (modelsVisible) toggleModels(false);
    else if (settingsVisible) toggleSettings(false);
  }
  // Ctrl+/ = focus search
  if ((e.ctrlKey || e.metaKey) && e.key === '/') {
    e.preventDefault();
    const sb = document.getElementById('chat-search');
    if (sb) sb.focus();
  }
});

// ────────────────────────────────
// §9  INIT
// ────────────────────────────────
renderKeyScreen();
</script>
</body>
</html>
